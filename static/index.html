<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lutron Designer Viewer</title>
    <style>
        :root {
            --bg: #1a1a1e;
            --surface: #242428;
            --surface2: #2e2e34;
            --border: #3a3a42;
            --accent: #4a90d9;
            --accent2: #2d6bb3;
            --text: #e0e0e8;
            --text-dim: #888896;
            --green: #5cb85c;
            --orange: #f0a030;
            --red: #d9534f;
            --teal: #5bc0de;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header .logo {
            color: var(--accent);
            font-weight: 700;
            font-size: 16px;
        }

        header h1 {
            font-size: 14px;
            font-weight: 600;
        }

        header .spacer {
            flex: 1;
        }

        .btn-group {
            display: flex;
            gap: 6px;
        }

        #place-bar {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 12px;
            color: var(--text-dim);
            min-height: 32px;
            flex-wrap: wrap;
        }

        #place-bar .info-item {
            display: flex;
            gap: 4px;
        }

        #place-bar .info-value {
            color: var(--text);
            font-weight: 500;
        }

        #dirty-badge {
            display: none;
            background: var(--orange);
            color: #000;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 10px;
        }

        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #sidebar {
            width: 220px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #sidebar-header {
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        #area-tree {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .tree-node {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            cursor: pointer;
            user-select: none;
            border-left: 3px solid transparent;
        }

        .tree-node:hover {
            background: var(--surface2);
        }

        .tree-node.selected {
            background: rgba(74, 144, 217, 0.15);
            border-left-color: var(--accent);
        }

        .tree-node .node-icon {
            font-size: 13px;
            flex-shrink: 0;
        }

        .tree-node .node-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tree-node .node-leaf {
            color: #4db6ac;
            font-size: 9px;
        }

        #detail {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-dim);
        }

        .welcome .icon {
            font-size: 40px;
            opacity: 0.25;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .card-header {
            background: var(--surface2);
            padding: 7px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header .count {
            background: var(--accent2);
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th {
            background: rgba(0, 0, 0, 0.2);
            text-align: left;
            padding: 5px 10px;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 5px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Editable cells */
        .editable {
            cursor: text;
            position: relative;
        }

        .editable:hover {
            background: rgba(74, 144, 217, 0.08) !important;
            outline: 1px solid var(--accent2);
            border-radius: 2px;
        }

        .editable:focus {
            outline: 2px solid var(--accent);
            border-radius: 2px;
            background: rgba(74, 144, 217, 0.12) !important;
        }

        .edit-hint {
            font-size: 9px;
            color: var(--text-dim);
            margin-left: 4px;
            opacity: 0;
            transition: opacity 0.15s;
        }

        tr:hover .edit-hint {
            opacity: 1;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
        }

        .badge-dim {
            background: rgba(74, 144, 217, 0.2);
            color: #7ab4e8;
        }

        .badge-cco {
            background: rgba(240, 160, 48, 0.2);
            color: #e8b060;
        }

        .badge-shade {
            background: rgba(91, 192, 222, 0.2);
            color: #7dd0e8;
        }

        .badge-hvac {
            background: rgba(92, 184, 92, 0.2);
            color: #7ed47e;
        }

        .badge-other {
            background: rgba(150, 150, 170, 0.2);
            color: #aaaacc;
        }

        .layer-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            cursor: pointer;
        }

        .layer-ambient {
            background: rgba(255, 220, 80, 0.2);
            color: #f0d060;
        }

        .layer-task {
            background: rgba(200, 140, 255, 0.2);
            color: #c89ce0;
        }

        .layer-accent {
            background: rgba(255, 120, 80, 0.2);
            color: #f08060;
        }

        .layer-other {
            background: rgba(130, 130, 150, 0.2);
            color: #a0a0c0;
        }

        .keypad-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
        }

        .keypad-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            min-width: 160px;
            flex: 1;
        }

        .keypad-name {
            padding: 7px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 3px 10px;
            font-size: 11px;
        }

        .btn-num {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            background: rgba(74, 144, 217, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }

        .btn-prog {
            color: var(--text-dim);
            font-size: 10px;
            margin-left: auto;
        }

        /* Programs tab */
        .detail-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0;
        }

        .detail-tab {
            padding: 7px 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-dim);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            user-select: none;
        }

        .detail-tab:hover {
            color: var(--text);
        }

        .detail-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Program view */
        .prog-station {
            margin-bottom: 14px;
        }

        .prog-station-name {
            font-size: 12px;
            font-weight: 700;
            color: var(--accent);
            padding: 6px 12px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .prog-btn-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .prog-btn-row:last-child {
            border-bottom: none;
        }

        .prog-btn-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 12px;
        }

        .prog-btn-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .prog-btn-header .btn-num {
            width: 20px;
            height: 20px;
            border-radius: 3px;
            background: rgba(74, 144, 217, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            flex-shrink: 0;
        }

        .prog-btn-header .btn-label {
            flex: 1;
            font-weight: 500;
        }

        .prog-type-badge {
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 10px;
            font-weight: 600;
        }

        .prog-type-scene {
            background: rgba(74, 144, 217, 0.2);
            color: #7ab4e8;
        }

        .prog-type-toggle {
            background: rgba(92, 184, 92, 0.2);
            color: #7ed47e;
        }

        .prog-type-rl {
            background: rgba(240, 160, 48, 0.2);
            color: #e8b060;
        }

        .prog-type-cond {
            background: rgba(200, 100, 200, 0.2);
            color: #d890d8;
        }

        .prog-type-other {
            background: rgba(130, 130, 150, 0.2);
            color: #a0a0c0;
        }

        .prog-chevron {
            font-size: 10px;
            color: var(--text-dim);
            transition: transform 0.15s;
        }

        .prog-chevron.open {
            transform: rotate(90deg);
        }

        .prog-detail {
            display: none;
            padding: 6px 12px 10px 40px;
            font-size: 11px;
        }

        .prog-detail.open {
            display: block;
        }

        .prog-event-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 8px;
        }

        .prog-event-tab {
            padding: 3px 10px;
            font-size: 10px;
            cursor: pointer;
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-right: none;
            background: var(--surface);
        }

        .prog-event-tab:first-child {
            border-radius: 4px 0 0 4px;
        }

        .prog-event-tab:last-of-type {
            border-right: 1px solid var(--border);
            border-radius: 0 4px 4px 0;
        }

        .prog-event-tab.active {
            background: var(--accent2);
            color: #fff;
            border-color: var(--accent2);
        }

        .prog-event-tab.has-data {
            color: var(--text);
        }

        .prog-event-tab.active.has-data {
            color: #fff;
        }

        .prog-event-panel {
            display: none;
        }

        .prog-event-panel.active {
            display: block;
        }

        .action-zone-row {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 11px;
        }

        .action-zone-row:last-child {
            border-bottom: none;
        }

        .action-param-input {
            width: 42px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 3px;
            padding: 1px 4px;
            font-size: 11px;
            text-align: right;
        }

        .exec-type-sel {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 3px;
            padding: 1px 2px;
            font-size: 10px;
            cursor: pointer;
        }

        .prog-actions {
            font-family: monospace;
            font-size: 11px;
            line-height: 1.6;
            color: var(--text);
        }

        .prog-actions .prog-line {
            padding: 1px 0;
        }

        .prog-actions .prog-keyword {
            color: #c586c0;
            font-weight: 600;
        }

        .prog-actions .prog-action {
            color: #9cdcfe;
        }

        .prog-actions .prog-condition {
            color: #dcdcaa;
        }

        .prog-actions .prog-indent {
            margin-left: 20px;
        }

        .prog-no-data {
            color: var(--text-dim);
            font-size: 11px;
            font-style: italic;
        }

        /* Editable program lines */
        .prog-line-run {
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.1s;
        }

        .prog-line-run:hover {
            background: rgba(74, 144, 217, 0.12);
        }

        .prog-line-run:hover .prog-edit-hint {
            opacity: 1;
        }

        .prog-edit-hint {
            opacity: 0;
            color: var(--accent);
            font-size: 9px;
            margin-left: 4px;
            transition: opacity 0.15s;
        }

        .prog-led-edit {
            cursor: pointer;
            border-radius: 3px;
            padding: 0 2px;
        }

        .prog-led-edit:hover {
            background: rgba(74, 144, 217, 0.12);
        }

        .prog-led-edit:hover .prog-edit-hint {
            opacity: 1;
        }

        .prog-led-logic-sel {
            background: transparent;
            border: none;
            color: var(--teal);
            font-size: 11px;
            cursor: pointer;
            padding: 0;
            font-family: inherit;
        }

        .prog-led-logic-sel:focus {
            outline: 1px solid var(--accent);
            border-radius: 2px;
        }

        .prog-led-logic-sel option {
            background: var(--surface2);
            color: var(--text);
        }

        /* Add action button */
        .prog-add-btn {
            background: none;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: var(--text-dim);
            font-size: 10px;
            border-radius: 3px;
            padding: 1px 8px;
            cursor: pointer;
            margin-top: 2px;
            transition: all 0.15s;
        }

        .prog-add-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .prog-del-btn {
            opacity: 0;
            background: none;
            border: none;
            color: #e06c75;
            font-size: 9px;
            cursor: pointer;
            padding: 0 3px;
            border-radius: 2px;
            transition: opacity 0.15s;
        }

        .prog-line:hover .prog-del-btn {
            opacity: 0.6;
        }

        .prog-del-btn:hover {
            opacity: 1 !important;
            background: rgba(224, 108, 117, 0.15);
        }

        /* Add action popup menu */
        .add-action-menu {
            position: fixed;
            background: var(--surface2);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            z-index: 2000;
            min-width: 150px;
            padding: 4px 0;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        .add-action-menu div {
            padding: 6px 14px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text);
        }

        .add-action-menu div:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Inline add button (shown on hover to the right of each action line) */
        .prog-add-inline {
            opacity: 0;
            background: none;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: var(--text-dim);
            font-size: 9px;
            border-radius: 2px;
            padding: 0 5px;
            cursor: pointer;
            margin-left: 4px;
            transition: all 0.15s;
            vertical-align: middle;
        }

        .prog-line:hover .prog-add-inline,
        .prog-line-run:hover .prog-add-inline {
            opacity: 1;
        }

        .prog-add-inline:hover {
            border-color: var(--accent) !important;
            color: var(--accent) !important;
            opacity: 1 !important;
        }

        /* ⋮ context menu button */
        .prog-more-btn {
            opacity: 0;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 13px;
            cursor: pointer;
            padding: 0 3px;
            line-height: 1;
            transition: opacity 0.15s, color 0.15s;
            vertical-align: middle;
        }
        .prog-line:hover .prog-more-btn,
        .prog-line-run:hover .prog-more-btn { opacity: 0.7; }
        .prog-more-btn:hover { opacity: 1 !important; color: var(--accent) !important; }

        /* Insert-point divider between actions */
        .prog-insert-pt {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 14px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .prog-insert-pt:hover { opacity: 1; }
        .prog-insert-pt::before {
            content: '＋';
            font-size: 9px;
            color: var(--accent);
            white-space: nowrap;
        }
        .prog-insert-pt::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--accent);
            opacity: 0.4;
        }
        /* Always show insert point when parent hovered */
        .prog-actions:hover .prog-insert-pt { opacity: 0.35; }
        .prog-actions:hover .prog-insert-pt:hover { opacity: 1; }

        /* AND/OR condition connector */
        .prog-connector {
            color: #c586c0;
            font-weight: 600;
            cursor: pointer;
            padding: 0 2px;
            border-radius: 2px;
        }

        .prog-connector:hover {
            background: rgba(197, 134, 192, 0.2);
        }

        /* Condition picker button */
        .prog-cond-btn {
            cursor: pointer;
            border-radius: 3px;
            padding: 0 4px;
            border: 1px solid transparent;
            transition: border-color 0.12s, background 0.12s;
        }

        .prog-cond-btn:hover {
            border-color: rgba(220, 220, 170, 0.4);
            background: rgba(220, 220, 170, 0.08);
        }

        /* Condition picker dropdown menus */
        .cond-picker-menu {
            position: fixed;
            z-index: 10000;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 3px 0;
            min-width: 190px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        .cond-picker-menu.cond-sub-menu {
            max-height: 320px;
            overflow-y: auto;
        }

        .cond-picker-menu .cpi {
            padding: 5px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            white-space: nowrap;
        }

        .cond-picker-menu .cpi:hover {
            background: rgba(74, 144, 217, 0.2);
        }

        .cond-picker-menu .cpi.cpi-disabled {
            color: var(--text-dim);
            cursor: default;
        }

        .cond-picker-menu .cpi.cpi-disabled:hover {
            background: none;
        }

        .cond-picker-menu .cpi.cpi-unknown {
            color: var(--text-dim);
            font-style: italic;
        }

        .cond-picker-menu .cpi-arrow {
            color: var(--text-dim);
            font-size: 10px;
            margin-left: 8px;
            flex-shrink: 0;
        }

        /* Then ▾ dropdown */
        .prog-then-drop {
            cursor: pointer;
            border-radius: 2px;
            padding: 0 3px;
        }

        .prog-then-drop:hover {
            background: rgba(197, 134, 192, 0.2);
        }

        /* Drag-and-drop */
        .prog-line[draggable="true"] {
            cursor: grab;
        }

        .prog-line[draggable="true"]:active {
            cursor: grabbing;
        }

        .prog-line.dragging {
            opacity: 0.35;
        }

        .prog-line.drag-over-top {
            box-shadow: 0 -2px 0 var(--accent);
        }

        .prog-line.drag-over-bottom {
            box-shadow: 0 2px 0 var(--accent);
        }

        /* Scene picker modal */
        .scene-picker-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scene-picker-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 420px;
            height: 560px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .scene-picker-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
        }

        .scene-picker-header button {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 16px;
            cursor: pointer;
            padding: 0 4px;
        }

        .scene-picker-header button:hover {
            color: var(--text);
        }

        .scene-picker-search {
            width: 100%;
            padding: 8px 12px;
            background: var(--surface2);
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-size: 12px;
            box-sizing: border-box;
        }

        .scene-picker-search:focus {
            outline: none;
            background: var(--surface);
        }

        .scene-picker-list {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }

        .scene-picker-group {
            padding: 6px 12px 3px;
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: var(--surface2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            position: sticky;
            top: 0;
        }

        .scene-picker-item {
            padding: 5px 16px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text);
        }

        .scene-picker-item:hover {
            background: rgba(74, 144, 217, 0.15);
        }

        .scene-picker-item.is-current {
            color: var(--accent);
            font-weight: 600;
        }

        .scene-picker-item.hidden {
            display: none;
        }

        .scene-picker-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .scene-picker-tab {
            flex: 1;
            padding: 6px 4px;
            font-size: 11px;
            text-align: center;
            cursor: pointer;
            color: var(--text-dim);
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .scene-picker-tab:hover {
            color: var(--text);
        }

        .scene-picker-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            font-weight: 600;
        }

        .scene-picker-footer {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            border-top: 1px solid var(--border);
            justify-content: flex-end;
        }

        .scene-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px;
        }

        .scene-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .scene-num {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-dim);
        }

        .scene-off {
            color: var(--red);
        }

        .scene-on {
            color: var(--teal);
        }

        /* ── Shared Scenes tab (LD-like 2-pane layout) ── */
        .ssc-layout {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* When Shared Scenes or Scenes tab is active, stop #detail from scrolling so
           the two panels inside .ssc-layout scroll independently */
        #detail.ssc-active, #detail.scenes-active {
            overflow-y: hidden;
        }
        #detail.ssc-active .card, #detail.scenes-active .card {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden !important;
            min-height: 0;
        }
        #detail.ssc-active #tab-shared-scenes.active {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        #detail.scenes-active #tab-scenes.active {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .ssc-list {
            width: 220px;
            min-width: 160px;
            flex-shrink: 0;
            border-right: 1px solid var(--border);
            overflow-y: auto;
            background: var(--surface);
        }

        .ssc-list-item {
            padding: 7px 12px;
            font-size: 11px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }

        .ssc-list-item:hover { background: var(--surface2); }
        .ssc-list-item.active {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        .ssc-detail-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .ssc-detail-name {
            font-size: 12px;
            font-weight: 600;
            flex: 1;
        }

        .ssc-detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 6px 12px;
        }

        .ssc-name-input {
            flex: 1;
            font-size: 12px;
            font-weight: 600;
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 4px;
            color: var(--text);
            padding: 1px 6px;
            outline: none;
        }
        .ssc-cat-group {
            font-size: 10px; font-weight: 600; padding: 5px 2px 2px;
            color: var(--text-dim); border-top: 1px solid var(--border);
            margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em;
        }
        .ssc-cat-row {
            display: flex; align-items: center; gap: 5px;
            padding: 2px 2px; font-size: 11px; border-radius: 3px;
        }
        .ssc-cat-row:hover { background: var(--surface2); }
        .ssc-cat-label {
            min-width: 100px; max-width: 220px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            cursor: pointer; user-select: none;
        }

        .ssc-edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 12px;
            padding: 0 2px;
            line-height: 1;
        }

        .ssc-edit-btn:hover { color: var(--accent); }

        .btn {
            padding: 6px 14px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: opacity 0.15s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-outline {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        .btn-success {
            background: var(--green);
            color: #fff;
        }

        .btn-danger {
            background: var(--red);
            color: #fff;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading {
            color: var(--text-dim);
            font-size: 12px;
            padding: 16px;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }

        #toast.show {
            opacity: 1;
        }

        /* Layer select dropdown */
        select.layer-select {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 11px;
            cursor: pointer;
        }

        /* Add Zone modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 200;
        }

        .modal-overlay.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            width: 420px;
            max-width: 95vw;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal-box h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }

        .modal-box label {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 2px;
            display: block;
        }

        .modal-box input,
        .modal-box select {
            width: 100%;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 12px;
        }

        .modal-box input:focus,
        .modal-box select:focus {
            outline: 2px solid var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 4px;
        }

        /* Template switcher */
        #template-bar {
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 4px 14px;
            display: none;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: var(--text-dim);
        }

        #template-bar label {
            white-space: nowrap;
        }

        #template-select {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 11px;
            cursor: pointer;
            flex: 1;
            max-width: 320px;
        }

        #template-loading {
            color: var(--text-dim);
            font-size: 11px;
            display: none;
        }

        #ctx-menu {
            position: fixed; z-index: 9999;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 4px; min-width: 150px;
            box-shadow: 0 4px 12px rgba(0,0,0,.45);
            display: none; padding: 3px 0;
        }
        .ctx-item {
            padding: 6px 14px; font-size: 12px; cursor: pointer;
            white-space: nowrap;
        }
        .ctx-item:hover { background: var(--accent); color: #fff; }
    </style>
</head>

<body>

    <header>
        <span class="logo">LD</span>
        <h1>Lutron Designer Viewer</h1>
        <div class="spacer"></div>
        <div class="btn-group">
            <input type="file" id="file-input-pl" accept=".pl" style="display:none;" onchange="handleFileUpload(event, 'pl')">
            <input type="file" id="file-input-folder" webkitdirectory directory multiple style="display:none;" onchange="handleFileUpload(event, 'folder')">
            <button class="btn btn-primary" onclick="document.getElementById('file-input-pl').click()">📄 .plを開く</button>
            <button class="btn btn-outline" onclick="document.getElementById('file-input-folder').click()">📁 フォルダを開く</button>
            <button class="btn btn-outline" id="undo-btn" onclick="_undo()" disabled title="元に戻す (Ctrl+Z)">↩ 元に戻す</button>
            <button class="btn btn-outline" id="redo-btn" onclick="_redo()" disabled title="やり直す (Ctrl+Y)">↪ やり直す</button>
            <button class="btn btn-success" id="save-btn" onclick="saveFile()" disabled>💾 保存</button>
        </div>
    </header>

    <div id="place-bar">
        <span style="color:var(--text-dim)">ファイルまたはフォルダを選択してください</span>
    </div>

    <div id="template-bar">
        <label for="template-select">テンプレート:</label>
        <select id="template-select" onchange="switchTemplate(this.value)"></select>
        <span id="template-loading">切替中...</span>
    </div>

    <div class="main">
        <div id="sidebar">
            <div id="sidebar-header">エリア</div>
            <div id="area-tree">
                <div class="loading">─</div>
            </div>
        </div>
        <div id="detail">
            <div class="welcome">
                <div class="icon">🏨</div>
                <p>左のエリアを選択すると詳細を表示します</p>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <!-- Text output modal (copyable) -->
    <div class="modal-overlay" id="text-modal-overlay" onclick="if(event.target===this)closeTextModal()">
        <div class="modal-box" style="width:700px;max-width:95vw">
            <h3 id="text-modal-title">結果</h3>
            <textarea id="text-modal-body" readonly
                style="width:100%;height:400px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:11px;font-family:monospace;resize:vertical"></textarea>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="copyTextModal()">📋 コピー</button>
                <button class="btn btn-primary" onclick="closeTextModal()">閉じる</button>
            </div>
        </div>
    </div>

    <!-- Add Zone modal -->
    <div class="modal-overlay" id="add-zone-overlay" onclick="if(event.target===this)closeAddZone()">
        <div class="modal-box">
            <h3>Zone を追加</h3>
            <div>
                <label>Zone Name</label>
                <input type="text" id="az-name" placeholder="例: Bed DL">
            </div>
            <div>
                <label>Load Type</label>
                <select id="az-load-type" size="1"></select>
            </div>
            <div>
                <label>Zone Layer</label>
                <select id="az-layer">
                    <option value="0">Ambient</option>
                    <option value="1">Task</option>
                    <option value="2">Accent</option>
                    <option value="4">Internal</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeAddZone()">キャンセル</button>
                <button class="btn btn-primary" id="az-submit-btn" onclick="submitAddZone()">追加</button>
            </div>
            <input type="hidden" id="az-overlay-area" value="">
        </div>
    </div>

    <script>
        let isPl = false;
        let isDirty = false;
        let currentAreaId = null;
        let currentAreaZones = [];  // zones for the current area (for Actions tab)
        let allTemplates = [];   // [{id, name}] from SQLite
        let fsTemplates = [];    // [filename] from filesystem
        let loadTypesCache = []; // [{LoadTypeID, Description, ControlType}]

        // ControlType labels for grouping
        const CT_GROUPS = {
            1: 'Dimmed', 2: 'Switched', 5: 'Shade', 6: 'Fan',
            7: 'CCO Maintained', 8: 'CCO Pulsed', 9: 'HVAC', 10: 'Venetian Blind'
        };

        // ── Open file/folder via upload ─────────────────────────
        async function handleFileUpload(event, mode) {
            const files = event.target.files;
            if (!files || files.length === 0) return;
            
            const formData = new FormData();
            formData.append('mode', mode);
            
            if (mode === 'pl') {
                formData.append('file', files[0]);
                formData.append('filename', files[0].name);
            } else {
                for (let i = 0; i < files.length; i++) {
                    const f = files[i];
                    formData.append('files', f);
                    formData.append('paths', f.webkitRelativePath);
                }
            }

            document.getElementById('detail').innerHTML = '<div class="loading">アップロード＆読み込み中...</div>';
            
            try {
                const res = await fetch('/api/open', {
                    method: 'POST',
                    body: formData
                });
                if (!res.ok) {
                    const e = await res.json();
                    const msg = e.error || 'エラー';
                    if (msg.includes('\n')) { _showDiagModal(msg); } else { toast(msg, 'red'); }
                    return;
                }
                const data = await res.json();
                isPl = data.is_pl;
                document.getElementById('save-btn').disabled = !isPl;
                fsTemplates = data.templates || [];
                _variablesCache = null; _ledsCache = null; _condDataCache = null;
                await loadOverview();
                updateTemplateBar(data.active_template);
                await loadTree();
                if (currentAreaId) loadDetail(currentAreaId, '');
                toast(`${data.name} を開きました`);
            } catch (err) {
                toast('通信エラー: ' + err.message, 'red');
            } finally {
                event.target.value = '';
            }
        }

        // ── Template switcher ─────────────────────────
        function updateTemplateBar(activeId) {
            const bar = document.getElementById('template-bar');
            const sel = document.getElementById('template-select');
            if (fsTemplates.length <= 1) { bar.style.display = 'none'; return; }
            bar.style.display = 'flex';
            sel.innerHTML = fsTemplates.map(tid => {
                const tidLower = tid.toLowerCase();
                const meta = allTemplates.find(t =>
                    (t.projectDatabaseArtifactId || '').toLowerCase() === tidLower
                );
                const label = meta ? meta.name : tid.slice(0, 16) + '…';
                return `<option value="${tid}" ${tid === activeId ? 'selected' : ''}>${label}</option>`;
            }).join('');
        }

        async function switchTemplate(templateId) {
            const loading = document.getElementById('template-loading');
            const sel = document.getElementById('template-select');
            loading.style.display = 'inline';
            sel.disabled = true;
            currentAreaId = null;
            document.getElementById('detail').innerHTML = '<div class="loading">テンプレート切替中...</div>';
            try {
                const res = await fetch('/api/switch-template', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ template_id: templateId })
                });
                const d = await res.json();
                if (!res.ok) { toast(d.error || '切替失敗', 'red'); return; }
                await loadTree();
                toast('テンプレートを切り替えました');
            } finally {
                loading.style.display = 'none';
                sel.disabled = false;
            }
        }

        // ── Overview bar ─────────────────────────────
        async function loadOverview() {
            const res = await fetch('/api/overview');
            if (!res.ok) return;
            const d = await res.json();
            const p = d.place, a = d.address;
            isDirty = d.dirty;
            allTemplates = d.templates || [];
            if (d.fs_templates) { fsTemplates = d.fs_templates; updateTemplateBar(d.active_template); }
            const bar = document.getElementById('place-bar');
            bar.innerHTML = `
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">Place:</span><span class="info-value">${p.name || '─'}</span></div>
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">TimeZone:</span><span class="info-value">${p.timeZone || '─'}</span></div>
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">Location:</span><span class="info-value">${a.city || '─'}, ${a.country || '─'}</span></div>
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">Templates:</span><span class="info-value">${d.templates.length}</span></div>
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">Rooms:</span><span class="info-value">${d.systems.length}</span></div>
    ${d.dirty ? '<span id="dirty-badge" style="display:inline-block">● 未保存</span>' : ''}
  `;
            document.getElementById('save-btn').disabled = !isPl || !isDirty;
        }

        // ── Area tree ────────────────────────────────
        async function loadTree() {
            const res = await fetch('/api/areas');
            if (!res.ok) { document.getElementById('area-tree').innerHTML = '<div class="loading">テンプレートなし</div>'; return; }
            const areas = await res.json();
            if (!areas.length) { document.getElementById('area-tree').innerHTML = '<div class="loading">エリアなし</div>'; return; }
            renderTree(areas);
        }

        function renderTree(areas) {
            const childMap = {};
            areas.forEach(a => { if (!childMap[a.ParentID]) childMap[a.ParentID] = []; childMap[a.ParentID].push(a); });
            const roots = areas.filter(a => a.HierarchyLevel === 2);
            const container = document.getElementById('area-tree');
            container.innerHTML = '';
            roots.forEach(r => renderNode(r, childMap, container, 0));
        }

        function renderNode(node, childMap, container, depth) {
            const children = childMap[node.AreaID] || [];
            const isLeaf = node.IsLeaf === 1 || children.length === 0;
            const el = document.createElement('div');
            el.className = 'tree-node';
            el.dataset.id = node.AreaID;
            el.style.paddingLeft = (10 + depth * 14) + 'px';
            el.innerHTML = `<span class="node-icon">${isLeaf ? '🏠' : '📂'}</span><span class="node-name">${node.Name}</span>${isLeaf ? '<span class="node-leaf">●</span>' : ''}`;
            el.addEventListener('click', () => {
                document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('selected'));
                el.classList.add('selected');
                currentAreaId = node.AreaID;
                loadDetail(node.AreaID, node.Name);
            });
            container.appendChild(el);
            children.forEach(c => renderNode(c, childMap, container, depth + 1));
        }

        // ── Detail panel ─────────────────────────────
        let activeDetailTab = 'zones';

        async function loadDetail(areaId, areaName) {
            const detail = document.getElementById('detail');
            detail.innerHTML = '<div class="loading">読み込み中...</div>';

            if (!areaName) {
                const el = document.querySelector(`.tree-node[data-id="${areaId}"] .node-name`);
                areaName = el ? el.textContent : String(areaId);
            }

            // Load zones/scenes/keypads and programs in parallel
            const [areaRes, progRes] = await Promise.all([
                fetch(`/api/area/${areaId}`),
                fetch(`/api/area/${areaId}/programs`),
            ]);
            if (!areaRes.ok) { detail.innerHTML = '<div class="loading">エラー</div>'; return; }
            const d = await areaRes.json();
            currentAreaZones = d.zones || [];
            const prog = progRes.ok ? await progRes.json() : {};

            const tab = activeDetailTab;
            detail.innerHTML = `
    <div style="font-size:15px;font-weight:600;padding:2px 0 6px">${areaName}</div>
    <div class="card" style="overflow:visible">
      <div class="detail-tabs">
        <div class="detail-tab ${tab === 'zones' ? 'active' : ''}" onclick="switchDetailTab('zones',${areaId},'${areaName.replace(/'/g, "\\'")}')">Zones</div>
        <div class="detail-tab ${tab === 'scenes' ? 'active' : ''}" onclick="switchDetailTab('scenes',${areaId},'${areaName.replace(/'/g, "\\'")}')">Scenes</div>
        <div class="detail-tab ${tab === 'keypads' ? 'active' : ''}" onclick="switchDetailTab('keypads',${areaId},'${areaName.replace(/'/g, "\\'")}')">Keypads</div>
        <div class="detail-tab ${tab === 'programs' ? 'active' : ''}" onclick="switchDetailTab('programs',${areaId},'${areaName.replace(/'/g, "\\'")}')">Programs</div>
        <div class="detail-tab ${tab === 'shared-scenes' ? 'active' : ''}" onclick="switchDetailTab('shared-scenes',${areaId},'${areaName.replace(/'/g, "\\'")}')">Shared Scenes</div>
      </div>
      <div id="tab-zones" class="tab-panel ${tab === 'zones' ? 'active' : ''}">
        ${d.zones.length ? zonesTableHtml(d.zones, areaId) : '<div class="loading" style="padding:16px">Zonesなし</div>'}
      </div>
      <div id="tab-scenes" class="tab-panel ${tab === 'scenes' ? 'active' : ''}">
        <div class="loading" style="padding:16px">読み込み中…</div>
      </div>
      <div id="tab-keypads" class="tab-panel ${tab === 'keypads' ? 'active' : ''}">
        ${d.stations.length ? keypadsBodyHtml(d.stations, d.buttons) : '<div class="loading" style="padding:16px">Keypadsなし</div>'}
      </div>
      <div id="tab-programs" class="tab-panel ${tab === 'programs' ? 'active' : ''}">
        ${renderProgramsTab(prog)}
      </div>
      <div id="tab-shared-scenes" class="tab-panel ${tab === 'shared-scenes' ? 'active' : ''}">
        <div class="loading" style="padding:16px">読み込み中…</div>
      </div>
    </div>
  `;
            detail.classList.toggle('ssc-active', tab === 'shared-scenes');
            detail.classList.toggle('scenes-active', tab === 'scenes');
            if (tab === 'shared-scenes') loadSharedScenes(areaId);
            if (tab === 'scenes') loadAreaScenes(areaId);
        }

        function switchDetailTab(tabName, areaId, areaName) {
            activeDetailTab = tabName;
            document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            const tabs = document.querySelectorAll('.detail-tab');
            const tabOrder = ['zones', 'scenes', 'keypads', 'programs', 'shared-scenes'];
            const idx = tabOrder.indexOf(tabName);
            if (tabs[idx]) tabs[idx].classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('detail').classList.toggle('ssc-active', tabName === 'shared-scenes');
            document.getElementById('detail').classList.toggle('scenes-active', tabName === 'scenes');
            if (tabName === 'shared-scenes') loadSharedScenes(areaId);
            if (tabName === 'scenes') loadAreaScenes(areaId);
        }

        // ── Zones ─────────────────────────────────────
        const CT = { 1: { l: 'Dimmer', c: 'badge-dim' }, 7: { l: 'CCO Maintained', c: 'badge-cco' }, 8: { l: 'CCO Pulsed', c: 'badge-cco' }, 12: { l: 'Shade', c: 'badge-shade' }, 26: { l: 'HVAC', c: 'badge-hvac' } };
        const LAYERS = [{ v: 0, l: 'Ambient', c: 'layer-ambient' }, { v: 1, l: 'Task', c: 'layer-task' }, { v: 2, l: 'Accent', c: 'layer-accent' }];

        function layerBadge(val) {
            const l = LAYERS.find(x => x.v === val);
            return l ? `<span class="layer-badge ${l.c}">${l.l}</span>` : '';
        }

        function zonesTableHtml(zones, areaId) {
            const rows = zones.map(z => {
                const ct = CT[z.ControlType] || { l: `Type ${z.ControlType}`, c: 'badge-other' };
                const layerSel = `<select class="layer-select" onchange="patchZone(${z.ZoneID}, 'ZoneLayer', this.value, ${areaId})">
      ${LAYERS.map(l => `<option value="${l.v}" ${l.v === z.ZoneLayer ? 'selected' : ''}>${l.l}</option>`).join('')}
      <option value="4" ${z.ZoneLayer === 4 ? 'selected' : ''}>Internal</option>
    </select>`;
                const loadTypeLabel = z.LoadTypeDesc || `ID:${z.LoadType ?? '─'}`;
                const delBtn = isPl
                    ? `<button class="btn btn-danger" style="padding:1px 7px;font-size:11px" onclick="deleteZone(${z.ZoneID}, '${z.Name.replace(/'/g, "\\'")}', ${areaId})">✕</button>`
                    : '';
                return `<tr>
      <td style="color:var(--text-dim);text-align:center;width:50px">${z.LoadNumber}</td>
      <td class="editable" contenteditable="true"
          data-zone="${z.ZoneID}" data-field="Name" data-area="${areaId}"
          onblur="onEditBlur(this)"
          style="font-weight:500">${z.Name}<span class="edit-hint">✎</span></td>
      <td>${layerSel}</td>
      <td><span class="badge ${ct.c}">${ct.l}</span></td>
      <td style="font-size:11px;color:var(--text-dim)">${loadTypeLabel}</td>
      <td class="editable" contenteditable="true"
          data-zone="${z.ZoneID}" data-field="ZoneDescription" data-area="${areaId}"
          onblur="onEditBlur(this)"
          style="color:var(--text-dim)">${z.ZoneDescription || ''}<span class="edit-hint">✎</span></td>
      <td style="width:40px;text-align:center">${delBtn}</td>
    </tr>`;
            }).join('');
            const addBtn = isPl
                ? `<button class="btn btn-outline" style="padding:2px 10px;font-size:11px;margin-left:8px" onclick="openAddZone(${areaId})">＋ Zone追加</button>`
                : '';
            const debugBtn = `<button class="btn btn-outline" style="padding:2px 8px;font-size:10px;margin-left:4px;opacity:0.5" onclick="showAreaDebug(${areaId})">🔍 DB比較</button>`;
            return `<div style="padding:0">
    <div class="card-header" style="display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--surface2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);border-bottom:1px solid var(--border)">
      Loads / Zones <span class="count">${zones.length}</span>${addBtn}${debugBtn}
      <span style="margin-left:auto;font-size:10px;color:var(--text-dim);font-weight:400;text-transform:none">名前・説明はクリックして編集</span>
    </div>
    <table><tr><th>Load#</th><th>Zone Name</th><th>Layer</th><th>Control Type</th><th>Load Type</th><th>Description</th><th></th></tr>${rows}</table>
    <div id="debug-panel-${areaId}" style="display:none;padding:10px;font-size:10px;font-family:monospace;white-space:pre-wrap;color:var(--text-dim);border-top:1px solid var(--border);max-height:400px;overflow-y:auto"></div>
  </div>`;
        }

        function renderZonesCard(zones, areaId) {
            if (!zones.length) return '';
            return `<div class="card">${zonesTableHtml(zones, areaId)}</div>`;
        }

        async function onEditBlur(cell) {
            const zoneId = parseInt(cell.dataset.zone);
            const field = cell.dataset.field;
            const areaId = parseInt(cell.dataset.area);
            // Remove the hint span from value
            const spans = cell.querySelectorAll('.edit-hint');
            let val = cell.textContent;
            spans.forEach(s => { val = val.replace(s.textContent, ''); });
            val = val.trim();
            await patchZone(zoneId, field, val, areaId, false);
        }

        async function patchZone(zoneId, field, value, areaId, reload = true) {
            const body = {};
            body[field] = field === 'ZoneLayer' ? parseInt(value) : value;
            const res = await fetch(`/api/zone/${zoneId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (!res.ok) { toast('保存失敗', 'red'); return; }
            isDirty = true;
            document.getElementById('save-btn').disabled = !isPl;
            // Refresh dirty badge
            const db = document.getElementById('dirty-badge');
            if (db) db.style.display = 'inline-block';
            else {
                const bar = document.getElementById('place-bar');
                const span = document.createElement('span');
                span.id = 'dirty-badge';
                span.style.cssText = 'display:inline-block;background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;';
                span.textContent = '● 未保存';
                bar.appendChild(span);
            }
            toast('更新しました');
            _updateUndoButtons();
            if (reload) await loadDetail(areaId, '');
        }

        // ── Scenes (chip helper – used in station cards) ──────────────────────
        function scenesBodyHtml(scenes) {
            const chips = scenes.map(s => `<div class="scene-chip">
    <span class="scene-num ${s.Number === 0 ? 'scene-off' : 'scene-on'}">${s.Number === 0 ? 'Off' : s.Number}</span>
    <span>${s.Name}</span></div>`).join('');
            return `<div class="scene-grid">${chips}</div>`;
        }
        function renderScenesCard(scenes) {
            if (!scenes.length) return '';
            return `<div class="card"><div class="card-header">Scenes <span class="count">${scenes.length}</span></div>${scenesBodyHtml(scenes)}</div>`;
        }

        // ── Area Scenes tab ────────────────────────────────────────────────────
        let _ascScenes = [];
        let _ascAmbientZones = [];
        let _ascAreaId = null;
        let _ascCurrentSceneId = null;

        async function loadAreaScenes(areaId) {
            const panel = document.getElementById('tab-scenes');
            if (!panel) return;
            _ascAreaId = areaId;
            panel.innerHTML = '<div class="loading" style="padding:16px">読み込み中…</div>';
            try {
                const res = await fetch(`/api/area/${areaId}/scenes-full`);
                const d = await res.json();
                _ascScenes = d.scenes || [];
                _ascAmbientZones = d.ambient_zones || [];
                const atLimit = _ascScenes.length >= 16;
                panel.innerHTML = `
<div class="ssc-layout">
  <div style="display:flex;flex-direction:column;width:220px;min-width:160px;flex-shrink:0;border-right:1px solid var(--border)">
    <div style="padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0">
      <button class="btn btn-primary" style="width:100%;font-size:11px;padding:3px 0" onclick="_ascAddScene()"
        ${atLimit ? 'disabled title="上限16個"' : ''}>＋ Scene 追加</button>
    </div>
    <div class="ssc-list" id="asc-list" style="width:auto;border-right:none;flex:1"></div>
  </div>
  <div class="ssc-detail-pane">
    <div id="asc-detail-body" class="ssc-detail-body">
      <div style="color:var(--text-dim);font-size:11px;padding:8px">${_ascScenes.length ? 'シーンを選択してください' : 'Scenesなし'}</div>
    </div>
  </div>
</div>`;
                _renderAscList();
                if (_ascScenes.length) selectAreaScene(_ascScenes[0].SceneID, _ascScenes[0].Name);
            } catch (e) {
                panel.innerHTML = '<div class="loading" style="padding:16px;color:var(--red)">読み込みエラー</div>';
            }
        }

        async function _ascAddScene() {
            const name = prompt('新しいArea Scene名を入力してください:');
            if (!name || !name.trim()) return;
            const res = await fetch(`/api/area/${_ascAreaId}/scenes`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.trim() })
            });
            const d = await res.json();
            if (!res.ok) { toast(d.error || '追加失敗', 'red'); return; }
            markDirty();
            toast(`"${d.name}" を追加しました`);
            await loadAreaScenes(_ascAreaId);
            selectAreaScene(d.scene_id, d.name);
        }

        function _renderAscList() {
            const listEl = document.getElementById('asc-list');
            if (!listEl) return;
            listEl.innerHTML = _ascScenes.map(s => {
                const numChip = s.Number === 0
                    ? `<span class="scene-num scene-off" style="margin-right:5px;font-size:10px">Off</span>`
                    : `<span class="scene-num scene-on" style="margin-right:5px;font-size:10px">${s.Number}</span>`;
                return `<div class="ssc-list-item" id="ascli-${s.SceneID}"
                    onclick="selectAreaScene(${s.SceneID},'${s.Name.replace(/'/g,"\\'")}')"
                    oncontextmenu="_showCtxMenu(event,[{label:'コピーして追加',action:'_copyAsc('+${s.SceneID}+')'}])"
                >${numChip}${escHtml(s.Name)}</div>`;
            }).join('');
        }

        async function selectAreaScene(sceneId, name) {
            _ascCurrentSceneId = sceneId;
            document.querySelectorAll('#asc-list .ssc-list-item').forEach(el => el.classList.remove('active'));
            const li = document.getElementById(`ascli-${sceneId}`);
            if (li) li.classList.add('active');
            await _loadAscDetail(sceneId);
        }

        // ── Context menu ──────────────────────────────────────────────

        function _showCtxMenu(e, items) {
            e.preventDefault(); e.stopPropagation();
            let m = document.getElementById('ctx-menu');
            if (!m) {
                m = document.createElement('div');
                m.id = 'ctx-menu';
                document.body.appendChild(m);
            }
            m.innerHTML = items.map(it =>
                `<div class="ctx-item" onclick="document.getElementById('ctx-menu').style.display='none';${it.action}">${it.label}</div>`
            ).join('');
            m.style.left = Math.min(e.clientX, window.innerWidth - 170) + 'px';
            m.style.top  = Math.min(e.clientY, window.innerHeight - 60) + 'px';
            m.style.display = 'block';
            setTimeout(() => document.addEventListener('click', () => { m.style.display = 'none'; }, { once: true }), 0);
        }

        async function _copySsc(presetId) {
            const res = await fetch(`/api/preset/${presetId}/copy`, { method: 'POST' });
            const d = await res.json();
            if (!res.ok) { toast(d.error || 'コピー失敗', 'red'); return; }
            markDirty();
            toast(`"${d.name}" を追加しました`);
            await loadSharedScenes(_sscAreaId);
            selectSharedScene(d.preset_id, d.name);
        }

        async function _copyAsc(sceneId) {
            const res = await fetch(`/api/scene/${sceneId}/copy`, { method: 'POST' });
            const d = await res.json();
            if (!res.ok) { toast(d.error || 'コピー失敗', 'red'); return; }
            markDirty();
            toast(`"${d.name}" を追加しました`);
            await loadAreaScenes(_ascAreaId);
            selectAreaScene(d.scene_id, d.name);
        }

        async function _loadAscDetail(sceneId) {
            const body = document.getElementById('asc-detail-body');
            if (!body) return;
            body.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:8px">読み込み中…</div>';
            try {
                const res = await fetch(`/api/scene/${sceneId}/assignments`);
                const assignments = await res.json();
                _renderAscDetail(sceneId, assignments);
            } catch (e) {
                body.innerHTML = '<div style="color:var(--red);font-size:11px;padding:8px">読み込みエラー</div>';
            }
        }

        function _renderAscDetail(sceneId, assignments) {
            const body = document.getElementById('asc-detail-body');
            if (!body) return;
            const scene = _ascScenes.find(s => s.SceneID === sceneId);
            const sceneName = scene ? scene.Name : '';
            const sceneNum = scene ? scene.Number : '';

            // Header with editable name
            let header = `<div style="display:flex;align-items:center;gap:8px;padding:6px 0 10px;border-bottom:1px solid var(--border);margin-bottom:10px">
  <span class="scene-num ${sceneNum === 0 ? 'scene-off' : 'scene-on'}" style="font-size:11px">${sceneNum === 0 ? 'Off' : sceneNum}</span>
  <span id="asc-detail-name" style="font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
        onclick="this.style.display='none';document.getElementById('asc-name-inp').style.display='';document.getElementById('asc-name-inp').focus()"
        title="クリックして編集">${escHtml(sceneName)}</span>
  <input id="asc-name-inp" class="ssc-name-input" style="display:none"
         value="${escHtml(sceneName)}"
         onblur="_ascSaveName(${sceneId},this)"
         onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.style.display='none';document.getElementById('asc-detail-name').style.display='';}">
</div>`;

            if (!_ascAmbientZones.length) {
                body.innerHTML = header + '<div style="color:var(--text-dim);font-size:11px;padding:4px">このエリアにAmbientゾーンがありません</div>';
                return;
            }

            const rows = _ascAmbientZones.map(z => {
                const a = assignments[z.ZoneID];
                const level = a && a.level !== null ? a.level : null;
                const aid = a ? a.aid : null;
                const hasLevel = level !== null;
                const selId = `asc-sel-${sceneId}-${z.ZoneID}`;
                const numId = `asc-num-${sceneId}-${z.ZoneID}`;
                // Determine which preset option to show, or "custom"
                const PRESETS = [100, 75, 50, 25, 0];
                const isPreset = hasLevel && PRESETS.includes(level);
                const selVal = hasLevel ? (isPreset ? level : 'custom') : 'unaffected';
                const presetOpts = PRESETS.map(v =>
                    `<option value="${v}"${selVal == v ? ' selected' : ''}>${v}%</option>`
                ).join('');
                const customOpt = `<option value="custom"${selVal === 'custom' ? ' selected' : ''}>カスタム</option>`;
                return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)">
  <span style="font-size:11px;width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0"
        title="${escHtml(z.Name)}">${escHtml(z.Name)}</span>
  <select id="${selId}" style="font-size:11px;flex:1;min-width:90px;max-width:120px"
          onchange="_ascSelChange(this,${sceneId},${z.ZoneID},${aid ?? 'null'})">
    <option value="unaffected"${!hasLevel ? ' selected' : ''}>Unaffected</option>
    ${presetOpts}
    ${customOpt}
  </select>
  <input type="number" id="${numId}" min="0" max="100" value="${hasLevel ? level : ''}"
         style="width:46px;font-size:11px;display:${(!hasLevel || isPreset) ? 'none' : ''}"
         placeholder="0-100"
         onchange="_ascPatchLevel(${aid ?? 'null'},this.value,${sceneId},${z.ZoneID})"
         onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">
  <span style="font-size:10px;color:var(--text-dim);display:${hasLevel ? '' : 'none'}" id="asc-pct-${sceneId}-${z.ZoneID}">%</span>
</div>`;
            }).join('');

            body.innerHTML = header + `<div>${rows}</div>`;
        }

        async function _ascSelChange(sel, sceneId, zoneId, existingAid) {
            const val = sel.value;
            const numId = `asc-num-${sceneId}-${zoneId}`;
            const pctId = `asc-pct-${sceneId}-${zoneId}`;
            const numEl = document.getElementById(numId);
            const pctEl = document.getElementById(pctId);

            if (val === 'unaffected') {
                if (numEl) numEl.style.display = 'none';
                if (pctEl) pctEl.style.display = 'none';
                if (existingAid !== null) {
                    // Keep row but set cmd_type=1 (LD requires row even for Unaffected)
                    const res = await fetch(`/api/assignment/${existingAid}`, {
                        method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ unaffected: true }),
                    });
                    if (!res.ok) { const d = await res.json().catch(()=>({})); toast(d.error||'更新失敗','red'); }
                    markDirty(); _updateUndoButtons();
                    _loadAscDetail(sceneId);
                }
                return;
            }
            if (val === 'custom') {
                if (numEl) {
                    numEl.style.display = '';
                    // Clear value so onchange always fires regardless of typed value
                    numEl.value = existingAid !== null ? numEl.value : '';
                    numEl.focus();
                }
                if (pctEl) pctEl.style.display = '';
                return;
            }
            // Preset value selected
            if (numEl) numEl.style.display = 'none';
            if (pctEl) pctEl.style.display = '';
            await _ascSetLevel(parseInt(val), sceneId, zoneId, existingAid);
        }

        async function _ascSetLevel(level, sceneId, zoneId, existingAid) {
            if (isNaN(level) || level < 0 || level > 100) return;
            if (existingAid !== null) {
                const res = await fetch(`/api/assignment/${existingAid}`, {
                    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cmd_type: 2, level, fade: 2, delay: 0 }),
                });
                if (!res.ok) {
                    const d = await res.json().catch(() => ({}));
                    toast(d.error || '更新失敗', 'red');
                    _loadAscDetail(sceneId);
                    return;
                }
            } else {
                const res = await fetch(`/api/scene/${sceneId}/zone`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ zone_id: zoneId, level, fade: 2, delay: 0 }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    toast(err.error || '追加エラー', 'red');
                    _loadAscDetail(sceneId);
                    return;
                }
            }
            markDirty(); _updateUndoButtons();
            _loadAscDetail(sceneId);
        }

        async function _ascPatchLevel(aid, level, sceneId, zoneId) {
            const selEl = document.getElementById(`asc-sel-${sceneId}-${zoneId}`);
            await _ascSetLevel(parseInt(level), sceneId, zoneId, aid);
        }

        async function _ascSaveName(sceneId, inp) {
            const newName = inp.value.trim();
            const nameEl = document.getElementById('asc-detail-name');
            inp.style.display = 'none';
            if (nameEl) nameEl.style.display = '';
            if (!newName) return;
            const res = await fetch(`/api/scene/${sceneId}/name`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: newName }),
            });
            if (!res.ok) { toast('名前の更新に失敗しました', 'red'); return; }
            // Update local cache
            const s = _ascScenes.find(x => x.SceneID === sceneId);
            if (s) s.Name = newName;
            if (nameEl) nameEl.textContent = newName;
            // Update list item
            const li = document.getElementById(`ascli-${sceneId}`);
            if (li) {
                const numChip = s && s.Number === 0
                    ? `<span class="scene-num scene-off" style="margin-right:5px;font-size:10px">Off</span>`
                    : `<span class="scene-num scene-on" style="margin-right:5px;font-size:10px">${s ? s.Number : ''}</span>`;
                li.innerHTML = numChip + escHtml(newName);
            }
            markDirty(); _updateUndoButtons();
            toast('更新しました');
        }

        // ── Shared Scenes ─────────────────────────────
        let _sscPresets = [];   // loaded preset list for current area
        let _sscAreaId = null;
        let _sscCategory = 'zones';   // selected category in LD-style view
        let _sscCondData = null;       // cached condition data

        function _sscExport(fmt) {
            window.location.href = `/api/shared-scenes/export?format=${fmt}`;
        }

        async function _sscImport(input) {
            const file = input.files[0];
            if (!file) return;
            input.value = '';
            const fd = new FormData();
            fd.append('file', file);
            const res = await fetch('/api/shared-scenes/import', { method: 'POST', body: fd });
            const d = await res.json();
            if (!res.ok) { toast(d.error || 'インポート失敗', 'red'); return; }
            markDirty();
            let msg = `インポート完了: シーン ${d.created_scenes}件作成、アサイン ${d.updated_assignments}件更新`;
            if (d.errors && d.errors.length) msg += `\n警告 ${d.errors.length}件`;
            toast(msg, d.errors && d.errors.length ? 'orange' : undefined);
            if (d.errors && d.errors.length) console.warn('Import warnings:', d.errors);
            await loadSharedScenes(_sscAreaId);
        }

        async function loadSharedScenes(areaId) {
            const panel = document.getElementById('tab-shared-scenes');
            if (!panel) return;
            _sscAreaId = areaId;
            panel.innerHTML = '<div class="loading" style="padding:16px">読み込み中…</div>';
            try {
                const res = await fetch(`/api/area/${areaId}/shared-presets`);
                _sscPresets = await res.json();
                panel.innerHTML = `
<div class="ssc-layout" style="flex:1;min-height:0">
  <div style="display:flex;flex-direction:column;width:220px;min-width:160px;flex-shrink:0;border-right:1px solid var(--border)">
    <div style="padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0">
      <button class="btn btn-primary" style="width:100%;font-size:11px;padding:3px 0" onclick="_sscAddPreset()"
        ${_sscPresets.length >= 100 ? 'disabled title="上限100個"' : ''}>＋ Shared Scene 追加</button>
    </div>
    <div class="ssc-list" id="ssc-list" style="width:auto;border-right:none;flex:1"></div>
  </div>
  <div class="ssc-detail-pane">
    <div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;padding:4px 8px;border-bottom:1px solid var(--border);flex-shrink:0">
      <span style="font-size:10px;color:var(--text-dim);margin-right:auto">全エリア対象</span>
      <button class="btn" style="font-size:10px;padding:2px 7px" onclick="_sscExport('xlsx')">Excel出力</button>
      <button class="btn" style="font-size:10px;padding:2px 7px" onclick="_sscExport('csv')">CSV出力</button>
      <label class="btn" style="font-size:10px;padding:2px 7px;cursor:pointer;margin:0">
        取込<input type="file" accept=".xlsx,.csv" style="display:none" onchange="_sscImport(this)">
      </label>
    </div>
    <div id="ssc-detail-body" class="ssc-detail-body">
      <div style="color:var(--text-dim);font-size:11px;padding:8px">シーンを選択してください</div>
    </div>
  </div>
</div>`;
                _renderSscList();
                if (_sscPresets.length) selectSharedScene(_sscPresets[0].PresetID, _sscPresets[0].Name);
            } catch (e) {
                panel.innerHTML = '<div class="loading" style="padding:16px;color:var(--red)">読み込みエラー</div>';
            }
        }

        async function _sscAddPreset() {
            const name = prompt('新しいShared Scene名を入力してください:');
            if (!name || !name.trim()) return;
            const res = await fetch(`/api/area/${_sscAreaId}/shared-presets`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.trim() })
            });
            const d = await res.json();
            if (!res.ok) { toast(d.error || '追加失敗', 'red'); return; }
            markDirty();
            toast(`"${d.name}" を追加しました`);
            await loadSharedScenes(_sscAreaId);
            selectSharedScene(d.preset_id, d.name);
        }

        function _renderSscList() {
            const listEl = document.getElementById('ssc-list');
            if (!listEl) return;
            listEl.innerHTML = _sscPresets.map(p =>
                `<div class="ssc-list-item" id="sscli-${p.PresetID}"
                      onclick="selectSharedScene(${p.PresetID},'${p.Name.replace(/'/g,"\\'")}')"
                      oncontextmenu="_showCtxMenu(event,[{label:'コピーして追加',action:'_copySsc('+${p.PresetID}+')'}])"
                >${escHtml(p.Name)}</div>`
            ).join('');
        }

        let _sscCurrentPresetId = null;
        let _sscCurrentName = '';

        async function selectSharedScene(presetId, name) {
            _sscCurrentPresetId = presetId;
            _sscCurrentName = name || (_sscPresets.find(p => p.PresetID === presetId)?.Name ?? '');
            // Highlight list item
            document.querySelectorAll('.ssc-list-item').forEach(el => el.classList.remove('active'));
            const li = document.getElementById(`sscli-${presetId}`);
            if (li) li.classList.add('active');
            // Load assignments (name is rendered inside body)
            await _loadSharedSceneDetail(presetId);
        }

        async function _loadSharedSceneDetail(presetId) {
            const body = document.getElementById('ssc-detail-body');
            if (!body) return;
            body.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:8px">読み込み中…</div>';
            try {
                const [assRes, varRes, cd] = await Promise.all([
                    fetch(`/api/preset/${presetId}/assignments?shared=1`),
                    loadVariables(),
                    loadCondData(),
                ]);
                const assignments = await assRes.json();
                _assignmentDataMap = {};
                assignments.forEach(a => { _assignmentDataMap[a.PresetAssignmentID] = a; });
                _sscCondData = cd;
                _renderSharedSceneAssignments(presetId, assignments, varRes, cd);
            } catch (e) {
                const b = document.getElementById('ssc-detail-body');
                if (b) b.innerHTML = '<div style="color:var(--red);font-size:11px;padding:8px">読み込みエラー</div>';
            }
        }

        // ── SSC category (LD-style) rendering ─────────────────────────────────────
        function _sscSetCategory(cat, presetId) {
            _sscCategory = cat;
            _loadSharedSceneDetail(presetId);
        }

        async function _sscToggleItem(checked, presetId, itemType, itemId, ctrl, existingAid) {
