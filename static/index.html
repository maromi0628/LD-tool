        // ── Drag-and-drop action reorder ─────────────

        let _dragActionId = null;
        let _dragTriggerId = null;

        function actionDragStart(event, el) {
            _dragActionId = parseInt(el.dataset.actionId);
            _dragTriggerId = parseInt(el.dataset.triggerId);
            el.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', String(_dragActionId));
        }

        function actionDragOver(event, el) {
            const elTriggerId = parseInt(el.dataset.triggerId);
            const elActionId = parseInt(el.dataset.actionId);
            if (elTriggerId !== _dragTriggerId || elActionId === _dragActionId) return;
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const rect = el.getBoundingClientRect();
            el.classList.remove('drag-over-top', 'drag-over-bottom');
            el.classList.add(event.clientY < rect.top + rect.height / 2 ? 'drag-over-top' : 'drag-over-bottom');
        }

        function actionDragLeave(event, el) {
            el.classList.remove('drag-over-top', 'drag-over-bottom');
        }

        function actionDragEnd(event, el) {
            document.querySelectorAll('.prog-line').forEach(e =>
                e.classList.remove('dragging', 'drag-over-top', 'drag-over-bottom'));
            _dragActionId = null;
            _dragTriggerId = null;
        }

        async function actionDrop(event, el) {
            event.preventDefault();
            el.classList.remove('drag-over-top', 'drag-over-bottom');
            const targetId = parseInt(el.dataset.actionId);
            const triggerId = parseInt(el.dataset.triggerId);
            if (!_dragActionId || triggerId !== _dragTriggerId || targetId === _dragActionId) return;

            // Collect ordered action IDs at this trigger level from DOM
            const allEls = [...document.querySelectorAll(`.prog-line[data-trigger-id="${triggerId}"]`)];
            const ordered = allEls.map(e => parseInt(e.dataset.actionId)).filter(id => !isNaN(id));
            const without = ordered.filter(id => id !== _dragActionId);
            const targetIdx = without.indexOf(targetId);
            if (targetIdx === -1) return;
            const rect = el.getBoundingClientRect();
            const insertIdx = event.clientY < rect.top + rect.height / 2 ? targetIdx : targetIdx + 1;
            without.splice(insertIdx, 0, _dragActionId);

            const res = await fetch(`/api/trigger/${triggerId}/reorder`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action_ids_ordered: without }),
            });
            const d = await res.json();
            if (d.error) { showToast('エラー: ' + d.error); return; }
            await reloadPrograms();
        }

                out += `  ${k}: ${v1} | ${v2}${diff}\n`;
            });

            out += `\n=== tblSwitchLeg比較 ===\n`;
            slKeys.forEach(k => {
                const v1 = sl1[k], v2 = sl2[k];
                const diff = String(v1) !== String(v2) ? ' ← 差異' : '';
                out += `  ${k}: ${v1} | ${v2}${diff}\n`;

        async function crossTableCompare(existingId, newId) {
            const [r1, r2] = await Promise.all([
                fetch(`/api/zone-cross-table/${existingId}`).then(r => r.json()),
                fetch(`/api/zone-cross-table/${newId}`).then(r => r.json()),
            ]);
            const tableKeys = Object.keys(r1);
            let out = `=== 関連テーブル比較 (既存:${existingId} vs 新:${newId}) ===\n\n`;
            tableKeys.forEach(tbl => {
                const rows1 = r1[tbl] || [];
                const rows2 = r2[tbl] || [];
                const cnt1 = rows1.length, cnt2 = rows2.length;
                const mark = cnt1 !== cnt2 ? ' ← 件数差異!' : '';
                out += `[${tbl}] 既存:${cnt1}件 / 新:${cnt2}件${mark}\n`;
                if (cnt1 > 0) {
                    rows1.forEach(r => { out += `  既存: ${JSON.stringify(r)}\n`; });
                }
                if (cnt2 > 0) {
                    rows2.forEach(r => { out += `  新規: ${JSON.stringify(r)}\n`; });
                }
            });
            showTextModal('関連テーブル比較', out);
        }

        async function checkProblemTables(existingId, newId) {
            const tables = ['tblDaylightable', 'tblFixtureGroup', 'tblObjectToProcessorMap'];
            let out = `=== 問題テーブル詳細確認 ===\n`;
            out += `既存ZoneID: ${existingId}  新ZoneID: ${newId}\n\n`;
            for (const tbl of tables) {
                const r = await fetch(`/api/table-schema/${tbl}`).then(x => x.json());
                out += `━━━ [${tbl}] ━━━\n`;
                if ((r.columns || []).length === 0) { out += '  ⚠ テーブルが存在しないか取得不可\n\n'; continue; }
                out += `  カラム: ${(r.columns || []).map(c => c.COLUMN_NAME).join(', ')}\n`;
                out += `  全サンプル(TOP3):\n`;
                if ((r.sample || []).length === 0) { out += '    (0件 - テーブルは空)\n'; }
                else if (r.sample[0].__error__) { out += `    エラー: ${r.sample[0].__error__}\n`; }
                else { r.sample.forEach(s => { out += `    ${JSON.stringify(s)}\n`; }); }
                out += '\n';
            }
            // Also check all tables for any entries referencing existingId or newId
            out += `\n=== 全テーブル検索: ZoneID/SwitchLegID参照 ===\n`;
            const schemaR = await fetch('/api/schema-inspect').then(x => x.json());
            const zoneCols = schemaR.zone_related_columns || [];
            // Group by table
            const byTable = {};
            zoneCols.forEach(c => { if (!byTable[c.TABLE_NAME]) byTable[c.TABLE_NAME] = []; byTable[c.TABLE_NAME].push(c.COLUMN_NAME); });
            for (const [tbl, cols] of Object.entries(byTable)) {
                if (['tblZone', 'tblSwitchLeg', 'tblZonable'].includes(tbl)) continue; // already checked
                for (const col of cols) {
                    const ids = [existingId, existingId + 1, existingId + 2, existingId + 3, newId, newId + 1, newId + 2, newId + 3];
                    const r2 = await fetch(`/api/table-search`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table: tbl, column: col, ids })
                    }).then(x => x.json());
                    if (r2.rows && r2.rows.length > 0) {
                        out += `  [${tbl}].${col}:\n`;
                        r2.rows.forEach(row => { out += `    ${JSON.stringify(row)}\n`; });
                    }
                }
            }
            showTextModal('問題テーブル確認', out);
        }

        // ── Save ─────────────────────────────────────
        async function saveFile() {
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = '保存中...';
            try {
                const res = await fetch('/api/save', { method: 'POST' });
                if (!res.ok) {
                    const d = await res.json().catch(() => ({}));
                    toast(d.error || '保存失敗', 'red');
                    btn.disabled = false;
                    btn.textContent = '💾 保存';
                    return;
                }
                const blob = await res.blob();
                const disp = res.headers.get('Content-Disposition') || '';
                const m = disp.match(/filename[^=]*=["']?([^"';\n]+)/);
                const filename = m ? m[1] : 'project.pl';

                if ('showSaveFilePicker' in window) {
                    // File System Access API: lets user choose save location (can overwrite original)
                    let handle;
                    try {
                        handle = await window.showSaveFilePicker({
                            suggestedName: filename,
                            types: [{ description: 'Lutron Project File', accept: { 'application/octet-stream': ['.pl'] } }]
                        });
                    } catch(e) {
                        if (e.name === 'AbortError') { btn.disabled = false; btn.textContent = '💾 保存'; return; }
                        throw e;
                    }
                    const writable = await handle.createWritable();
                    await writable.write(blob);
                    await writable.close();
                } else {
                    // Fallback: force browser download
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }

                btn.textContent = '💾 保存';
                isDirty = false;
                const db = document.getElementById('dirty-badge');
                if (db) db.remove();
                toast('保存しました ✓');
            } catch(e) {
                toast('保存失敗: ' + e.message, 'red');
                btn.disabled = false;
                btn.textContent = '💾 保存';
            }
        }

        async function _loadActionAssignments(uid, pmId, presetId) {

        // ── Action picker (hierarchical hover menu, reuses condition picker CSS/infra) ─

        async function openActionPicker(event, uid, pmId, presetId) {
            event.stopPropagation();
            _closeCondPickerMenus();

            const [vars, cd] = await Promise.all([loadVariables(), loadCondData()]);
            const assRes = await fetch(`/api/preset/${presetId}/assignments`);
            const assignments = assRes.ok ? await assRes.json() : [];

            // Build sets of already-assigned IDs per object type
            const asn = (ot) => new Set(assignments.filter(a => a.AssignableObjectType === ot).map(a => a.AssignableObjectID));
            const asnZones = new Set([...assignments.filter(a => a.AssignableObjectType === 15 || a.AssignableObjectType === 198).map(a => a.AssignableObjectID)]);
            const asnAreas = asn(2), asnShades = asn(133), asnDevs = asn(5), asnHvac = asn(211);

            const categories = [
                {
                    label: 'Lighting - Zones',
                    items: (cd.zones || []).filter(z => !asnZones.has(z.ZoneID)).map(z => ({
                        label: `${_areaLabel(z.AreaName, z.ParentAreaName)} ▶ ${z.ZoneName}`,
                        type: 'zone', data: { id: z.ZoneID, name: z.ZoneName, ctrl: z.ControlType || 1 },
                    })),
                },
                {
                    label: 'Lighting - Areas',
                    items: (cd.areas || []).filter(a => uid.startsWith('ssc-') || !asnAreas.has(a.AreaID)).map(a => ({
                        label: _areaLabel(a.AreaName, a.ParentAreaName),
                        type: 'area', data: { id: a.AreaID, name: a.AreaName || a.ParentAreaName },
                    })),
                },
                {
                    label: 'Contact Closure Outputs',
                    items: (cd.cco || []).filter(z => !asnZones.has(z.ZoneID)).map(z => ({
                        label: `${_areaLabel(z.AreaName, z.ParentAreaName)} ▶ ${z.ZoneName}`,
                        type: 'cco', data: { id: z.ZoneID, name: z.ZoneName, ctrl: z.ControlType || 7 },
                    })),
                },
                {
                    label: 'Shade Groups',
                    items: (cd.shades || []).filter(s => !asnShades.has(s.ShadeGroupID)).map(s => ({
                        label: s.ShadeName + (s.AreaName ? ` (${s.AreaName})` : ''),
                        type: 'shade', data: { id: s.ShadeGroupID, name: s.ShadeName },
                    })),
                },
                {
                    label: 'Sequences',
                    items: (cd.sequences || []).map(s => ({
                        label: s.SequenceName,
                        type: 'sequence', data: { id: s.SequenceID, name: s.SequenceName },
                    })),
                },
                {
                    label: 'Variables',
                    items: vars.map(v => ({
                        label: v.Name,
                        type: 'variable', data: { id: v.VariableID, name: v.Name, states: v.states },
                    })),
                },
                {
                    label: 'HVAC Zones',
                    items: (cd.hvac || []).filter(h => !asnHvac.has(h.ZoneID)).map(h => ({
                        label: `${_areaLabel(h.AreaName, h.ParentAreaName)} ▶ ${h.ZoneName}`,
                        type: 'hvac', data: { id: h.ZoneID, name: h.ZoneName },
                    })),
                },
                {
                    label: 'Devices',
                    items: (cd.devices || []).filter(d => !asnDevs.has(d.ControlStationDeviceID)).map(d => ({
                        label: `${_areaLabel(d.AreaName, d.ParentAreaName)} ▶ ${d.DeviceName}`,
                        type: 'device', data: { id: d.ControlStationDeviceID, name: d.DeviceName },
                    })),
                },
                {
                    label: 'Timeclocks',
                    items: (cd.timeclocks || []).map(r => ({
                        label: r.ModeName ? `${r.TimeclockName} / ${r.ModeName}` : r.TimeclockName,
                        type: 'timeclock', data: { id: r.TimeClockID, name: r.TimeclockName, modeId: r.TimeClockModeID },
                    })),
                },
                {
                    label: 'Occupancy Settings',
                    items: (cd.occupancy || []).map(r => ({
                        label: r.OGName || _areaLabel(r.AreaName, r.ParentAreaName),
                        type: 'occupancy', data: { id: r.OccupancyGroupID, name: r.OGName || r.AreaName },
                    })),
                },
                {
                    label: 'Room Properties',
                    items: (cd.rooms || []).map(r => ({
                        label: r.RoomName,
                        type: 'roomprop', data: { id: r.RentableSpaceID, name: r.RoomName },
                    })),
                },
                {
                    label: 'Ethernet Devices',
                    items: (cd.integrations || []).map(ic => ({
                        label: ic.AreaName ? `${ic.AreaName} ▶ ${ic.CommandName}` : ic.CommandName,
                        type: 'integration', data: { id: ic.IntegrationCommandSetID, name: ic.CommandName },
                    })),
                },
            ];

            // Build menu (same structure & CSS as condition picker)
            const primary = document.createElement('div');
            primary.className = 'cond-picker-menu';
            primary.addEventListener('mouseenter', _clearCondSubTimer);
            _condPickerMenus[0] = primary;

            categories.forEach(cat => {
                const hasItems = cat.items.length > 0;
                const el = document.createElement('div');
                el.className = 'cpi';
                el.innerHTML = `<span>${cat.label}</span><span class="cpi-arrow">▶</span>`;

                el.addEventListener('mouseenter', () => {
                    _clearCondSubTimer();
                    _condPickerMenus[1]?.remove();
                    _condPickerMenus[1] = null;

                    const sub = document.createElement('div');
                    sub.className = 'cond-picker-menu cond-sub-menu';
                    sub.addEventListener('mouseenter', _clearCondSubTimer);
                    sub.addEventListener('mouseleave', _scheduleCondSubClose);
                    _condPickerMenus[1] = sub;

                    if (!hasItems) {
                        const empty = document.createElement('div');
                        empty.className = 'cpi cpi-disabled';
                        empty.innerHTML = '<span style="font-style:italic">データなし</span>';
                        sub.appendChild(empty);
                    }

                    cat.items.forEach(item => {
                        const sEl = document.createElement('div');
                        sEl.className = 'cpi';
                        sEl.innerHTML = `<span>${item.label}</span>`;
                        sEl.addEventListener('click', e => {
                            e.stopPropagation();
                            _closeCondPickerMenus();
                            _openActionParamModal(uid, pmId, presetId, item.type, item.data);
                        });
                        sub.appendChild(sEl);
                    });

                    const prRect = primary.getBoundingClientRect();
                    const elRect = el.getBoundingClientRect();
                    const vh = window.innerHeight;
                    const subH = Math.min(cat.items.length * 27 + 6, 320);
                    const top = Math.min(elRect.top, vh - subH - 8);
                    sub.style.cssText = `top:${top}px;left:${prRect.right + 2}px`;
                    document.body.appendChild(sub);
                });

                el.addEventListener('mouseleave', _scheduleCondSubClose);
                primary.appendChild(el);
            });

            const rect = event.currentTarget?.getBoundingClientRect?.() || { bottom: event.clientY, left: event.clientX };
            const vh = window.innerHeight;
            const ph = categories.length * 27 + 6;
            const top = Math.min(rect.bottom + 2, vh - ph - 8);
            primary.style.cssText = `top:${top}px;left:${rect.left}px`;
            document.body.appendChild(primary);

            setTimeout(() => document.addEventListener('click', _closeCondPickerMenus, { once: true }), 0);
        }

        let _actionParamContext = null;  // { uid, pmId, presetId, type, itemData, editAid }
        let _assignmentDataMap = {};    // aid → assignment data (populated in _loadActionAssignments)

        function _openActionParamModal(uid, pmId, presetId, type, itemData, editAid) {
            _actionParamContext = { uid, pmId, presetId, type, itemData, editAid: editAid || null };
            const existing = document.getElementById('action-param-overlay');
            if (existing) existing.remove();

            let paramsHtml = '';
            if (type === 'zone' || type === 'cco') {
                const ctrl = itemData.ctrl || 1;
                if (ctrl === 8) {
                    const PULSE_OPTS = [0, 0.25, 0.5, 0.75, 1, 1.5, 2, 2.5, 3, 3.5, 4, 4.5, 5, 5.5, 6, 10, 20];
                    const pOpts = PULSE_OPTS.map(v => {
                        const lbl = v === 0 ? 'Unaffected' : v.toFixed(2) + 's';
                        return `<option value="${v}">${lbl}</option>`;
                    }).join('');
                    paramsHtml = `<label>Settings</label><select id="ap-fade">${pOpts}</select>`;
                } else if (ctrl === 7) {
                    paramsHtml = `
        <label>状態</label>
        <select id="ap-level"><option value="0">Open</option><option value="100">Close</option></select>`;
                } else if (ctrl === 2) {
                    paramsHtml = `
        <label>状態</label>
        <select id="ap-level"><option value="100">On</option><option value="0">Off</option></select>
        <label>Fade (s)</label><input id="ap-fade" type="number" min="0" max="3600" value="0">`;
                } else {
                    paramsHtml = `
        <label>Level (%)</label><input id="ap-level" type="number" min="0" max="100" value="100">
        <label>Fade (s)</label><input id="ap-fade" type="number" min="0" max="3600" value="0">`;
                }
                paramsHtml += `<label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;

            } else if (type === 'area') {
                if (uid.startsWith('ssc-')) {
                    // Shared Scene: scene is implicit from preset SortOrder, only fade/delay needed
                    paramsHtml = `
      <label>Fade (s)</label><input id="ap-fade" type="number" min="0" max="3600" value="2">
      <label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;
                } else {
                    paramsHtml = `
      <label>Level (%)</label><input id="ap-level" type="number" min="0" max="100" value="100">
      <label>Fade (s)</label><input id="ap-fade" type="number" min="0" max="3600" value="0">
      <label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;
                }

            } else if (type === 'shade') {
                paramsHtml = `
      <label>位置 (%)</label><input id="ap-level" type="number" min="0" max="100" value="0">
      <label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;

            } else if (type === 'sequence') {
                const cOpts = _SEQ_CMDS.map(c => `<option value="${c.v}">${c.label}</option>`).join('');
                paramsHtml = `
      <label>コマンド</label><select id="ap-cmd">${cOpts}</select>
      <label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;

            } else if (type === 'variable') {
                const stOpts = (itemData.states || []).map(s =>
                    `<option value="${s.VariableStateID}">${s.Name}</option>`).join('');
                paramsHtml = `
      <label>ステート</label>
      <select id="ap-state">${stOpts || '<option value="">ステートなし</option>'}</select>
      <label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;

            } else if (type === 'hvac') {
                paramsHtml = `<span style="grid-column:1/-1;color:var(--text-dim);font-size:11px">HVAC — Unaffected (パラメータなし)</span>`;

            } else if (type === 'device') {
                paramsHtml = `
      <label>状態</label>
      <select id="ap-level"><option value="1">Lock</option><option value="2">Unlock</option></select>
      <label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;

            } else if (type === 'timeclock') {
                paramsHtml = `
      <label>コマンド</label>
      <select id="ap-cmd">
        <option value="1">Enable</option>
        <option value="0">Disable</option>
      </select>
      <label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;

            } else if (type === 'occupancy') {
                paramsHtml = `
      <label>状態</label>
      <select id="ap-level">
        <option value="1">Occupied</option>
        <option value="2">Unoccupied</option>
        <option value="4">Bypass</option>
      </select>
      <label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;

            } else if (type === 'roomprop') {
                const currentProps = itemData.currentProps || {};
                // Confirmed from LD scene names:
                // PT76=RoomState(152):0=CheckIn,1=CheckOut  PT77=Presence(149):1=On,0=Off
                // PT78=FGE(154):1=True,0=False  PT79=Turndown(155):1=Enabled,0=Disabled
                // PT80=DND(151):1=Enabled,0=Disabled  PT81=MUR(153):1=Enabled,0=Disabled
                const propDefs = [
                    [152, 'Room State',       [[0, 'Check In'], [1, 'Check Out']]],
                    [151, 'Do Not Disturb',   [[1, 'Enabled'],  [0, 'Disabled']]],
                    [153, 'Make Up Room',     [[1, 'Enabled'],  [0, 'Disabled']]],
                    [154, 'First Guest Entry',[[1, 'True'],     [0, 'False']]],
                    [155, 'Turndown Service', [[1, 'Enabled'],  [0, 'Disabled']]],
                    [157, 'Automation',       [[1, 'Enabled'],  [0, 'Disabled']]],
                    [149, 'Presence Status',  [[1, 'On'],       [0, 'Off']]],
                ];
                paramsHtml = propDefs.map(([pid, pname, opts]) => {
                    const cur = (currentProps[pid] !== undefined && currentProps[pid] !== null) ? currentProps[pid] : '';
                    const optHtml = opts.map(([v, l]) => `<option value="${v}"${String(cur) === String(v) ? ' selected' : ''}>${l}</option>`).join('');
                    return `<label>${pname}</label>
      <select id="ap-prop-${pid}">
        <option value=""${cur === '' ? ' selected' : ''}>Unaffected</option>
        ${optHtml}
      </select>`;
                }).join('');

            } else if (type === 'integration') {
                paramsHtml = `<label>Delay (s)</label><input id="ap-delay" type="number" min="0" max="3600" value="0">`;
            }

            const overlay = document.createElement('div');
            overlay.className = 'scene-picker-overlay';
            overlay.id = 'action-param-overlay';
            overlay.innerHTML = `
    <div class="scene-picker-modal" onclick="event.stopPropagation()" style="max-width:340px">
      <div class="scene-picker-header">
        <span>${itemData.name}</span>
        <button onclick="document.getElementById('action-param-overlay').remove()">✕</button>
      </div>
      <div style="padding:16px;display:grid;grid-template-columns:auto 1fr;gap:8px 12px;align-items:center;font-size:11px">
        ${paramsHtml}
      </div>
      <div class="scene-picker-footer">
        <button class="btn btn-primary" style="font-size:11px;padding:4px 12px"
          onclick="_confirmActionParam()">追加</button>
        <button class="btn" style="font-size:11px;padding:4px 10px;background:var(--surface2);color:var(--text-dim)"
          onclick="document.getElementById('action-param-overlay').remove()">キャンセル</button>
      </div>
    </div>`;
            overlay.addEventListener('click', () => overlay.remove());
            document.body.appendChild(overlay);
        }

        async function _confirmActionParam() {
            if (!_actionParamContext) return;
            const { uid, pmId, presetId, type, itemData, editAid } = _actionParamContext;

            const lvlEl = document.getElementById('ap-level');
            const fadeEl = document.getElementById('ap-fade');
            const delayEl = document.getElementById('ap-delay');
            const cmdEl = document.getElementById('ap-cmd');
            const stateEl = document.getElementById('ap-state');

            const level = lvlEl ? parseInt(lvlEl.value) : 100;
            const fade = fadeEl ? parseFloat(fadeEl.value) : 0;
            const delay = delayEl ? parseFloat(delayEl.value) : 0;

            let body = { item_type: type, item_id: itemData.id, delay };
            if (type === 'sequence') {
                body.cmd_type = cmdEl ? parseInt(cmdEl.value) : 21;
            } else if (type === 'variable') {
                if (!stateEl || !stateEl.value) { toast('ステートを選択してください', 'red'); return; }
                body.state_id = parseInt(stateEl.value);
            } else if (type === 'timeclock') {
                body.cmd_type = cmdEl ? parseInt(cmdEl.value) : 1;
            } else if (type === 'occupancy') {
                body.level = level;
            } else if (type === 'roomprop') {
                body.props = {};
                [152, 151, 153, 154, 155, 157, 149].forEach(pid => {
                    const el = document.getElementById(`ap-prop-${pid}`);
                    if (el) {
                        body.props[String(pid)] = el.value === '' ? null : parseInt(el.value);
                    }
                });
                delete body.delay;
            } else if (type !== 'hvac' && type !== 'integration') {
                const ctrl = (itemData && itemData.ctrl) || 0;
                const isSsc = uid.startsWith('ssc-');
                if (ctrl !== 8) body.level = level;   // CCO Pulsed has no level
                if (fadeEl) body.fade = fade;
            }

            document.getElementById('action-param-overlay')?.remove();
            _actionParamContext = null;

            let res;
            if (editAid) {
                // Edit mode: PATCH the existing assignment
                res = await fetch(`/api/assignment/${editAid}`, {
                    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
            } else {
                res = await fetch(`/api/preset/${presetId}/assignments`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
            }
            const data = await res.json();
            if (!res.ok) { toast(data.error || 'エラー', 'red'); return; }
            markDirty(); _updateUndoButtons();
            if (uid.startsWith('ssc-')) {
                _loadSharedSceneDetail(presetId);
            } else {
                _loadActionAssignments(uid, pmId, presetId);
            }
        }

        function _editRoomProps(aid, uid, pmId, presetId) {
            const a = _assignmentDataMap[aid];
            if (!a) return;
            const props = a.props || {};
            const currentProps = {};
            [152, 151, 153, 154, 155, 157, 149].forEach(pid => {
                currentProps[pid] = (props[pid] !== undefined && props[pid] !== null) ? props[pid] : null;
            });
            const itemData = {
                id: a.AssignableObjectID, name: a.RoomPropName || `ID:${a.AssignableObjectID}`,
                currentProps
            };
            _openActionParamModal(uid, pmId, presetId, 'roomprop', itemData, aid);
        }

        async function _removeAssignment(assignmentId, uid, pmId, presetId) {
            const res = await fetch(`/api/assignment/${assignmentId}`, { method: 'DELETE' });
            if (!res.ok) { const d = await res.json(); toast(d.error || 'エラー', 'red'); return; }
            markDirty();
            _loadActionAssignments(uid, pmId, presetId);
        }

        async function _updateAssignParam(assignmentId, fields) {
            await fetch(`/api/assignment/${assignmentId}`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(fields)
            });
            markDirty(); _updateUndoButtons();
        }

        async function _addAction(uid, pmId) {
            const res = await fetch(`/api/pm/${pmId}/actions`, { method: 'POST' });
            const data = await res.json();
            if (!res.ok) { toast(data.error || 'エラー', 'red'); return; }
            markDirty();
            const r2 = await fetch(`/api/pm/${pmId}/actions`);
            const actions = await r2.json();
            _renderActionsPanel(uid, pmId, actions, data.preset_id);
        }

        async function _renameAction(uid, pmId) {
            const sel = document.getElementById(`${uid}-action-sel`);
            if (!sel) return;
            const presetId = parseInt(sel.value);
            const currentName = sel.options[sel.selectedIndex]?.text || '';
            const name = prompt('新しいアクション名を入力してください:', currentName);
            if (!name || !name.trim()) return;
            const res = await fetch(`/api/preset/${presetId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name.trim() })
            });
            const d = await res.json();
            if (!res.ok) { toast(d.error || '名前変更失敗', 'red'); return; }
            markDirty();
            const r2 = await fetch(`/api/pm/${pmId}/actions`);
            const actions = await r2.json();
            _renderActionsPanel(uid, pmId, actions, presetId);
        }

        async function _deleteAction(uid, pmId) {
            const sel = document.getElementById(`${uid}-action-sel`);
            if (!sel) { toast('アクションなし'); return; }
            const presetId = parseInt(sel.value);
            if (!confirm('このアクションを削除しますか？')) return;
            const res = await fetch(`/api/preset/${presetId}`, { method: 'DELETE' });
            if (!res.ok) { const d = await res.json(); toast(d.error || 'エラー', 'red'); return; }
            markDirty();
            const r2 = await fetch(`/api/pm/${pmId}/actions`);
            const actions = await r2.json();
            _renderActionsPanel(uid, pmId, actions, null);
        }

        async function changeExecutionType(actionId, execType) {
            await fetch(`/api/action/${actionId}/execution-type`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ execution_type: execType })
            });
            markDirty();
        }

        // ── Diagnostic modal ─────────────────────────
        function _showDiagModal(msg) {
            const ov = document.createElement('div');
            ov.className = 'scene-picker-overlay';
            ov.innerHTML = `
              <div class="scene-picker-modal" onclick="event.stopPropagation()" style="max-width:540px">
                <div class="scene-picker-header">
                  <span>⚠️ SQL Server 接続エラー</span>
                  <button onclick="this.closest('.scene-picker-overlay').remove()">✕</button>
                </div>
                <pre style="padding:16px;font-size:11px;white-space:pre-wrap;color:var(--text);line-height:1.7;max-height:60vh;overflow:auto;margin:0">${msg.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</pre>
              </div>`;
            ov.addEventListener('click', () => ov.remove());
            document.body.appendChild(ov);
        }

        // ── Toast ────────────────────────────────────
        function escHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function toast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.style.background = type === 'red' ? '#c0392b' : '#2d6bb3';
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }
    </script>
</body>

</html>
