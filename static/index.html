            // 'zones' category → API expects 'zone'
            if (itemType === 'zones') itemType = 'zone';
            if (checked) {
                const body = { item_type: itemType, item_id: itemId, delay: 0 };
                if (itemType === 'zone' || itemType === 'cco') {
                    if (ctrl === 8) { body.fade = 0.25; }
                    else { body.level = 100; body.fade = 2; }
                } else if (itemType === 'area') {
                    body.fade = 2;
                } else if (itemType === 'shade') {
                    body.level = 0;
                } else if (itemType === 'sequence') {
                    body.cmd_type = 21;
                } else if (itemType === 'timeclock') {
                    body.cmd_type = 36;
                } else if (itemType === 'occupancy') {
                    body.level = 1;
                } else if (itemType === 'device') {
                    body.level = 1;
                }
                const res = await fetch(`/api/preset/${presetId}/assignments`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    toast(err.error || '追加エラー', 'red');
                    _loadSharedSceneDetail(presetId); // reset checkbox
                    return;
                }
            } else {
                if (existingAid === null) return;
                await fetch(`/api/assignment/${existingAid}`, { method: 'DELETE' });
            }
            markDirty(); _updateUndoButtons();
            _loadSharedSceneDetail(presetId);
        }

        async function _sscToggleVarState(checked, presetId, varId, stateId, existingAid) {
            if (checked) {
                const res = await fetch(`/api/preset/${presetId}/assignments`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ item_type: 'variable', item_id: varId, state_id: stateId, delay: 0 }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    toast(err.error || '追加エラー', 'red');
                    _loadSharedSceneDetail(presetId);
                    return;
                }
            } else {
                if (existingAid === null) return;
                await fetch(`/api/assignment/${existingAid}`, { method: 'DELETE' });
            }
            markDirty(); _updateUndoButtons();
            _loadSharedSceneDetail(presetId);
        }

        function _sscCategoryHtml(presetId, assignments, variables, cd) {
            const asnMap = {};
            assignments.forEach(a => {
                const k = `${a.AssignableObjectType}:${a.AssignableObjectID}`;
                if (!asnMap[k]) asnMap[k] = a;
            });
            function getAsn(ot, oid) { return asnMap[`${ot}:${oid}`] || (ot === 15 ? asnMap[`198:${oid}`] : null); }
            function dBtn(aid) { return `<button class="prog-del-btn" onclick="_sscRemoveAssignment(${aid},${presetId})">✕</button>`; }
            function delayCtrl(aid, val) {
                return `<label style="color:var(--text-dim)">Delay</label><input type="number" class="action-param-input" min="0" max="3600" value="${val}" onchange="_updateAssignParam(${aid},{delay:parseFloat(this.value)||0})"><span style="color:var(--text-dim)">s</span>`;
            }
            function groupByArea(items, nameKey, areaKey) {
                const groups = {}, order = [];
                items.forEach(it => {
                    const k = it[areaKey] || '─';
                    if (!groups[k]) { groups[k] = []; order.push(k); }
                    groups[k].push(it);
                });
                return { groups, order };
            }

            const cat = _sscCategory;
            let html = '';

            // ── Lighting - Zones ──────────────────────────────────────
            if (cat === 'zones' || cat === 'cco') {
                const items = cat === 'zones' ? (cd.zones || []) : (cd.cco || []);
                if (!items.length) return '<div style="color:var(--text-dim);font-size:11px;padding:4px">データなし</div>';
                const { groups, order } = groupByArea(items, 'ZoneName', 'AreaName');
                order.forEach(area => {
                    html += `<div class="ssc-cat-group">${escHtml(area)}</div>`;
                    groups[area].forEach(z => {
                        const a = getAsn(15, z.ZoneID);
                        const ctrl = z.ControlType || 1;
                        const cid = `ssc-z-${z.ZoneID}`;
                        if (a) {
                            const aid = a.PresetAssignmentID;
                            html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" checked onchange="_sscToggleItem(this.checked,${presetId},'${cat}',${z.ZoneID},${ctrl},${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(z.ZoneName)}</label>${_zoneLevelHTML(aid,ctrl,a.level,a.fade)}${delayCtrl(aid,a.delay??0)}${dBtn(aid)}</div>`;
                        } else {
                            html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleItem(this.checked,${presetId},'${cat}',${z.ZoneID},${ctrl},null)"><label for="${cid}" class="ssc-cat-label">${escHtml(z.ZoneName)}</label></div>`;
                        }
                    });
                });
                return html;
            }

            // ── Lighting - Areas ──────────────────────────────────────
            if (cat === 'areas') {
                (cd.areas || []).forEach(ar => {
                    const a = getAsn(2, ar.AreaID);
                    const lbl = ar.ParentAreaName ? `${ar.ParentAreaName} > ${ar.AreaName}` : ar.AreaName;
                    const cid = `ssc-ar-${ar.AreaID}`;
                    if (a) {
                        const aid = a.PresetAssignmentID;
                        const areaScenes = a.area_scenes || [];
                        const sceneOpts = areaScenes.map(s =>
                            `<option value="${s.Number}"${s.Number === a.level ? ' selected' : ''}>${escHtml(s.Name)}</option>`
                        ).join('');
                        const sceneCtrl = areaScenes.length
                            ? `<select class="action-param-input" style="min-width:100px" onchange="_updateAssignParam(${aid},{level:parseInt(this.value)})">${sceneOpts}</select>`
                            : `<span style="color:var(--text-dim);font-size:11px">${escHtml(a.area_scene_name || '─')}</span>`;
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" checked onchange="_sscToggleItem(this.checked,${presetId},'area',${ar.AreaID},0,${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(lbl)}</label>${sceneCtrl}<label style="color:var(--text-dim)">Fade</label><input type="number" class="action-param-input" min="0" max="3600" value="${a.fade??2}" onchange="_updateAssignParam(${aid},{fade:parseFloat(this.value)||0})"><span style="color:var(--text-dim)">s</span>${delayCtrl(aid,a.delay??0)}${dBtn(aid)}</div>`;
                    } else {
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleItem(this.checked,${presetId},'area',${ar.AreaID},0,null)"><label for="${cid}" class="ssc-cat-label">${escHtml(lbl)}</label></div>`;
                    }
                });
                return html || '<div style="color:var(--text-dim);font-size:11px;padding:4px">データなし</div>';
            }

            // ── Shade Groups ──────────────────────────────────────────
            if (cat === 'shades') {
                (cd.shades || []).forEach(s => {
                    const a = getAsn(133, s.ShadeGroupID);
                    const cid = `ssc-sh-${s.ShadeGroupID}`;
                    const lbl = s.AreaName ? `${s.AreaName} > ${s.ShadeName}` : s.ShadeName;
                    if (a) {
                        const aid = a.PresetAssignmentID;
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" checked onchange="_sscToggleItem(this.checked,${presetId},'shade',${s.ShadeGroupID},0,${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(lbl)}</label><input type="number" class="action-param-input" min="0" max="100" value="${a.level??0}" style="width:42px" onchange="_updateAssignParam(${aid},{level:Math.min(100,Math.max(0,parseInt(this.value)||0))})"><span style="color:var(--text-dim)">%</span>${delayCtrl(aid,a.delay??0)}${dBtn(aid)}</div>`;
                    } else {
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleItem(this.checked,${presetId},'shade',${s.ShadeGroupID},0,null)"><label for="${cid}" class="ssc-cat-label">${escHtml(lbl)}</label></div>`;
                    }
                });
                return html || '<div style="color:var(--text-dim);font-size:11px;padding:4px">データなし</div>';
            }

            // ── Sequences ─────────────────────────────────────────────
            if (cat === 'sequences') {
                (cd.sequences || []).forEach(s => {
                    const a = getAsn(90, s.SequenceID);
                    const cid = `ssc-sq-${s.SequenceID}`;
                    if (a) {
                        const aid = a.PresetAssignmentID;
                        const cOpts = _SEQ_CMDS.map(c => `<option value="${c.v}"${a.AssignmentCommandType==c.v?' selected':''}>${c.label}</option>`).join('');
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" checked onchange="_sscToggleItem(this.checked,${presetId},'sequence',${s.SequenceID},0,${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(s.SequenceName)}</label><select class="action-param-input" style="width:72px" onchange="_updateAssignParam(${aid},{cmd_type:parseInt(this.value)})">${cOpts}</select>${delayCtrl(aid,a.delay??0)}${dBtn(aid)}</div>`;
                    } else {
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleItem(this.checked,${presetId},'sequence',${s.SequenceID},0,null)"><label for="${cid}" class="ssc-cat-label">${escHtml(s.SequenceName)}</label></div>`;
                    }
                });
                return html || '<div style="color:var(--text-dim);font-size:11px;padding:4px">データなし</div>';
            }

            // ── Variables ─────────────────────────────────────────────
            if (cat === 'variables') {
                const vars = variables || [];
                vars.forEach(v => {
                    const varAsns = assignments.filter(a => a.AssignableObjectType === 169 && a.AssignableObjectID === v.VariableID);
                    html += `<div class="ssc-cat-group">${escHtml(v.Name)}</div>`;
                    (v.states || []).forEach(st => {
                        const a = varAsns.find(a2 => a2.state_id === st.VariableStateID);
                        const cid = `ssc-v-${v.VariableID}-${st.VariableStateID}`;
                        if (a) {
                            const aid = a.PresetAssignmentID;
                            html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" checked onchange="_sscToggleVarState(this.checked,${presetId},${v.VariableID},${st.VariableStateID},${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(st.Name)}</label>${delayCtrl(aid,a.delay??0)}${dBtn(aid)}</div>`;
                        } else {
                            html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleVarState(this.checked,${presetId},${v.VariableID},${st.VariableStateID},null)"><label for="${cid}" class="ssc-cat-label">${escHtml(st.Name)}</label></div>`;
                        }
                    });
                });
                return html || '<div style="color:var(--text-dim);font-size:11px;padding:4px">データなし</div>';
            }

            // ── HVAC ──────────────────────────────────────────────────
            if (cat === 'hvac') {
                const SCHED_LBL = {0:'Unaffected',1:'Run',2:'Hold'};
                const MODE_LBL  = {0:'Unaffected',1:'Heat',2:'Cool',3:'Auto',4:'Off'};
                const FAN_LBL   = {0:'Unaffected',1:'Auto',2:'High',3:'Medium',4:'Low'};
                function hvacCtrl(aid, hp) {
                    const s = n => `<span style="display:inline-block;width:72px;color:var(--text-dim);font-size:11px;flex-shrink:0">${n}</span>`;
                    const row = (lbl, ctrl) => `<div style="display:flex;align-items:center;gap:6px;margin-top:3px;margin-left:24px">${s(lbl)}${ctrl}</div>`;
                    const sel = (opts, key) => `<select class="action-param-input" style="width:110px" onchange="_updateAssignParam(${aid},{hvac:{${key}:parseInt(this.value)}})">${opts}</select>`;
                    // PT=44=schedule (255→norm 0=Unaff, 1=Run, 2=Hold confirmed)
                    // PT=47=mode, PT=48=fan (both: 255→norm 0=Unaff)
                    const schedOpts = Object.entries(SCHED_LBL).map(([v,l])=>`<option value="${v}"${Number(v)===hp.schedule?' selected':''}>${l}</option>`).join('');
                    const modeOpts  = Object.entries(MODE_LBL).map(([v,l])=>`<option value="${v}"${Number(v)===hp.mode?' selected':''}>${l}</option>`).join('');
                    const fanOpts   = Object.entries(FAN_LBL).map(([v,l])=>`<option value="${v}"${Number(v)===hp.fan?' selected':''}>${l}</option>`).join('');
                    // PT=54=setpoint tenths °F (720=Unaff); PT=53=temp active flag (auto-managed)
                    const tempC = (hp.setpoint == null || hp.setpoint === 720) ? '' : Math.round((hp.setpoint - 320) / 18);
                    // PT=55=below-setpoint drift (neg), PT=56=above-setpoint drift (pos); tenths °F
                    // PT=57=drift_on flag; 18 tenths °F = 1°C
                    const driftOn = hp.drift_on === 1;
                    const heatVal = !driftOn ? '' : (hp.heat_drift / 18).toFixed(1);
                    const coolVal = !driftOn ? '' : (hp.cool_drift / 18).toFixed(1);
                    return row('Sched', sel(schedOpts, 'schedule')) +
                        row('Mode',  sel(modeOpts,  'mode')) +
                        row('Fan',   sel(fanOpts,   'fan')) +
                        row('Temp',  `<input type="number" step="1" class="action-param-input" style="width:70px" placeholder="Unaff" value="${tempC}" onchange="_updateAssignParam(${aid},{hvac:{setpoint:this.value===''?720:Math.round(parseFloat(this.value)*18+320)}})"><span style="color:var(--text-dim);font-size:11px">°C</span>`) +
                        row('Heat Drift', `<input type="number" step="0.1" class="action-param-input" style="width:70px" placeholder="Unaff" value="${heatVal}" onchange="_updateAssignParam(${aid},{hvac:{heat_drift:this.value===''?0:Math.round(parseFloat(this.value)*18),drift_on:this.value===''?0:1}})"><span style="color:var(--text-dim);font-size:11px">°C</span>`) +
                        row('Cool Drift', `<input type="number" step="0.1" class="action-param-input" style="width:70px" placeholder="Unaff" value="${coolVal}" onchange="_updateAssignParam(${aid},{hvac:{cool_drift:this.value===''?0:Math.round(parseFloat(this.value)*18),drift_on:this.value===''?0:1}})"><span style="color:var(--text-dim);font-size:11px">°C</span>`);
                }
                (cd.hvac || []).forEach(z => {
                    const a = getAsn(211, z.ZoneID);
                    const lbl = z.ParentAreaName ? `${z.ParentAreaName} > ${z.ZoneName}` : z.ZoneName;
                    const cid = `ssc-hv-${z.ZoneID}`;
                    if (a) {
                        const aid = a.PresetAssignmentID;
                        const hp = a.hvac || {setpoint:720,schedule:0,mode:0,fan:0,heat_drift:0,cool_drift:0,drift_on:0};
                        html += `<div class="ssc-cat-row" style="flex-wrap:wrap"><input type="checkbox" id="${cid}" checked onchange="_sscToggleItem(this.checked,${presetId},'hvac',${z.ZoneID},0,${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(lbl)}</label>${hvacCtrl(aid,hp)}${dBtn(aid)}</div>`;
                    } else {
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleItem(this.checked,${presetId},'hvac',${z.ZoneID},0,null)"><label for="${cid}" class="ssc-cat-label">${escHtml(lbl)}</label></div>`;
                    }
                });
                return html || '<div style="color:var(--text-dim);font-size:11px;padding:4px">データなし</div>';
            }

            // ── Devices ───────────────────────────────────────────────
            if (cat === 'devices') {
                (cd.devices || []).forEach(d => {
                    const a = getAsn(5, d.ControlStationDeviceID);
                    const cid = `ssc-dv-${d.ControlStationDeviceID}`;
                    if (a) {
                        const aid = a.PresetAssignmentID;
                        const lv = a.level ?? 1;
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" checked onchange="_sscToggleItem(this.checked,${presetId},'device',${d.ControlStationDeviceID},0,${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(d.DeviceName)}</label><select class="action-param-input" style="width:70px" onchange="_updateAssignParam(${aid},{level:parseInt(this.value)})"><option value="1"${lv==1?' selected':''}>Lock</option><option value="2"${lv==2?' selected':''}>Unlock</option></select>${delayCtrl(aid,a.delay??0)}${dBtn(aid)}</div>`;
                    } else {
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleItem(this.checked,${presetId},'device',${d.ControlStationDeviceID},0,null)"><label for="${cid}" class="ssc-cat-label">${escHtml(d.DeviceName)}</label></div>`;
                    }
                });
                return html || '<div style="color:var(--text-dim);font-size:11px;padding:4px">データなし</div>';
            }

            // ── Timeclocks ────────────────────────────────────────────
            if (cat === 'timeclocks') {
                const seen = new Set();
                (cd.timeclocks || []).forEach(tc => {
                    if (seen.has(tc.TimeClockID)) return;
                    seen.add(tc.TimeClockID);
                    const a = assignments.find(a => a.AssignableObjectType === 19 && a.AssignableObjectID === tc.TimeClockID);
                    const cid = `ssc-tc-${tc.TimeClockID}`;
                    if (a) {
                        const aid = a.PresetAssignmentID;
                        const ct = a.AssignmentCommandType;
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" checked onchange="_sscToggleItem(this.checked,${presetId},'timeclock',${tc.TimeClockID},0,${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(tc.TimeclockName)}</label><select class="action-param-input" style="width:72px" onchange="_updateAssignParam(${aid},{cmd_type:parseInt(this.value)})"><option value="36"${ct===36?' selected':''}>Enable</option><option value="37"${ct===37?' selected':''}>Disable</option></select>${delayCtrl(aid,a.delay??0)}${dBtn(aid)}</div>`;
                    } else {
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleItem(this.checked,${presetId},'timeclock',${tc.TimeClockID},0,null)"><label for="${cid}" class="ssc-cat-label">${escHtml(tc.TimeclockName)}</label></div>`;
                    }
                });
                return html || '<div style="color:var(--text-dim);font-size:11px;padding:4px">データなし</div>';
            }

            // ── Occupancy ─────────────────────────────────────────────
            if (cat === 'occupancy') {
                (cd.occupancy || []).forEach(o => {
                    const a = getAsn(38, o.OccupancyGroupID);
                    const cid = `ssc-oc-${o.OccupancyGroupID}`;
                    if (a) {
                        const aid = a.PresetAssignmentID;
                        const sv = a.level ?? 1;
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" checked onchange="_sscToggleItem(this.checked,${presetId},'occupancy',${o.OccupancyGroupID},0,${aid})"><label for="${cid}" class="ssc-cat-label">${escHtml(o.OGName)}</label><select class="action-param-input" style="width:90px" onchange="_updateAssignParam(${aid},{level:parseInt(this.value)})"><option value="1"${sv===1?' selected':''}>Occupied</option><option value="2"${sv===2?' selected':''}>Unoccupied</option><option value="4"${sv===4?' selected':''}>Bypass</option></select>${delayCtrl(aid,a.delay??0)}${dBtn(aid)}</div>`;
                    } else {
                        html += `<div class="ssc-cat-row"><input type="checkbox" id="${cid}" onchange="_sscToggleItem(this.checked,${presetId},'occupancy',${o.OccupancyGroupID},0,null)"><label for="${cid}" class="ssc-cat-label">${escHtml(o.OGName)}</label></div>`;
                    }
                });

        function _sscEditName() {
            if (!_sscCurrentPresetId) return;
            const nameEl = document.getElementById('ssc-detail-name');
            if (!nameEl) return;
            const currentName = _sscCurrentName;
            const inp = document.createElement('input');
            inp.type = 'text';
            inp.value = currentName;
            inp.className = 'ssc-name-input';
            const save = async () => {
                const newName = inp.value.trim();
                if (!newName || newName === currentName) { nameEl.style.display = ''; inp.remove(); return; }
                await fetch(`/api/preset/${_sscCurrentPresetId}/name`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: newName })
                });
                _sscCurrentName = newName;
                nameEl.textContent = newName;
                // Update list item

                if (li) li.textContent = newName;

                nameEl.style.display = '';
                inp.remove();

        function switchEventTab(uid, tabKey) {
            document.querySelectorAll(`[id^="${uid}-epanel-"]`).forEach(el => el.classList.remove('active'));

        // ── Condition text builder ────────────────────
        // Condition data comes from tblEvaluation rows attached as act.evaluations.
        // ConditionType: 0=Variable, 1=Time/DoW/MoY, 2=OccScene, 3=CCO, 4=ZoneBinary, 5=LED, 6=AreaOccupancy, 7=ZoneLevel, 23=SystemProperty
        // EvaluationOperator: 3=Equal, 4=NotEqual, 9=IsFrom, 10=IsNotFrom

        const SYSTEM_PROP_NAMES = {
            149: 'Presence Status',
            150: 'Emergency Mode',
            151: 'Do Not Disturb',
            152: 'Room State',
            153: 'Make Up Room',
            154: 'First Guest Entry',
            155: 'Turndown Service',
            156: 'ADA Mode',
            157: 'Automation',
        };

        const _DOW_NAMES = { 1: 'Mon', 2: 'Tue', 3: 'Wed', 4: 'Thu', 5: 'Fri', 6: 'Sat', 7: 'Sun' };
        const _MON_NAMES = { 1: 'Jan', 2: 'Feb', 3: 'Mar', 4: 'Apr', 5: 'May', 6: 'Jun', 7: 'Jul', 8: 'Aug', 9: 'Sep', 10: 'Oct', 11: 'Nov', 12: 'Dec' };
        function _dowName(v) { const d = ((v - 1) % 7) + 1; return _DOW_NAMES[d] || `Day:${v}`; }
        function _monName(v) { return _MON_NAMES[v] || `Month:${v}`; }

        function evalOpText(op) { return op === 4 ? 'is not' : 'is'; }

        // Lutron time encoding: (TimeOfDay << 16) | offsetMinutes
        // TimeOfDay: 0-1439 = minutes from midnight, 2000=Sunrise, 2001=Sunset
        function decodeLutronTime(val) {
            if (val == null) return '?';
            const tod = (val >> 16) & 0xFFFF;
            const offset = val & 0xFFFF;
            const offStr = offset > 0 ? `+${offset}min` : offset < 0 ? `${offset}min` : '';
            if (tod === 2000) return `Sunrise${offStr}`;
            if (tod === 2001) return `Sunset${offStr}`;
            const h = Math.floor(tod / 60).toString().padStart(2, '0');
            const m = (tod % 60).toString().padStart(2, '0');
            return `${h}:${m}${offStr}`;
        }

        function encodeLutronTime(todCode, offsetMin) {
            return ((todCode & 0xFFFF) << 16) | (offsetMin & 0xFFFF);
        }

        function buildSingleConditionText(cond, presetNames, pm) {
            if (!cond || cond.ObjectType === 236) return null;
            const op = evalOpText(cond.EvaluationOperator);
            if (cond.ConditionType === 0) {
                const varName = cond._var_name || `Var:${cond.FirstOperandObjectID}`;
                const stateName = cond._state_name || `State:${cond.SecondOperand}`;
                return `${varName} ${op} ${stateName}`;
            } else if (cond.ConditionType === 5) {
                const station = cond._led_station_name || '';
                const ledNum = cond._led_number != null ? `LED ${cond._led_number}` : `LED:${cond.FirstOperandObjectID}`;
                const label = station ? `${station} ${ledNum}` : ledNum;
                return `${label} ${op} ${cond.SecondOperand === 1 ? 'On' : 'Off'}`;
            } else if (cond.ConditionType === 23) {
                const propName = SYSTEM_PROP_NAMES[cond.FirstOperandRefProperty] || `Prop:${cond.FirstOperandRefProperty}`;
                return `${propName} ${op} ${cond.SecondOperand}`;
            } else if (cond.ConditionType === 1) {
                const prop = cond.FirstOperandRefProperty;
                if (prop === 53) {
                    return `Day of Week from ${_dowName(cond.SecondOperand)} to ${_dowName(cond.ThirdOperand)}`;
                } else if (prop === 54) {
                    return `Month of Year from ${_monName(cond.SecondOperand)} to ${_monName(cond.ThirdOperand)}`;
                }
                return `Time of Day from ${decodeLutronTime(cond.SecondOperand)} to ${decodeLutronTime(cond.ThirdOperand)}`;
            } else if (cond.ConditionType === 2) {
                const name = cond._occ_group_name || `OccGroup:${cond.FirstOperandObjectID}`;
                return `${name} ${op} scene ${cond.SecondOperand}`;
            } else if (cond.ConditionType === 3) {
                const name = cond._zone_name || `Zone:${cond.FirstOperandObjectID}`;
                return `${name} ${op} ${cond.SecondOperand === 0 ? 'Open' : 'Closed'}`;
            } else if (cond.ConditionType === 4) {
                const name = cond._zone_name || `Zone:${cond.FirstOperandObjectID}`;
                return `${name} ${op} ${cond.SecondOperand === 0 ? 'Open' : 'Closed'}`;
            } else if (cond.ConditionType === 6) {
                const name = cond._area_name || `Area:${cond.FirstOperandObjectID}`;
                return `${name} ${op} Occupied`;
            } else if (cond.ConditionType === 7) {
                const name = cond._zone_name || `Zone:${cond.FirstOperandObjectID}`;
                return `${name} level from ${cond.SecondOperand} to ${cond.ThirdOperand}`;
            } else if (cond.ConditionType === 8) {
                const name = cond._shade_name || `Shade:${cond.FirstOperandObjectID}`;
                return `${name} ${op} Open`;
            } else if (cond.ConditionType === 9) {
                const name = cond._tc_name || `Timeclock:${cond.FirstOperandObjectID}`;
                return `${name} ${op} Enabled`;
            } else if (cond.ConditionType === 10) {
                const seqName = cond._seq_name || `Seq:${cond.FirstOperandObjectID}`;
                const stepName = cond._step_name || `Step:${cond.SecondOperand}`;
                return `${seqName} ${op} ${stepName}`;
            } else if (cond.ConditionType === 14) {
                const name = cond._zone_name || `HVAC:${cond.FirstOperandObjectID}`;
                const fromC = ((cond.SecondOperand / 10 - 32) * 5 / 9).toFixed(0);
                const toC = ((cond.ThirdOperand / 10 - 32) * 5 / 9).toFixed(0);
                return `${name} temp from ${fromC}°C to ${toC}°C`;
            } else if (cond.ConditionType === 18) {
                const name = cond._dev_station_name || `Device:${cond.FirstOperandObjectID}`;
                return `${name} Lock State ${op} ${cond.SecondOperand === 2 ? 'Locked' : 'Unlocked'}`;
            }
            return `CT:${cond.ConditionType} OT:${cond.FirstOperandObjectType} ID:${cond.FirstOperandObjectID}`;
        }

        const _condPickerData = {};

        function renderConditionsHtml(evals, presetNames, pm, actionId) {
            if (!evals || !evals.length) {
                return `<span class="prog-condition prog-cond-btn" onclick="event.stopPropagation();openCondPicker(event,null,${actionId})">Select a condition ▾</span>`;
            }
            const sorted = [...evals].sort((a, b) => (a.SortOrder ?? 0) - (b.SortOrder ?? 0));
            let html = '';
            sorted.forEach(e => {
                if (e.ObjectType === 236) {
                    const opText = e.EvaluationOperator === 2 ? 'Or' : 'and';
                    html += ` <span class="prog-connector" onclick="event.stopPropagation();toggleConnector(${e.EvaluationID},this)" title="クリックでand/Or切替">${opText}</span> `;
                } else {
                    _condPickerData[e.EvaluationID] = e;
                    const condText = buildSingleConditionText(e, presetNames, pm);
                    const label = condText || 'Select a condition';
                    html += `<span class="prog-condition prog-cond-btn" onclick="event.stopPropagation();openCondPicker(event,${e.EvaluationID},${actionId})">${label} ▾</span>`;
                }
            });
            return html;
        }

        function renderAddBtn(triggerId, pmId, triggerType, depth) {
            const pad = depth * 16;
            if (triggerId) {
                return `<button class="prog-add-btn" style="margin-left:${pad}px"
      onclick="showAddMenu(event,${triggerId},${pmId || 'null'})">+ 追加</button>`;
            } else if (pmId && triggerType) {
                // No trigger yet — need to create one first
                return `<button class="prog-add-btn" style="margin-left:${pad}px"
      onclick="showAddMenu(event,null,${pmId},${triggerType})">+ 追加</button>`;
            }
            return '';
        }

        function renderActionList(actions, presetNames, depth, pm, parentTriggerId) {
            if (!actions || !actions.length) return '';
            const pad = depth * 16;
            let html = '';

            actions.forEach((act, _actIdx) => {
                // Insert-point divider BEFORE this action (click to insert here)
                if (act.ActionID && parentTriggerId) {
                    const _pidIpt = pm ? pm.ProgrammingModelID : null;
                    html += `<div class="prog-insert-pt" style="padding-left:${pad}px"
                        title="ここに追加"
                        onclick="event.stopPropagation();showAddMenu(event,${parentTriggerId},${_pidIpt || 'null'},null,null,${act.ActionID})"></div>`;
                }

                const delBtn = act.ActionID
                    ? `<button class="prog-del-btn" onclick="event.stopPropagation();deleteAction(${act.ActionID})" title="削除">✕</button>`
                    : '';
                const _pmIdInline = pm ? pm.ProgrammingModelID : null;
                const ctxMenu = act.ActionID && parentTriggerId
                    ? ` oncontextmenu="event.preventDefault();event.stopPropagation();showInsertMenu(event,${parentTriggerId},${act.ActionID},${_pmIdInline || 'null'})"`
                    : '';
                const addInlineBtn = act.ActionID && parentTriggerId
                    ? `<button class="prog-add-inline" onclick="event.stopPropagation();showAddMenu(event,${parentTriggerId},${_pmIdInline || 'null'},null,${act.ActionID})" title="この下に追加">＋</button>`
                    : '';
                const moreBtn = act.ActionID && parentTriggerId
                    ? `<button class="prog-more-btn" onclick="event.stopPropagation();showInsertMenu(event,${parentTriggerId},${act.ActionID},${_pmIdInline || 'null'})" title="前後に追加 / Wrap">⋮</button>`
                    : '';
                const dragAttrs = act.ActionID && parentTriggerId
                    ? ` draggable="true" data-action-id="${act.ActionID}" data-trigger-id="${parentTriggerId}" ondragstart="actionDragStart(event,this)" ondragover="actionDragOver(event,this)" ondragleave="actionDragLeave(event,this)" ondrop="actionDrop(event,this)" ondragend="actionDragEnd(event,this)"`
                    : '';

                if (act.ObjectType === 235) {
                    // Delay
                    const secs = act.DelayTime || 0;
                    const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60), s = secs % 60;
                    html += `<div class="prog-line" style="padding-left:${pad}px"${ctxMenu}${dragAttrs}>
        <span class="prog-keyword">Delay</span> <span style="color:var(--text-dim)">${h}h ${m}m ${s}s</span>${moreBtn}${addInlineBtn}${delBtn}</div>`;

                } else if (act.ObjectType === 233) {
                    // Conditional If/Then/Else/End If
                    const subTrigs = act.sub_triggers || [];
                    const thenBranch = subTrigs.filter(st => st.TriggerType === 5);
                    const elseBranch = subTrigs.filter(st => st.TriggerType === 6);
                    const evals = act.evaluations || [];
                    const condDisplay = renderConditionsHtml(evals, presetNames, pm, act.ActionID);
                    const thenDrop = `<span class="prog-keyword prog-then-drop" onclick="event.stopPropagation();showAddConditionMenu(event,${act.ActionID})" title="条件を追加">Then ▾</span>`;
                    html += `<div class="prog-line" style="padding-left:${pad}px"${ctxMenu}${dragAttrs}>
        <span class="prog-keyword">If</span> ${condDisplay} ${thenDrop}${moreBtn}${addInlineBtn}${delBtn}</div>`;

                    // Then branch
                    thenBranch.forEach(st => {
                        html += renderActionList(st.actions, presetNames, depth + 1, pm, st.TriggerID);
                        html += renderAddBtn(st.TriggerID, pm ? pm.ProgrammingModelID : null, null, depth + 1);
                    });

                    // Else branch
                    if (elseBranch.length) {
                        html += `<div class="prog-line" style="padding-left:${pad}px"><span class="prog-keyword">Else</span></div>`;
                        elseBranch.forEach(st => {
                            html += renderActionList(st.actions, presetNames, depth + 1, pm, st.TriggerID);
                            html += renderAddBtn(st.TriggerID, pm ? pm.ProgrammingModelID : null, null, depth + 1);
                        });
                    } else {
                        html += `<div style="padding-left:${pad}px;padding-top:2px">
          <button class="prog-add-btn" onclick="addElseBranch(${act.ActionID})">+ Else を追加</button>
        </div>`;
                    }
                    html += `<div class="prog-line" style="padding-left:${pad}px"><span class="prog-keyword">End If</span></div>`;

                } else {
                    // Run / Raise / Lower / Stop action
                    const label = presetLabel(act.PresetId, presetNames);
                    const execType = act.ExecutionType || 1;
                    const EXEC_LABELS = { 1: 'Run', 2: 'Raise', 3: 'Lower', 4: 'Stop' };
                    const pmId = pm ? pm.ProgrammingModelID : null;
                    const execOpts = [1, 2, 3, 4].map(v =>
                        `<option value="${v}"${execType == v ? ' selected' : ''}>${EXEC_LABELS[v]}</option>`).join('');
                    const execSel = act.ActionID
                        ? `<select class="exec-type-sel" title="実行タイプ"
            onclick="event.stopPropagation()"
            onchange="changeExecutionType(${act.ActionID},parseInt(this.value))">${execOpts}</select>`
                        : `<span style="color:var(--text-dim)">${EXEC_LABELS[execType] || 'Run'} </span>`;
                    if (act.ActionID) {
                        html += `<div class="prog-line prog-line-run" style="padding-left:${pad}px"${ctxMenu}${dragAttrs}>
          ${execSel}
          <span class="prog-action" onclick="editRunAction(${act.ActionID},${act.PresetId ?? 'null'},${pmId ?? 'null'})">${label}</span>
          <span class="prog-edit-hint" onclick="editRunAction(${act.ActionID},${act.PresetId ?? 'null'},${pmId ?? 'null'})">✎</span>
          ${moreBtn}${addInlineBtn}${delBtn}
        </div>`;
                    } else {
                        html += `<div class="prog-line" style="padding-left:${pad}px"${ctxMenu}${dragAttrs}>
          <span style="color:var(--text-dim)">${EXEC_LABELS[execType] || 'Run'} </span><span class="prog-action">${label}</span>${addInlineBtn}${delBtn}</div>`;
                    }
                }
            });

            return html;
        }

        const _expandedButtons = new Set();

        function toggleProgDetail(uid) {
            const el = document.getElementById(uid);
            const chev = document.getElementById(uid + '-chev');
            if (!el) return;
            const isOpen = el.classList.toggle('open');

        async function inspectCondition(actionId) {
            const res = await fetch(`/api/conditional-detail/${actionId}`);
            const d = await res.json();
            const act = d.action || {};
            const subTrigs = d.sub_triggers || [];

            // Show only non-null, non-zero columns for readability
            const skipCols = new Set(['ActionID', 'ObjectType', 'ParentID', 'ParentType', 'SortOrder']);
            function fmtRow(row) {
                return Object.entries(row)
                    .filter(([k, v]) => v !== null && v !== undefined && v !== 0 && v !== '')
                    .map(([k, v]) => `  ${k.padEnd(32)}: ${v}`)
                    .join('\n');
            }

            let out = `=== Conditional Action #${actionId} ===\n`;
            out += `ObjectType: ${act.ObjectType}  ParentID: ${act.ParentID}\n\n`;
            out += `【Action 有効カラム】\n${fmtRow(act) || '  (なし)'}\n\n`;

            if (subTrigs.length) {
                const typeLabel = { 5: 'Then (If)', 6: 'Else' };
                subTrigs.forEach((st, i) => {
                    const lbl = typeLabel[st.TriggerType] || `TriggerType:${st.TriggerType}`;
                    out += `【Sub-Trigger ${i + 1}: ${lbl}】\n${fmtRow(st) || '  (なし)'}\n\n`;
                });
            } else {
                out += '(Sub-Triggerなし)\n';
            }

            // Show all raw column names so we can identify condition columns
            out += `\n【tblAction 全カラム】\n${(d.action_columns || []).join(', ')}\n`;
            showTextModal(`Conditional Action #${actionId}`, out);
        }

        let _sharedScenesCache = null;  // shared scenes (same for all buttons)
        let _localPresetsCache = {};    // pm_id → local presets
        let _scenePickerCallback = null;

        async function loadScenes(pmId) {
            // Fetch shared scenes if not cached
            if (!_sharedScenesCache) {
                const res = await fetch('/api/scenes');
                const d = await res.json();
                _sharedScenesCache = d.shared_scenes || [];
            }
            // Fetch local presets for this PM if needed
            let localPresets = [];
            if (pmId) {
                if (!_localPresetsCache[pmId]) {
                    const res2 = await fetch(`/api/scenes?pm_id=${pmId}`);
                    const d2 = await res2.json();
                    _localPresetsCache[pmId] = d2.local_presets || [];
                }
                localPresets = _localPresetsCache[pmId];
            }
            return { shared: _sharedScenesCache, local: localPresets };
        }

        function markDirty() {
            isDirty = true;
            document.getElementById('save-btn').disabled = !isPl;
            const db = document.getElementById('dirty-badge');
            if (!db) {
                const bar = document.getElementById('place-bar');
                const span = document.createElement('span');
                span.id = 'dirty-badge';
                span.style.cssText = 'display:inline-block;background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;';
                span.textContent = '● 未保存';
                bar.appendChild(span);
            }

        // ── Undo / Redo ────────────────────────────────────────────────

        async function _updateUndoButtons() {
            try {
                const r = await fetch('/api/undo-status');
                const d = await r.json();
                const ub = document.getElementById('undo-btn');
                const rb = document.getElementById('redo-btn');
                if (ub) { ub.disabled = !d.can_undo; ub.title = d.can_undo ? `元に戻す: ${d.undo_label} (Ctrl+Z)` : '元に戻す (Ctrl+Z)'; }
                if (rb) { rb.disabled = !d.can_redo; rb.title = d.can_redo ? `やり直す: ${d.redo_label} (Ctrl+Y)` : 'やり直す (Ctrl+Y)'; }
            } catch(e) {}
        }

        async function _undo() {
            const res = await fetch('/api/undo', { method: 'POST' });
            const d = await res.json();
            if (!res.ok) { toast(d.error || 'Undo失敗', 'red'); return; }
            markDirty();
            toast(`元に戻しました: ${d.label}`);
            _updateUndoButtons();
            _refreshCurrentPanel();
        }

        async function _redo() {
            const res = await fetch('/api/redo', { method: 'POST' });
            const d = await res.json();
            if (!res.ok) { toast(d.error || 'Redo失敗', 'red'); return; }
            markDirty();
            toast(`やり直しました: ${d.label}`);
            _updateUndoButtons();
            _refreshCurrentPanel();
        }

        function _refreshCurrentPanel() {
            const areaId = _sscAreaId || _ascAreaId;
            if (!areaId) return;
            if (activeDetailTab === 'shared-scenes') loadSharedScenes(areaId);
            else if (activeDetailTab === 'scenes') loadAreaScenes(areaId);
            else if (activeDetailTab === 'zones') {
                // Re-render zones by re-selecting the area
                const sel = document.querySelector('.area-item.selected');
                if (sel) sel.click();
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            const tag = (e.target || {}).tagName || '';
            if (['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) return;
            if ((e.ctrlKey || e.metaKey) && !e.shiftKey && e.key === 'z') {
                e.preventDefault(); _undo();
            } else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) {
                e.preventDefault(); _redo();
            }
        });

        async function reloadPrograms() {
            if (!currentAreaId) return;
            markDirty();
            const res = await fetch(`/api/area/${currentAreaId}/programs`);
            const prog = res.ok ? await res.json() : {};
            const panel = document.getElementById('tab-programs');
            if (!panel) return;
            panel.innerHTML = renderProgramsTab(prog);
            _expandedButtons.forEach(uid => {

    <div class="scene-picker-modal" onclick="event.stopPropagation()">

        function _switchPickerTab(tab) {
            _pickerActiveTab = tab;
            document.querySelectorAll('.scene-picker-tab').forEach(el => el.classList.remove('active'));
            const tabEl = document.getElementById(`sptab-${tab}`);
            if (tabEl) tabEl.classList.add('active');

            const filter = searchEl ? searchEl.value : '';

        function renderScenePickerList(data, currentPresetId, filter) {
            const list = document.getElementById('scene-picker-list');
            if (!list) return;
            const q = (filter || '').toLowerCase();
            const { shared = [], local = [], btnprog = [] } = data;
            const matchItem = (...parts) => !q || parts.join(' ').toLowerCase().includes(q);
            let html = '';

            if (_pickerActiveTab === 'shared') {
                // Shared scenes grouped by area
                const groups = {};
                shared.forEach(s => {
                    const key = s.AreaName || '(その他)';
                    if (!groups[key]) groups[key] = [];
                    groups[key].push(s);
                });
                Object.entries(groups).forEach(([area, items]) => {
                    const vis = items.filter(s => matchItem(s.Name || '', area));
                    if (!vis.length) return;
                    html += `<div class="scene-picker-group">共有シーン — ${area}</div>`;
                    vis.forEach(s => {
                        const name = s.Name || `Preset ${s.PresetID}`;
                        const isCur = s.PresetID === currentPresetId;
                        html += `<div class="scene-picker-item ${isCur ? 'is-current' : ''}"
          onclick="selectScene(${s.PresetID}, '${name.replace(/'/g, "\\'")}')">
          ${isCur ? '● ' : ''}${name}</div>`;
                    });
                });

            } else if (_pickerActiveTab === 'btnprog') {
                // Button programs = local presets for this button's PM (same as Actions tab)
                const vis = local.filter(p => matchItem(p.Name || ''));
                vis.forEach(p => {
                    const name = p.Name || `Preset ${p.PresetID}`;
                    const isCur = p.PresetID === currentPresetId;
                    html += `<div class="scene-picker-item ${isCur ? 'is-current' : ''}"
          onclick="selectScene(${p.PresetID}, '${name.replace(/'/g, "\\'")}')">
          ${isCur ? '● ' : ''}${name}</div>`;
                });
            }

            list.innerHTML = html || '<div style="padding:16px;color:var(--text-dim);font-size:12px">見つかりません</div>';
        }

        // Build category items with unknown ConditionType — show but can't save
        function _unknownItem(label, typeData) {
            return { label, condType: -1, typeData, typeFields: {}, unknownType: true };
        }

        async function openCondPicker(event, evalId, actionId) {
            event.stopPropagation();
            _closeCondPickerMenus();
            document.querySelectorAll('.add-action-menu').forEach(m => m.remove());

            const currentCond = evalId ? (_condPickerData[evalId] || null) : null;

            // Load all data upfront (all cached after first call)
            const [vars, leds, cd] = await Promise.all([loadVariables(), loadLeds(), loadCondData()]);

            const sysProps = Object.entries(SYSTEM_PROP_NAMES).map(([id, name]) => ({
                label: name, condType: 23,
                typeData: { propId: parseInt(id) },
                typeFields: { ConditionType: 23, FirstOperandObjectType: 400, FirstOperandObjectID: 34 },
            }));

            // LED items grouped by Area ▶ Device
            const ledItems = leds.map(l => {
                const area = _areaLabel(l.AreaName, l.ParentAreaName);
                const label = area ? `${area} ▶ ${l.StationName || l.DeviceName} — LED ${l.LedNumber}`
                    : `${l.StationName || l.DeviceName} — LED ${l.LedNumber}`;
                return {
                    label, condType: 5,
                    typeData: { ledId: l.LedID },
                    typeFields: { ConditionType: 5, FirstOperandObjectType: 107, FirstOperandRefProperty: 23 },
                };
            });

            const categories = [
                {
                    label: 'Variables',
                    items: vars.map(v => ({
                        label: v.Name, condType: 0,
                        typeData: { varId: v.VariableID },
                        typeFields: { ConditionType: 0, FirstOperandObjectType: 169, FirstOperandRefProperty: 42 },
                    })),
                },
                {
                    label: 'Time Period',
                    items: [
                        {
                            label: 'Time of Day', condType: 1, typeData: {},
                            typeFields: {
                                ConditionType: 1, ObjectTypeOverride: 241, EvaluationOperator: 9,
                                FirstOperandObjectType: 1, FirstOperandObjectID: 2, FirstOperandRefProperty: 68
                            }
                        },
                    ],
                },
                {
                    label: 'Occupancy',
                    items: (cd.occupancy || []).map(r => ({
                        label: r.OGName || _areaLabel(r.AreaName, r.ParentAreaName),
                        condType: 2,
                        typeData: { occupancyGroupId: r.OccupancyGroupID },
                        typeFields: { ConditionType: 2, FirstOperandObjectType: 38, FirstOperandObjectID: r.OccupancyGroupID },
                    })),
                },
                {
                    label: 'Contact Closure Inputs',
                    items: (cd.cci || []).map(r => ({
                        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.EnclosureName} ▶ ${r.InputName}`,
                        condType: 3,
                        typeData: { zoneId: r.SensorConnectionID },
                        typeFields: { ConditionType: 3, FirstOperandObjectType: 66, FirstOperandObjectID: r.SensorConnectionID },
                    })),
                },
                {
                    label: 'Contact Closure Outputs',
                    items: (cd.cco || []).map(r => ({
                        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.ZoneName}`,
                        condType: 4,
                        typeData: { zoneId: r.ZoneID },
                        typeFields: { ConditionType: 4, FirstOperandObjectType: 15, FirstOperandObjectID: r.ZoneID },
                    })),
                },
                { label: 'LED State', items: ledItems },
                {
                    label: 'Lighting - Areas',
                    items: (cd.areas || []).map(r => ({
                        label: _areaLabel(r.AreaName, r.ParentAreaName),
                        condType: 6,
                        typeData: { areaId: r.AreaID },
                        typeFields: { ConditionType: 6, FirstOperandObjectType: 2, FirstOperandObjectID: r.AreaID },
                    })),
                },
                {
                    label: 'Lighting - Zones',
                    items: (cd.zones || []).map(r => ({
                        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.ZoneName}`,
                        condType: 7,
                        typeData: { zoneId: r.ZoneID },
                        typeFields: { ConditionType: 7, FirstOperandObjectType: 15, FirstOperandObjectID: r.ZoneID },
                    })),
                },
                {
                    label: 'Timeclocks',
                    items: (cd.timeclocks || []).map(r => ({
                        label: r.ModeName ? `${r.TimeclockName} / ${r.ModeName}` : r.TimeclockName,
                        condType: 9,
                        typeData: { timeclockId: r.TimeClockID, modeId: r.TimeClockModeID },
                        typeFields: { ConditionType: 9, FirstOperandObjectType: 19, FirstOperandObjectID: r.TimeClockID, SecondOperand: r.TimeClockModeID || 0 },
                    })),
                },
                {
                    label: 'Sequences',
                    items: (cd.sequences || []).map(r => ({
                        label: r.SequenceName,
                        condType: 10,
                        typeData: { sequenceId: r.SequenceID },
                        typeFields: { ConditionType: 10, FirstOperandObjectType: 90, FirstOperandObjectID: r.SequenceID },
                    })),
                },
                {
                    label: 'HVAC Zones',
                    items: (cd.hvac || []).map(r => ({
                        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.ZoneName}`,
                        condType: 14,
                        typeData: { zoneId: r.ZoneID },
                        typeFields: { ConditionType: 14, FirstOperandObjectType: 211, FirstOperandObjectID: r.ZoneID },
                    })),
                },
                {
                    label: 'Devices',
                    items: (cd.devices || []).map(r => ({
                        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.DeviceName}`,
                        condType: 18,
                        typeData: { deviceId: r.ControlStationDeviceID },
                        typeFields: { ConditionType: 18, FirstOperandObjectType: 5, FirstOperandObjectID: r.ControlStationDeviceID },
                    })),
                },
                { label: 'Room Properties', items: sysProps },
            ];

            // Build the primary menu
            const primary = document.createElement('div');
            primary.className = 'cond-picker-menu';
            primary.addEventListener('mouseenter', _clearCondSubTimer);
            _condPickerMenus[0] = primary;

            categories.forEach(cat => {
                const hasItems = cat.items.length > 0;
                const el = document.createElement('div');
                el.className = 'cpi';
                el.innerHTML = `<span>${cat.label}</span><span class="cpi-arrow">▶</span>`;

                el.addEventListener('mouseenter', () => {
                    _clearCondSubTimer();
                    _condPickerMenus[1]?.remove();
                    _condPickerMenus[1] = null;

                    const sub = document.createElement('div');
                    sub.className = 'cond-picker-menu cond-sub-menu';
                    sub.addEventListener('mouseenter', _clearCondSubTimer);
                    sub.addEventListener('mouseleave', _scheduleCondSubClose);
                    _condPickerMenus[1] = sub;

                    if (!hasItems) {
                        const empty = document.createElement('div');
                        empty.className = 'cpi cpi-disabled';
                        empty.innerHTML = '<span style="font-style:italic">データなし</span>';
                        sub.appendChild(empty);
                    }

                    cat.items.forEach(item => {
                        const sEl = document.createElement('div');
                        sEl.className = 'cpi' + (item.unknownType ? ' cpi-unknown' : '');
                        const isSelected = !item.unknownType && currentCond &&
                            currentCond.ConditionType === item.condType &&
                            ((item.typeData.varId && currentCond.FirstOperandObjectID == item.typeData.varId) ||
                                (item.typeData.ledId && currentCond.FirstOperandObjectID == item.typeData.ledId) ||
                                (item.typeData.propId && currentCond.FirstOperandRefProperty == item.typeData.propId) ||
                                (item.condType === 1 && currentCond.ConditionType === 1) ||
                                (item.typeData.zoneId && currentCond.FirstOperandObjectID == item.typeData.zoneId) ||
                                (item.typeData.areaId && currentCond.FirstOperandObjectID == item.typeData.areaId) ||
                                (item.typeData.occupancyGroupId && currentCond.FirstOperandObjectID == item.typeData.occupancyGroupId) ||
                                (item.typeData.timeclockId && currentCond.FirstOperandObjectID == item.typeData.timeclockId) ||
                                (item.typeData.sequenceId && currentCond.FirstOperandObjectID == item.typeData.sequenceId) ||
                                (item.typeData.deviceId && currentCond.FirstOperandObjectID == item.typeData.deviceId));
                        sEl.innerHTML = `<span style="${isSelected ? 'color:var(--accent)' : ''}">${item.label}</span>`;
                        sEl.addEventListener('click', e => {
                            e.stopPropagation();
                            _closeCondPickerMenus();
                            if (item.unknownType) {
                                showToast('このConditionTypeはまだ未対応です（DB上のConditionTypeが不明）');
                                return;
                            }
                            openCondValueEditor(evalId, actionId, item.condType, item.typeData, item.typeFields, currentCond, vars, leds);
                        });
                        sub.appendChild(sEl);
                    });

                    // Position right of primary, clamped to viewport
                    const prRect = primary.getBoundingClientRect();
                    const elRect = el.getBoundingClientRect();
                    const vh = window.innerHeight;
                    const subH = Math.min(cat.items.length * 27 + 6, 320);
                    const top = Math.min(elRect.top, vh - subH - 8);
                    sub.style.cssText = `top:${top}px;left:${prRect.right + 2}px`;
                    document.body.appendChild(sub);
                });

                el.addEventListener('mouseleave', _scheduleCondSubClose);
                primary.appendChild(el);
            });

            // Position primary menu, clamped to viewport
            const rect = event.currentTarget?.getBoundingClientRect?.() || { bottom: event.clientY, left: event.clientX };
            const vh = window.innerHeight;
            const ph = categories.length * 27 + 6;
            const top = Math.min(rect.bottom + 2, vh - ph - 8);
            primary.style.cssText = `top:${top}px;left:${rect.left}px`;
            document.body.appendChild(primary);

            setTimeout(() => document.addEventListener('click', _closeCondPickerMenus, { once: true }), 0);
        }

        async function openCondValueEditor(evalId, actionId, condType, typeData, typeFields, currentCond, vars, leds) {
            // Build a condition object for the pickers (use existing if condType matches, else build default)
            let cond;
            if (currentCond && currentCond.ConditionType === condType) {
                cond = currentCond;
            } else {
                cond = {
                    EvaluationID: evalId,
                    ConditionType: condType,
                    EvaluationOperator: condType === 1 ? 9 : 3,
                    FirstOperandObjectID: typeData.varId || typeData.ledId || typeData.zoneId || typeData.areaId ||
                        typeData.occupancyGroupId || typeData.timeclockId || typeData.sequenceId ||
                        typeData.deviceId || typeFields.FirstOperandObjectID || null,
                    FirstOperandRefProperty: typeData.propId || typeFields.FirstOperandRefProperty || null,
                    SecondOperand: condType === 5 ? 1 : (typeFields.SecondOperand ?? 0),
                    ThirdOperand: null,
                };
            }

            let title, bodyHtml;
            if (condType === 0) {
                const adjustedCond = { ...cond, FirstOperandObjectID: typeData.varId ?? cond.FirstOperandObjectID };
                title = 'Variable 条件';
                bodyHtml = buildVariablePicker(vars, adjustedCond);
            } else if (condType === 5) {
                const adjustedCond = { ...cond, FirstOperandObjectID: typeData.ledId ?? cond.FirstOperandObjectID };
                title = 'LED State 条件';
                bodyHtml = buildLedPicker(leds, adjustedCond);
            } else if (condType === 23) {
                const adjustedCond = { ...cond, FirstOperandRefProperty: typeData.propId ?? cond.FirstOperandRefProperty };
                title = 'Room Properties 条件';
                bodyHtml = buildSysPropPicker(adjustedCond);
            } else if (condType === 1) {
                title = 'Time of Day 条件';
                bodyHtml = buildTimePicker(cond);
            } else if (condType === 2) {
                title = 'Occupancy Group 条件';
                bodyHtml = buildOccupancyGroupPicker(cond);
            } else if (condType === 3) {
                title = 'Contact Closure Output 条件';
                bodyHtml = buildBinaryStatePicker(cond, 'Open', 'Closed', 0, 1);
            } else if (condType === 6) {
                title = 'Area Occupancy 条件';
                bodyHtml = buildIsNotPicker(cond, 'Occupied');
            } else if (condType === 7) {
                title = 'Zone Level 条件';
                bodyHtml = buildLevelRangePicker(cond);
            } else if (condType === 8) {
                title = 'Shade Group 条件';
                bodyHtml = buildIsNotPicker(cond, 'Open');
            } else if (condType === 9) {
                title = 'Timeclock 条件';
                bodyHtml = buildIsNotPicker(cond, 'Enabled');
            } else if (condType === 10) {
                const cd = await loadCondData();
                title = 'Sequence 条件';
                bodyHtml = buildSequenceStepPicker(cond, cd, typeData.sequenceId ?? cond.FirstOperandObjectID);
            } else if (condType === 14) {
                title = 'HVAC Zone 条件';
                bodyHtml = buildHvacTempPicker(cond);
            } else if (condType === 18) {
                title = 'Device Lock State 条件';
                bodyHtml = buildLockStatePicker(cond);
            } else {
                showToast(`ConditionType ${condType} は未対応`);
                return;
            }

            _showConditionModal(title, bodyHtml, async (data) => {
                // Strip internal-only key before sending
                const { ObjectTypeOverride, ...rest } = typeFields;
                const payload = { ...rest, ...data };
                if (ObjectTypeOverride) payload._objectType = ObjectTypeOverride;
                await _saveOrCreateCondition(evalId, actionId, payload);
            });
        }

        async function _saveOrCreateCondition(evalId, actionId, data) {
            // _objectType is an internal hint for the correct tblEvaluation ObjectType
            const { _objectType, ...payload } = data;
            if (_objectType) payload.ObjectType = _objectType;
            let res;
            if (evalId != null) {
                res = await fetch(`/api/evaluation/${evalId}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
            } else {
                res = await fetch(`/api/action/${actionId}/create-evaluation`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
            }
            const d = await res.json();
            if (d.error) { showToast('エラー: ' + d.error); return; }
            await reloadPrograms();
        }

        async function editCondition(condJson) {
            let cond;
            try { cond = typeof condJson === 'string' ? JSON.parse(condJson) : condJson; } catch { cond = null; }
            if (!cond || !cond.EvaluationID) { showToast('この条件は編集できません'); return; }

            const ct = cond.ConditionType;

            if (ct === 0) {
                const vars = await loadVariables();
                _showConditionModal('Variable 条件を変更', buildVariablePicker(vars, cond), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 5) {
                const leds = await loadLeds();
                _showConditionModal('LED 条件を変更', buildLedPicker(leds, cond), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 23) {
                _showConditionModal('System Property 条件を変更', buildSysPropPicker(cond), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 1) {
                _showConditionModal('Time of Day 条件を変更', buildTimePicker(cond), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 2) {
                _showConditionModal('Occupancy Group 条件を変更', buildOccupancyGroupPicker(cond), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 3) {
                _showConditionModal('Contact Closure Output 条件を変更', buildBinaryStatePicker(cond, 'Open', 'Closed', 0, 1), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 6) {
                _showConditionModal('Area Occupancy 条件を変更', buildIsNotPicker(cond, 'Occupied'), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 7) {
                _showConditionModal('Zone Level 条件を変更', buildLevelRangePicker(cond), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 8) {
                _showConditionModal('Shade Group 条件を変更', buildIsNotPicker(cond, 'Open'), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 9) {
                _showConditionModal('Timeclock 条件を変更', buildIsNotPicker(cond, 'Enabled'), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 10) {
                const cd = await loadCondData();
                _showConditionModal('Sequence 条件を変更', buildSequenceStepPicker(cond, cd, cond.FirstOperandObjectID), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 14) {
                _showConditionModal('HVAC Zone 条件を変更', buildHvacTempPicker(cond), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else if (ct === 18) {
                _showConditionModal('Device Lock State 条件を変更', buildLockStatePicker(cond), async (data) => {
                    await _saveCondition(cond.EvaluationID, data);
                });
            } else {
                showToast(`ConditionType ${ct} の編集は未対応です`);
            }
        }

        function buildVariablePicker(vars, cond) {
            const opSel = `<select id="cond-op" style="margin-bottom:10px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="3" ${cond.EvaluationOperator === 3 ? 'selected' : ''}>is (Equal)</option>
    <option value="4" ${cond.EvaluationOperator === 4 ? 'selected' : ''}>is not (NotEqual)</option>
  </select>`;
            let varSel = `<select id="cond-var" style="margin-bottom:8px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px" onchange="updateVarStates(this.value)">`;
            vars.forEach(v => {
                varSel += `<option value="${v.VariableID}" ${v.VariableID == cond.FirstOperandObjectID ? 'selected' : ''}>${v.Name}</option>`;
            });
            varSel += '</select>';

            // State select — populated by current variable
            const curVar = vars.find(v => v.VariableID == cond.FirstOperandObjectID) || vars[0];
            let stateSel = `<select id="cond-state" style="width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">`;
            (curVar ? curVar.states : []).forEach(s => {
                stateSel += `<option value="${s.VariableStateID}" ${s.VariableStateID == cond.SecondOperand ? 'selected' : ''}>${s.Name}</option>`;
            });
            stateSel += '</select>';

            // Store vars for dynamic update
            window._condVarsData = vars;

            return `<div>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">演算子</div>${opSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">Variable</div>${varSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">State</div>${stateSel}
  </div>`;
        }

        function updateVarStates(varId) {
            const vars = window._condVarsData || [];
            const v = vars.find(x => x.VariableID == varId);
            const sel = document.getElementById('cond-state');
            if (!sel || !v) return;
            sel.innerHTML = v.states.map(s => `<option value="${s.VariableStateID}">${s.Name}</option>`).join('');
        }

        function buildLedPicker(leds, cond) {
            const opSel = `<select id="cond-op" style="margin-bottom:10px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="3" ${cond.EvaluationOperator === 3 ? 'selected' : ''}>is (Equal)</option>
    <option value="4" ${cond.EvaluationOperator === 4 ? 'selected' : ''}>is not (NotEqual)</option>
  </select>`;
            let ledSel = `<select id="cond-led" style="margin-bottom:8px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">`;
            leds.forEach(l => {
                const label = `LED ${l.LedNumber} — ${l.StationName || l.DeviceName}`;
                ledSel += `<option value="${l.LedID}" ${l.LedID == cond.FirstOperandObjectID ? 'selected' : ''}>${label}</option>`;
            });
            ledSel += '</select>';
            const stateSel = `<select id="cond-led-state" style="width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="1" ${cond.SecondOperand === 1 ? 'selected' : ''}>On (Active)</option>
    <option value="0" ${cond.SecondOperand === 0 ? 'selected' : ''}>Off (Inactive)</option>
  </select>`;
            return `<div>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">演算子</div>${opSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">LED</div>${ledSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">状態</div>${stateSel}
  </div>`;
        }

        function buildSysPropPicker(cond) {
            const props = Object.entries(SYSTEM_PROP_NAMES);
            const opSel = `<select id="cond-op" style="margin-bottom:10px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="3" ${cond.EvaluationOperator === 3 ? 'selected' : ''}>is (Equal)</option>
    <option value="4" ${cond.EvaluationOperator === 4 ? 'selected' : ''}>is not (NotEqual)</option>
  </select>`;
            let propSel = `<select id="cond-prop" style="margin-bottom:8px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">`;
            props.forEach(([id, name]) => {
                propSel += `<option value="${id}" ${cond.FirstOperandRefProperty == id ? 'selected' : ''}>${name}</option>`;
            });
            propSel += '</select>';
            const valSel = `<select id="cond-prop-val" style="width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="0" ${cond.SecondOperand === 0 ? 'selected' : ''}>0 (Off/Inactive)</option>
    <option value="1" ${cond.SecondOperand === 1 ? 'selected' : ''}>1 (On/Active)</option>
    <option value="2" ${cond.SecondOperand === 2 ? 'selected' : ''}>2</option>
  </select>`;
            return `<div>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">演算子</div>${opSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">Property</div>${propSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">値</div>${valSel}
  </div>`;
        }

        function buildTimePicker(cond) {
            // Decode current From/To values
            const fromVal = cond.SecondOperand || 0;
            const toVal = cond.ThirdOperand || 0;
            const fromTod = (fromVal >> 16) & 0xFFFF;
            const toTod = (toVal >> 16) & 0xFFFF;
            const fromOff = fromVal & 0xFFFF;
            const toOff = toVal & 0xFFFF;

            function todOption(id, label, cur) {
                return `<option value="${id}" ${cur == id ? 'selected' : ''}>${label}</option>`;
            }
            function timeOpts(cur) {
                let opts = todOption(2000, 'Sunrise', cur) + todOption(2001, 'Sunset', cur);
                // Add common times every 30 min
                for (let m = 0; m < 1440; m += 30) {
                    const h = Math.floor(m / 60).toString().padStart(2, '0');
                    const mm = (m % 60).toString().padStart(2, '0');
                    opts += `<option value="${m}" ${cur === m && cur < 2000 ? 'selected' : ''}>${h}:${mm}</option>`;
                }
                return opts;
            }

            const sel = `width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px`;
            return `<div>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">From</div>
    <select id="cond-time-from" style="margin-bottom:8px;${sel}">${timeOpts(fromTod)}</select>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">From オフセット (分)</div>
    <input id="cond-time-from-off" type="number" value="${fromOff}" min="0" max="120"
      style="margin-bottom:10px;${sel}">
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">To</div>
    <select id="cond-time-to" style="margin-bottom:8px;${sel}">${timeOpts(toTod)}</select>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">To オフセット (分)</div>
    <input id="cond-time-to-off" type="number" value="${toOff}" min="0" max="120" style="${sel}">
  </div>`;
        }

        function saveConditionEdit() {
            // Collect values based on which selects are present
            const data = {};
            const op = document.getElementById('cond-op');
            if (op) data.EvaluationOperator = parseInt(op.value);

            const varSel = document.getElementById('cond-var');
            const stateSel = document.getElementById('cond-state');
            if (varSel && stateSel) {
                data.FirstOperandObjectID = parseInt(varSel.value);
                data.SecondOperand = parseInt(stateSel.value);
            }
            const ledSel = document.getElementById('cond-led');
            const ledState = document.getElementById('cond-led-state');
            if (ledSel && ledState) {
                data.FirstOperandObjectID = parseInt(ledSel.value);
                data.SecondOperand = parseInt(ledState.value);
            }
            const propSel = document.getElementById('cond-prop');
            const propVal = document.getElementById('cond-prop-val');
            if (propSel && propVal) {
                data.FirstOperandRefProperty = parseInt(propSel.value);
                data.SecondOperand = parseInt(propVal.value);
            }
            const timFrom = document.getElementById('cond-time-from');
            const timTo = document.getElementById('cond-time-to');
            if (timFrom && timTo) {
                const fromOff = parseInt(document.getElementById('cond-time-from-off')?.value || '0');
                const toOff = parseInt(document.getElementById('cond-time-to-off')?.value || '0');
                data.SecondOperand = encodeLutronTime(parseInt(timFrom.value), fromOff);
                data.ThirdOperand = encodeLutronTime(parseInt(timTo.value), toOff);
            }
            const occScene = document.getElementById('cond-occ-scene');
            if (occScene) data.SecondOperand = parseInt(occScene.value);
            const binState = document.getElementById('cond-binary-state');
            if (binState) data.SecondOperand = parseInt(binState.value);
            const levelFrom = document.getElementById('cond-level-from');
            const levelTo = document.getElementById('cond-level-to');
            if (levelFrom && levelTo) {
                data.SecondOperand = parseInt(levelFrom.value);
                data.ThirdOperand = parseInt(levelTo.value);
            }
            const hvacFrom = document.getElementById('cond-hvac-from');
            const hvacTo = document.getElementById('cond-hvac-to');
            if (hvacFrom && hvacTo) {
                // Convert °C → Lutron (tenths of °F)
                data.SecondOperand = Math.round((parseFloat(hvacFrom.value) * 9 / 5 + 32) * 10);
                data.ThirdOperand = Math.round((parseFloat(hvacTo.value) * 9 / 5 + 32) * 10);
            }
            const seqStep = document.getElementById('cond-seq-step');
            if (seqStep) data.SecondOperand = parseInt(seqStep.value);
            const lockState = document.getElementById('cond-lock-state');
            if (lockState) data.SecondOperand = parseInt(lockState.value);
            document.getElementById('cond-editor-overlay')?.remove();
            if (_condSaveCallback) { _condSaveCallback(data); _condSaveCallback = null; }
        }
