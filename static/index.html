<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lutron Designer Viewer</title>
<style>
  :root {
    --bg: #1a1a1e; --surface: #242428; --surface2: #2e2e34;
    --border: #3a3a42; --accent: #4a90d9; --accent2: #2d6bb3;
    --text: #e0e0e8; --text-dim: #888896;
    --green: #5cb85c; --orange: #f0a030; --red: #d9534f; --teal: #5bc0de;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 10px; }
  header .logo { color: var(--accent); font-weight: 700; font-size: 16px; }
  header h1 { font-size: 14px; font-weight: 600; }
  header .spacer { flex: 1; }
  .btn-group { display: flex; gap: 6px; }

  #place-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 6px 14px; display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-dim); min-height: 32px; flex-wrap: wrap; }
  #place-bar .info-item { display: flex; gap: 4px; }
  #place-bar .info-value { color: var(--text); font-weight: 500; }
  #dirty-badge { display: none; background: var(--orange); color: #000; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px; }

  .main { flex: 1; display: flex; overflow: hidden; }

  #sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #sidebar-header { padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  #area-tree { flex: 1; overflow-y: auto; padding: 4px 0; }

  .tree-node { display: flex; align-items: center; gap: 6px; padding: 5px 10px; cursor: pointer; user-select: none; border-left: 3px solid transparent; }
  .tree-node:hover { background: var(--surface2); }
  .tree-node.selected { background: rgba(74,144,217,0.15); border-left-color: var(--accent); }
  .tree-node .node-icon { font-size: 13px; flex-shrink: 0; }
  .tree-node .node-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-node .node-leaf { color: #4db6ac; font-size: 9px; }

  #detail { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; }
  .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-dim); }
  .welcome .icon { font-size: 40px; opacity: 0.25; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .card-header { background: var(--surface2); padding: 7px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-header .count { background: var(--accent2); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 700; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: rgba(0,0,0,0.2); text-align: left; padding: 5px 10px; color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.03); }

  /* Editable cells */
  .editable { cursor: text; position: relative; }
  .editable:hover { background: rgba(74,144,217,0.08) !important; outline: 1px solid var(--accent2); border-radius: 2px; }
  .editable:focus { outline: 2px solid var(--accent); border-radius: 2px; background: rgba(74,144,217,0.12) !important; }
  .edit-hint { font-size: 9px; color: var(--text-dim); margin-left: 4px; opacity: 0; transition: opacity 0.15s; }
  tr:hover .edit-hint { opacity: 1; }

  .badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge-dim { background: rgba(74,144,217,0.2); color: #7ab4e8; }
  .badge-cco { background: rgba(240,160,48,0.2); color: #e8b060; }
  .badge-shade { background: rgba(91,192,222,0.2); color: #7dd0e8; }
  .badge-hvac { background: rgba(92,184,92,0.2); color: #7ed47e; }
  .badge-other { background: rgba(150,150,170,0.2); color: #aaaacc; }
  .layer-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; cursor: pointer; }
  .layer-ambient { background: rgba(255,220,80,0.2); color: #f0d060; }
  .layer-task    { background: rgba(200,140,255,0.2); color: #c89ce0; }
  .layer-accent  { background: rgba(255,120,80,0.2);  color: #f08060; }
  .layer-other   { background: rgba(130,130,150,0.2); color: #a0a0c0; }

  .keypad-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; }
  .keypad-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; min-width: 160px; flex: 1; }
  .keypad-name { padding: 7px 10px; font-size: 11px; font-weight: 600; color: var(--accent); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .btn-row { display: flex; align-items: center; gap: 8px; padding: 3px 10px; font-size: 11px; }
  .btn-num { width: 20px; height: 20px; border-radius: 3px; background: rgba(74,144,217,0.3); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .btn-prog { color: var(--text-dim); font-size: 10px; margin-left: auto; }

  /* Programs tab */
  .detail-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 0; }
  .detail-tab { padding: 7px 16px; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; margin-bottom: -1px; user-select: none; }
  .detail-tab:hover { color: var(--text); }
  .detail-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Program view */
  .prog-station { margin-bottom: 14px; }
  .prog-station-name { font-size: 12px; font-weight: 700; color: var(--accent); padding: 6px 12px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .prog-btn-row { border-bottom: 1px solid rgba(255,255,255,0.04); }
  .prog-btn-row:last-child { border-bottom: none; }
  .prog-btn-header { display: flex; align-items: center; gap: 8px; padding: 5px 12px; cursor: pointer; font-size: 12px; }
  .prog-btn-header:hover { background: rgba(255,255,255,0.03); }
  .prog-btn-header .btn-num { width: 20px; height: 20px; border-radius: 3px; background: rgba(74,144,217,0.3); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .prog-btn-header .btn-label { flex: 1; font-weight: 500; }
  .prog-type-badge { font-size: 10px; padding: 1px 7px; border-radius: 10px; font-weight: 600; }
  .prog-type-scene { background: rgba(74,144,217,0.2); color: #7ab4e8; }
  .prog-type-toggle { background: rgba(92,184,92,0.2); color: #7ed47e; }
  .prog-type-rl { background: rgba(240,160,48,0.2); color: #e8b060; }
  .prog-type-cond { background: rgba(200,100,200,0.2); color: #d890d8; }
  .prog-type-other { background: rgba(130,130,150,0.2); color: #a0a0c0; }
  .prog-chevron { font-size: 10px; color: var(--text-dim); transition: transform 0.15s; }
  .prog-chevron.open { transform: rotate(90deg); }
  .prog-detail { display: none; padding: 6px 12px 10px 40px; font-size: 11px; }
  .prog-detail.open { display: block; }
  .prog-event-tabs { display: flex; gap: 0; margin-bottom: 8px; }
  .prog-event-tab { padding: 3px 10px; font-size: 10px; cursor: pointer; color: var(--text-dim); border: 1px solid var(--border); border-right: none; background: var(--surface); }
  .prog-event-tab:first-child { border-radius: 4px 0 0 4px; }
  .prog-event-tab:last-child { border-right: 1px solid var(--border); border-radius: 0 4px 4px 0; }
  .prog-event-tab.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .prog-event-tab.has-data { color: var(--text); }
  .prog-event-tab.active.has-data { color: #fff; }
  .prog-event-panel { display: none; }
  .prog-event-panel.active { display: block; }
  .prog-actions { font-family: monospace; font-size: 11px; line-height: 1.6; color: var(--text); }
  .prog-actions .prog-line { padding: 1px 0; }
  .prog-actions .prog-keyword { color: #c586c0; font-weight: 600; }
  .prog-actions .prog-action { color: #9cdcfe; }
  .prog-actions .prog-condition { color: #dcdcaa; }
  .prog-actions .prog-indent { margin-left: 20px; }
  .prog-no-data { color: var(--text-dim); font-size: 11px; font-style: italic; }

  /* Editable program lines */
  .prog-line-run { cursor: pointer; border-radius: 3px; transition: background 0.1s; }
  .prog-line-run:hover { background: rgba(74,144,217,0.12); }
  .prog-line-run:hover .prog-edit-hint { opacity: 1; }
  .prog-edit-hint { opacity: 0; color: var(--accent); font-size: 9px; margin-left: 4px; transition: opacity 0.15s; }
  .prog-led-edit { cursor: pointer; border-radius: 3px; padding: 0 2px; }
  .prog-led-edit:hover { background: rgba(74,144,217,0.12); }
  .prog-led-edit:hover .prog-edit-hint { opacity: 1; }
  .prog-led-logic-sel { background: transparent; border: none; color: var(--teal); font-size: 11px; cursor: pointer; padding: 0; font-family: inherit; }
  .prog-led-logic-sel:focus { outline: 1px solid var(--accent); border-radius: 2px; }
  .prog-led-logic-sel option { background: var(--surface2); color: var(--text); }
  /* Add action button */
  .prog-add-btn { background: none; border: 1px dashed rgba(255,255,255,0.2); color: var(--text-dim); font-size: 10px; border-radius: 3px; padding: 1px 8px; cursor: pointer; margin-top: 2px; transition: all 0.15s; }
  .prog-add-btn:hover { border-color: var(--accent); color: var(--accent); }
  .prog-del-btn { opacity: 0; background: none; border: none; color: #e06c75; font-size: 9px; cursor: pointer; padding: 0 3px; border-radius: 2px; transition: opacity 0.15s; }
  .prog-line:hover .prog-del-btn { opacity: 0.6; }
  .prog-del-btn:hover { opacity: 1 !important; background: rgba(224,108,117,0.15); }
  /* Add action popup menu */
  .add-action-menu { position: fixed; background: var(--surface2); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; z-index: 2000; min-width: 150px; padding: 4px 0; box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
  .add-action-menu div { padding: 6px 14px; cursor: pointer; font-size: 11px; color: var(--text); }
  .add-action-menu div:hover { background: rgba(255,255,255,0.1); }
  /* Inline add button (shown on hover to the right of each action line) */
  .prog-add-inline { opacity: 0; background: none; border: 1px dashed rgba(255,255,255,0.2); color: var(--text-dim); font-size: 9px; border-radius: 2px; padding: 0 5px; cursor: pointer; margin-left: 4px; transition: all 0.15s; vertical-align: middle; }
  .prog-line:hover .prog-add-inline, .prog-line-run:hover .prog-add-inline { opacity: 1; }
  .prog-add-inline:hover { border-color: var(--accent) !important; color: var(--accent) !important; opacity: 1 !important; }
  /* AND/OR condition connector */
  .prog-connector { color: #c586c0; font-weight: 600; cursor: pointer; padding: 0 2px; border-radius: 2px; }
  .prog-connector:hover { background: rgba(197,134,192,0.2); }
  /* Condition picker button */
  .prog-cond-btn { cursor: pointer; border-radius: 3px; padding: 0 4px; border: 1px solid transparent; transition: border-color 0.12s, background 0.12s; }
  .prog-cond-btn:hover { border-color: rgba(220,220,170,0.4); background: rgba(220,220,170,0.08); }
  /* Condition picker dropdown menus */
  .cond-picker-menu { position: fixed; z-index: 10000; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 3px 0; min-width: 190px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  .cond-picker-menu.cond-sub-menu { max-height: 320px; overflow-y: auto; }
  .cond-picker-menu .cpi { padding: 5px 14px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-size: 12px; white-space: nowrap; }
  .cond-picker-menu .cpi:hover { background: rgba(74,144,217,0.2); }
  .cond-picker-menu .cpi.cpi-disabled { color: var(--text-dim); cursor: default; }
  .cond-picker-menu .cpi.cpi-disabled:hover { background: none; }
  .cond-picker-menu .cpi.cpi-unknown { color: var(--text-dim); font-style: italic; }
  .cond-picker-menu .cpi-arrow { color: var(--text-dim); font-size: 10px; margin-left: 8px; flex-shrink: 0; }
  /* Then ▾ dropdown */
  .prog-then-drop { cursor: pointer; border-radius: 2px; padding: 0 3px; }
  .prog-then-drop:hover { background: rgba(197,134,192,0.2); }
  /* Drag-and-drop */
  .prog-line[draggable="true"] { cursor: grab; }
  .prog-line[draggable="true"]:active { cursor: grabbing; }
  .prog-line.dragging { opacity: 0.35; }
  .prog-line.drag-over-top { box-shadow: 0 -2px 0 var(--accent); }
  .prog-line.drag-over-bottom { box-shadow: 0 2px 0 var(--accent); }

  /* Scene picker modal */
  .scene-picker-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; }
  .scene-picker-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; width: 420px; max-height: 560px; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  .scene-picker-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; }
  .scene-picker-header button { background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; padding: 0 4px; }
  .scene-picker-header button:hover { color: var(--text); }
  .scene-picker-search { width: 100%; padding: 8px 12px; background: var(--surface2); border: none; border-bottom: 1px solid var(--border); color: var(--text); font-size: 12px; box-sizing: border-box; }
  .scene-picker-search:focus { outline: none; background: var(--surface); }
  .scene-picker-list { flex: 1; overflow-y: auto; min-height: 0; }
  .scene-picker-group { padding: 6px 12px 3px; font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.8px; background: var(--surface2); border-bottom: 1px solid rgba(255,255,255,0.04); position: sticky; top: 0; }
  .scene-picker-item { padding: 5px 16px; font-size: 12px; cursor: pointer; color: var(--text); }
  .scene-picker-item:hover { background: rgba(74,144,217,0.15); }
  .scene-picker-item.is-current { color: var(--accent); font-weight: 600; }
  .scene-picker-item.hidden { display: none; }
  .scene-picker-footer { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--border); justify-content: flex-end; }

  .scene-grid { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; }
  .scene-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .scene-num { font-size: 10px; font-weight: 700; color: var(--text-dim); }
  .scene-off { color: var(--red); } .scene-on { color: var(--teal); }

  .btn { padding: 6px 14px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-success { background: var(--green); color: #fff; }
  .btn-danger  { background: var(--red); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading { color: var(--text-dim); font-size: 12px; padding: 16px; text-align: center; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; }

  /* Layer select dropdown */
  select.layer-select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; font-size: 11px; cursor: pointer; }

  /* Add Zone modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; }
  .modal-overlay.show { display:flex; align-items:center; justify-content:center; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px; width:420px; max-width:95vw; display:flex; flex-direction:column; gap:12px; }
  .modal-box h3 { font-size:14px; font-weight:700; color:var(--text); }
  .modal-box label { font-size:11px; color:var(--text-dim); margin-bottom:2px; display:block; }
  .modal-box input, .modal-box select { width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:6px 8px; font-size:12px; }
  .modal-box input:focus, .modal-box select:focus { outline:2px solid var(--accent); }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }

  /* Template switcher */
  #template-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 4px 14px; display: none; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
  #template-bar label { white-space: nowrap; }
  #template-select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; font-size: 11px; cursor: pointer; flex: 1; max-width: 320px; }
  #template-loading { color: var(--text-dim); font-size: 11px; display: none; }
</style>
</head>
<body>

<header>
  <span class="logo">LD</span>
  <h1>Lutron Designer Viewer</h1>
  <div class="spacer"></div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="openFile('pl')">📄 .plを開く</button>
    <button class="btn btn-outline" onclick="openFile('folder')">📁 フォルダを開く</button>
    <button class="btn btn-success" id="save-btn" onclick="saveFile()" disabled>💾 保存</button>
  </div>
</header>

<div id="place-bar">
  <span style="color:var(--text-dim)">ファイルまたはフォルダを選択してください</span>
</div>

<div id="template-bar">
  <label for="template-select">テンプレート:</label>
  <select id="template-select" onchange="switchTemplate(this.value)"></select>
  <span id="template-loading">切替中...</span>
</div>

<div class="main">
  <div id="sidebar">
    <div id="sidebar-header">エリア</div>
    <div id="area-tree"><div class="loading">─</div></div>
  </div>
  <div id="detail">
    <div class="welcome">
      <div class="icon">🏨</div>
      <p>左のエリアを選択すると詳細を表示します</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Text output modal (copyable) -->
<div class="modal-overlay" id="text-modal-overlay" onclick="if(event.target===this)closeTextModal()">
  <div class="modal-box" style="width:700px;max-width:95vw">
    <h3 id="text-modal-title">結果</h3>
    <textarea id="text-modal-body" readonly style="width:100%;height:400px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:11px;font-family:monospace;resize:vertical"></textarea>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="copyTextModal()">📋 コピー</button>
      <button class="btn btn-primary" onclick="closeTextModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- Add Zone modal -->
<div class="modal-overlay" id="add-zone-overlay" onclick="if(event.target===this)closeAddZone()">
  <div class="modal-box">
    <h3>Zone を追加</h3>
    <div>
      <label>Zone Name</label>
      <input type="text" id="az-name" placeholder="例: Bed DL">
    </div>
    <div>
      <label>Load Type</label>
      <select id="az-load-type" size="1"></select>
    </div>
    <div>
      <label>Zone Layer</label>
      <select id="az-layer">
        <option value="0">Ambient</option>
        <option value="1">Task</option>
        <option value="2">Accent</option>
        <option value="4">Internal</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeAddZone()">キャンセル</button>
      <button class="btn btn-primary" id="az-submit-btn" onclick="submitAddZone()">追加</button>
    </div>
    <input type="hidden" id="az-overlay-area" value="">
  </div>
</div>

<script>
let isPl = false;
let isDirty = false;
let currentAreaId = null;
let allTemplates = [];   // [{id, name}] from SQLite
let fsTemplates = [];    // [filename] from filesystem
let loadTypesCache = []; // [{LoadTypeID, Description, ControlType}]

// ControlType labels for grouping
const CT_GROUPS = {
  1: 'Dimmed', 2: 'Switched', 5: 'Shade', 6: 'Fan',
  7: 'CCO Maintained', 8: 'CCO Pulsed', 9: 'HVAC', 10: 'Venetian Blind'
};

// ── Open file/folder ─────────────────────────
async function openFile(mode) {
  const res = await fetch('/api/open', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({mode})
  });
  if (!res.ok) { const e = await res.json(); toast(e.error || 'エラー', 'red'); return; }
  const data = await res.json();
  isPl = data.is_pl;
  document.getElementById('save-btn').disabled = !isPl;
  fsTemplates = data.templates || [];
  // Reset all caches when a new file is loaded
  _variablesCache = null; _ledsCache = null; _condDataCache = null;
  await loadOverview();
  updateTemplateBar(data.active_template);
  await loadTree();
  if (currentAreaId) loadDetail(currentAreaId, '');
  toast(`${data.name} を開きました`);
}

// ── Template switcher ─────────────────────────
function updateTemplateBar(activeId) {
  const bar = document.getElementById('template-bar');
  const sel = document.getElementById('template-select');
  if (fsTemplates.length <= 1) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  sel.innerHTML = fsTemplates.map(tid => {
    const tidLower = tid.toLowerCase();
    const meta = allTemplates.find(t =>
      (t.projectDatabaseArtifactId || '').toLowerCase() === tidLower
    );
    const label = meta ? meta.name : tid.slice(0, 16) + '…';
    return `<option value="${tid}" ${tid === activeId ? 'selected' : ''}>${label}</option>`;
  }).join('');
}

async function switchTemplate(templateId) {
  const loading = document.getElementById('template-loading');
  const sel = document.getElementById('template-select');
  loading.style.display = 'inline';
  sel.disabled = true;
  currentAreaId = null;
  document.getElementById('detail').innerHTML = '<div class="loading">テンプレート切替中...</div>';
  try {
    const res = await fetch('/api/switch-template', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({template_id: templateId})
    });
    const d = await res.json();
    if (!res.ok) { toast(d.error || '切替失敗', 'red'); return; }
    await loadTree();
    toast('テンプレートを切り替えました');
  } finally {
    loading.style.display = 'none';
    sel.disabled = false;
  }
}

// ── Overview bar ─────────────────────────────
async function loadOverview() {
  const res = await fetch('/api/overview');
  if (!res.ok) return;

  allTemplates = d.templates || [];

// ── Area tree ────────────────────────────────
async function loadTree() {
  const res = await fetch('/api/areas');
  if (!res.ok) { document.getElementById('area-tree').innerHTML = '<div class="loading">テンプレートなし</div>'; return; }
  const areas = await res.json();
  if (!areas.length) { document.getElementById('area-tree').innerHTML = '<div class="loading">エリアなし</div>'; return; }
  renderTree(areas);
}

function renderTree(areas) {
  const childMap = {};
  areas.forEach(a => { if (!childMap[a.ParentID]) childMap[a.ParentID]=[]; childMap[a.ParentID].push(a); });
  const roots = areas.filter(a => a.HierarchyLevel === 2);
  const container = document.getElementById('area-tree');
  container.innerHTML = '';
  roots.forEach(r => renderNode(r, childMap, container, 0));
}

function renderNode(node, childMap, container, depth) {
  const children = childMap[node.AreaID] || [];
  const isLeaf = node.IsLeaf === 1 || children.length === 0;
  const el = document.createElement('div');
  el.className = 'tree-node';
  el.dataset.id = node.AreaID;
  el.style.paddingLeft = (10 + depth * 14) + 'px';
  el.innerHTML = `<span class="node-icon">${isLeaf ? '🏠' : '📂'}</span><span class="node-name">${node.Name}</span>${isLeaf ? '<span class="node-leaf">●</span>' : ''}`;
  el.addEventListener('click', () => {
    document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('selected'));
    el.classList.add('selected');
    currentAreaId = node.AreaID;
    loadDetail(node.AreaID, node.Name);
  });
  container.appendChild(el);
  children.forEach(c => renderNode(c, childMap, container, depth + 1));
}

// ── Detail panel ─────────────────────────────

  const prog = progRes.ok ? await progRes.json() : {};

  const tab = activeDetailTab;

    <div style="font-size:15px;font-weight:600;padding:2px 0 6px">${areaName}</div>
    <div class="card" style="overflow:visible">
      <div class="detail-tabs">
        <div class="detail-tab ${tab==='zones'?'active':''}" onclick="switchDetailTab('zones',${areaId},'${areaName.replace(/'/g,"\\'")}')">Zones</div>
        <div class="detail-tab ${tab==='scenes'?'active':''}" onclick="switchDetailTab('scenes',${areaId},'${areaName.replace(/'/g,"\\'")}')">Scenes</div>
        <div class="detail-tab ${tab==='keypads'?'active':''}" onclick="switchDetailTab('keypads',${areaId},'${areaName.replace(/'/g,"\\'")}')">Keypads</div>

}

function switchDetailTab(tabName, areaId, areaName) {
  activeDetailTab = tabName;
  document.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const tabs = document.querySelectorAll('.detail-tab');
  const tabOrder = ['zones','scenes','keypads','programs'];
  const idx = tabOrder.indexOf(tabName);
  if (tabs[idx]) tabs[idx].classList.add('active');
  document.getElementById('tab-' + tabName).classList.add('active');
}

function layerBadge(val) {

}

function zonesTableHtml(zones, areaId) {

    </select>`;

  return `<div style="padding:0">

      Loads / Zones <span class="count">${zones.length}</span>${addBtn}${debugBtn}

    <div id="debug-panel-${areaId}" style="display:none;padding:10px;font-size:10px;font-family:monospace;white-space:pre-wrap;color:var(--text-dim);border-top:1px solid var(--border);max-height:400px;overflow-y:auto"></div>

function renderZonesCard(zones, areaId) {
  if (!zones.length) return '';
  return `<div class="card">${zonesTableHtml(zones, areaId)}</div>`;
}

async function onEditBlur(cell) {
  const zoneId = parseInt(cell.dataset.zone);
  const field = cell.dataset.field;
  const areaId = parseInt(cell.dataset.area);
  // Remove the hint span from value
  const spans = cell.querySelectorAll('.edit-hint');
  let val = cell.textContent;
  spans.forEach(s => { val = val.replace(s.textContent, ''); });
  val = val.trim();
  await patchZone(zoneId, field, val, areaId, false);
}

async function patchZone(zoneId, field, value, areaId, reload=true) {
  const body = {};
  body[field] = field === 'ZoneLayer' ? parseInt(value) : value;
  const res = await fetch(`/api/zone/${zoneId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  if (!res.ok) { toast('保存失敗', 'red'); return; }
  isDirty = true;
  document.getElementById('save-btn').disabled = !isPl;
  // Refresh dirty badge
  const db = document.getElementById('dirty-badge');
  if (db) db.style.display = 'inline-block';
  else {
    const bar = document.getElementById('place-bar');
    const span = document.createElement('span');
    span.id = 'dirty-badge';
    span.style.cssText = 'display:inline-block;background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;';
    span.textContent = '● 未保存';
    bar.appendChild(span);
  }
  toast('更新しました');
  if (reload) await loadDetail(areaId, '');
}

// ── Programs tab ─────────────────────────────
const PROG_LABELS = {
  'SAPM': 'Scene', 'ATPM': 'Toggle', 'SSRLPM': 'Raise/Lower',
  'MRLPM': 'Master R/L', 'AdvanceConditionalProgrammingModel': 'Conditional',
  'DAPM': 'Dimmer Action', 'CAPM': 'CCO Action',
};
const LED_LOGIC = {0:'None', 1:'Room', 2:'Scene', 3:'Pathway', 4:'Momentary On When Pressed', 5:'Via Integration', 6:'Defined by sequence'};
const TRIGGER_TYPE = {1:'Press', 2:'Release', 3:'Double Tap', 4:'Hold', 5:'If (LED On)', 6:'Else'};
const ACTION_OTYPE = {234:'Run', 235:'Delay', 233:'Conditional'};

function progTypeBadge(progModel) {
  if (!progModel) return '<span class="prog-type-badge prog-type-other">─</span>';
  const m = PROG_LABELS[progModel] || progModel;
  let cls = 'prog-type-other';
  if (progModel === 'SAPM') cls = 'prog-type-scene';
  else if (progModel === 'ATPM') cls = 'prog-type-toggle';
  else if (progModel === 'SSRLPM' || progModel === 'MRLPM') cls = 'prog-type-rl';
  else if (progModel === 'AdvanceConditionalProgrammingModel') cls = 'prog-type-cond';
  return `<span class="prog-type-badge ${cls}">${m}</span>`;
}

function presetLabel(presetId, presetNames) {
  if (!presetId) return '─';
  const p = presetNames[presetId];
  if (!p) return `ID:${presetId}`;
  return p.name || `Scene ${p.number ?? presetId}`;
}

function renderProgramsTab(prog) {
  if (!prog || !prog.stations || !prog.stations.length) {
    return '<div class="prog-no-data" style="padding:16px">キーパッドなし</div>';
  }

  const btns = {};
  (prog.buttons || []).forEach(b => {
    if (!btns[b.ParentDeviceID]) btns[b.ParentDeviceID] = [];
    btns[b.ParentDeviceID].push(b);
  });
  const stMap = {};
  (prog.stations || []).forEach(s => {
    if (!stMap[s.ControlStationID]) stMap[s.ControlStationID] = {name:s.StationName, devId:s.ControlStationDeviceID, modelId:s.ModelInfoID};
  });

  const pmDetails = prog.pm_details || {};
  const presetNames = prog.preset_names || {};
  const trigTrees = prog.trigger_trees || {};

  let html = `<div style="padding:4px 12px;font-size:10px;color:var(--text-dim);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
    <span style="margin-left:auto"></span>
    <button class="btn btn-outline" style="padding:1px 8px;font-size:10px" onclick="showProgSchema()">🔍 DB Schema</button>
  </div>`;

  Object.entries(stMap).forEach(([stId, cs]) => {
    const stBtns = btns[cs.devId] || [];
    if (!stBtns.length) return;

    html += `<div class="prog-station">
      <div class="prog-station-name">⌨ ${cs.name}<span style="color:var(--text-dim);font-size:10px;margin-left:auto">Model:${cs.modelId||'─'}</span></div>`;

    stBtns.forEach(b => {
      const uid = `prog-${b.ButtonID}`;
      const pmId = b.ProgrammingModelID;
      const pm = pmId ? pmDetails[pmId] : null;

      // Build summary line for header
      let summary = '';
      if (pm) {
        const presetId = pm.PressPresetID || pm.PresetID;
        if (presetId) summary = `Press → ${presetLabel(presetId, presetNames)}`;
        else if (pm.ControlType !== undefined) summary = `Type:${pm.ControlType}`;
      }

      html += `<div class="prog-btn-row">
        <div class="prog-btn-header" onclick="toggleProgDetail('${uid}')">
          <div class="btn-num">${b.ButtonNumber+1}</div>
          <span class="btn-label">${b.ButtonName}</span>
          ${progTypeBadge(b.ProgModel)}
          ${summary ? `<span style="font-size:10px;color:var(--text-dim);margin-left:6px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${summary}</span>` : '<span style="flex:1"></span>'}
          <span class="prog-chevron" id="${uid}-chev">▶</span>
        </div>
        <div class="prog-detail" id="${uid}">
          ${renderButtonProgramDetail(b, pm, presetNames, trigTrees)}
        </div>
      </div>`;
    });

    html += '</div>';
  });

  return html;
}

function getEventTabDefs(b, pm, eventMap) {
  const isCCO = b.ProgModel === 'CAPM';
  if (isCCO) {
    return [
      {key: 1, label: 'Open',       pmKey: 'OnPresetID'},
      {key: 2, label: 'Close',      pmKey: 'OffPresetID'},
    ];
  }
  return [
    {key: 1, label: 'Press',      pmKey: 'PressPresetID'},
    {key: 2, label: 'Release',    pmKey: 'ReleasePresetID'},
    {key: 3, label: 'Double Tap', pmKey: 'DoubleTapPresetID'},
    {key: 4, label: 'Hold',       pmKey: 'HoldPresetId'},
  ];
}

function getFallbackPreset(pm, pmKey) {
  if (!pmKey) return null;
  // PressPresetID fallback also checks PresetID
  if (pmKey === 'PressPresetID') return pm.PressPresetID || pm.PresetID;
  return pm[pmKey] || null;
}

function renderButtonProgramDetail(b, pm, presetNames, trigTrees) {
  if (!pm) return '<div class="prog-no-data">Programming Model データなし</div>';

  const uid = `prog-${b.ButtonID}`;
  let html = '';

  // LED info row — editable
  const pmId = pm.ProgrammingModelID;
  const ledRefLabel = pm.ReferencePresetIDForLed ? presetLabel(pm.ReferencePresetIDForLed, presetNames) : '─';
  const ledLogicOpts = Object.entries(LED_LOGIC)
    .map(([v, l]) => `<option value="${v}" ${pm.LedLogic == v ? 'selected' : ''}>${l}</option>`).join('');
  const reverseChecked = pm.UseReverseLedLogic ? 'checked' : '';
  html += `<div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px;font-size:11px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.06);align-items:center">
    <span><span style="color:var(--text-dim)">LED Logic: </span><select class="prog-led-logic-sel"
      onchange="editLedLogic(${pmId}, this.value)">${ledLogicOpts}</select></span>
    <label style="display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text-dim)">
      <input type="checkbox" ${reverseChecked} onchange="editPmBool(${pmId}, 'UseReverseLedLogic', this.checked)">
      Reverse Logic
    </label>
    <span class="prog-led-edit" onclick="editLedRef(${pmId}, ${pm.ReferencePresetIDForLed ?? 'null'})">
      <span style="color:var(--text-dim)">LED Based on: </span><span style="color:var(--teal)">${ledRefLabel}</span><span class="prog-edit-hint">✎</span>
    </span>
    ${pm.AllowDoubleTap ? '<span style="color:var(--text-dim)">Double Tap ✓</span>' : ''}
    ${pm.HoldTime ? `<span style="color:var(--text-dim)">Hold: ${pm.HoldTime}ms</span>` : ''}
  </div>`;

  // Build eventMap: TriggerType → {triggerID, actions[]}
  const tree = trigTrees[pm.ParentID] || trigTrees[pm.ProgrammingModelID] || [];
  const eventMap = {};
  tree.forEach(trig => {
    if (!eventMap[trig.TriggerType]) eventMap[trig.TriggerType] = {triggerID: trig.TriggerID, actions: []};
    eventMap[trig.TriggerType].actions.push(...trig.actions);
  });

  // Also collect any unknown trigger types (not 1-4) to show as-is
  const knownKeys = new Set([1, 2, 3, 4]);
  const extraTypes = Object.keys(eventMap).map(Number).filter(k => !knownKeys.has(k));

  const tabDefs = getEventTabDefs(b, pm, eventMap);

  // Build sub-tabs
  html += `<div class="prog-event-tabs">`;
  tabDefs.forEach((td, i) => {
    const evEntryTab = eventMap[td.key];
    const treeActionsTab = evEntryTab ? evEntryTab.actions : [];
    const fallback = getFallbackPreset(pm, td.pmKey);
    const hasData = treeActionsTab.length > 0 || !!fallback;
    html += `<div class="prog-event-tab ${i === 0 ? 'active' : ''} ${hasData ? 'has-data' : ''}"
      id="${uid}-etab-${td.key}"
      onclick="switchEventTab('${uid}', ${td.key})">${td.label}</div>`;
  });
  html += `</div>`;

  // Build content panels
  tabDefs.forEach((td, i) => {
    const evEntry = eventMap[td.key];
    const treeActions = evEntry ? evEntry.actions : [];
    const triggerId = evEntry ? evEntry.triggerID : null;
    const fallback = getFallbackPreset(pm, td.pmKey);
    html += `<div class="prog-event-panel ${i === 0 ? 'active' : ''}" id="${uid}-epanel-${td.key}">`;
    if (treeActions.length) {
      html += '<div class="prog-actions">';
      html += renderActionList(treeActions, presetNames, 0, pm, triggerId);
      html += '</div>';
    } else if (fallback) {
      const lbl = presetLabel(fallback, presetNames);
      html += `<div class="prog-actions"><div class="prog-line prog-line-run"
        onclick="editPmPreset(${pmId}, '${td.pmKey}', ${fallback})">
        <span style="color:var(--text-dim)">Run </span><span class="prog-action">${lbl}</span><span class="prog-edit-hint">✎</span>
      </div></div>`;
    } else {
      html += `<div class="prog-no-data" style="font-size:11px;color:var(--text-dim);padding:4px 0">アクションなし</div>`;
    }
    // Bottom add button only for empty panels (non-empty panels use hover inline button)
    if (!treeActions.length && !fallback) {
      const addTriggerId = triggerId || null;
      html += `<div style="padding:2px 0">${renderAddBtn(addTriggerId, pmId, td.key, 0)}</div>`;
    }
    html += `</div>`;
  });

  // Extra (unknown) event types shown generically below tabs
  if (extraTypes.length) {
    html += `<div class="prog-actions" style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.06)">`;
    extraTypes.forEach(k => {
      const evEntry = eventMap[k];
      if (!evEntry || !evEntry.actions.length) return;
      const tLabel = TRIGGER_TYPE[k] || `Event:${k}`;
      html += `<div class="prog-line"><span class="prog-keyword">${tLabel}</span></div>`;
      html += renderActionList(evEntry.actions, presetNames, 1, pm, evEntry.triggerID);
    });
    html += `</div>`;
  }

  return html;
}

function switchEventTab(uid, tabKey) {
  document.querySelectorAll(`[id^="${uid}-epanel-"]`).forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`[id^="${uid}-etab-"]`).forEach(el => el.classList.remove('active'));
  const panel = document.getElementById(`${uid}-epanel-${tabKey}`);
  const tab = document.getElementById(`${uid}-etab-${tabKey}`);
  if (panel) panel.classList.add('active');
  if (tab) tab.classList.add('active');
}

// ── Condition text builder ────────────────────
// Condition data comes from tblEvaluation rows attached as act.evaluations.
// ConditionType: 0=Variable, 1=Time/DoW/MoY, 2=OccScene, 3=CCO, 4=ZoneBinary, 5=LED, 6=AreaOccupancy, 7=ZoneLevel, 23=SystemProperty
// EvaluationOperator: 3=Equal, 4=NotEqual, 9=IsFrom, 10=IsNotFrom

const SYSTEM_PROP_NAMES = {
  149: 'Presence Status',
  150: 'Emergency Mode',
  151: 'Do Not Disturb',
  152: 'Room State',
  153: 'Make Up Room',
  154: 'First Guest Entry',
  155: 'Turndown Service',
  156: 'ADA Mode',
  157: 'Automation',
};

const _DOW_NAMES = {1:'Mon',2:'Tue',3:'Wed',4:'Thu',5:'Fri',6:'Sat',7:'Sun'};
const _MON_NAMES = {1:'Jan',2:'Feb',3:'Mar',4:'Apr',5:'May',6:'Jun',7:'Jul',8:'Aug',9:'Sep',10:'Oct',11:'Nov',12:'Dec'};
function _dowName(v) { const d = ((v - 1) % 7) + 1; return _DOW_NAMES[d] || `Day:${v}`; }
function _monName(v) { return _MON_NAMES[v] || `Month:${v}`; }

function evalOpText(op) { return op === 4 ? 'is not' : 'is'; }

// Lutron time encoding: (TimeOfDay << 16) | offsetMinutes
// TimeOfDay: 0-1439 = minutes from midnight, 2000=Sunrise, 2001=Sunset
function decodeLutronTime(val) {
  if (val == null) return '?';
  const tod = (val >> 16) & 0xFFFF;
  const offset = val & 0xFFFF;
  const offStr = offset > 0 ? `+${offset}min` : offset < 0 ? `${offset}min` : '';
  if (tod === 2000) return `Sunrise${offStr}`;
  if (tod === 2001) return `Sunset${offStr}`;
  const h = Math.floor(tod / 60).toString().padStart(2, '0');
  const m = (tod % 60).toString().padStart(2, '0');
  return `${h}:${m}${offStr}`;
}

function encodeLutronTime(todCode, offsetMin) {
  return ((todCode & 0xFFFF) << 16) | (offsetMin & 0xFFFF);
}

function buildSingleConditionText(cond, presetNames, pm) {
  if (!cond || cond.ObjectType === 236) return null;
  const op = evalOpText(cond.EvaluationOperator);
  if (cond.ConditionType === 0) {
    const varName = cond._var_name || `Var:${cond.FirstOperandObjectID}`;
    const stateName = cond._state_name || `State:${cond.SecondOperand}`;
    return `${varName} ${op} ${stateName}`;
  } else if (cond.ConditionType === 5) {
    const station = cond._led_station_name || '';
    const ledNum = cond._led_number != null ? `LED ${cond._led_number}` : `LED:${cond.FirstOperandObjectID}`;
    const label = station ? `${station} ${ledNum}` : ledNum;
    return `${label} ${op} ${cond.SecondOperand === 1 ? 'On' : 'Off'}`;
  } else if (cond.ConditionType === 23) {
    const propName = SYSTEM_PROP_NAMES[cond.FirstOperandRefProperty] || `Prop:${cond.FirstOperandRefProperty}`;
    return `${propName} ${op} ${cond.SecondOperand}`;
  } else if (cond.ConditionType === 1) {
    const prop = cond.FirstOperandRefProperty;
    if (prop === 53) {
      return `Day of Week from ${_dowName(cond.SecondOperand)} to ${_dowName(cond.ThirdOperand)}`;
    } else if (prop === 54) {
      return `Month of Year from ${_monName(cond.SecondOperand)} to ${_monName(cond.ThirdOperand)}`;
    }
    return `Time of Day from ${decodeLutronTime(cond.SecondOperand)} to ${decodeLutronTime(cond.ThirdOperand)}`;
  } else if (cond.ConditionType === 2) {
    const name = cond._occ_group_name || `OccGroup:${cond.FirstOperandObjectID}`;
    return `${name} ${op} scene ${cond.SecondOperand}`;
  } else if (cond.ConditionType === 3) {
    const name = cond._zone_name || `Zone:${cond.FirstOperandObjectID}`;
    return `${name} ${op} ${cond.SecondOperand === 0 ? 'Open' : 'Closed'}`;
  } else if (cond.ConditionType === 4) {
    const name = cond._zone_name || `Zone:${cond.FirstOperandObjectID}`;
    return `${name} ${op} ${cond.SecondOperand === 0 ? 'Open' : 'Closed'}`;
  } else if (cond.ConditionType === 6) {
    const name = cond._area_name || `Area:${cond.FirstOperandObjectID}`;
    return `${name} ${op} Occupied`;
  } else if (cond.ConditionType === 7) {
    const name = cond._zone_name || `Zone:${cond.FirstOperandObjectID}`;
    return `${name} level from ${cond.SecondOperand} to ${cond.ThirdOperand}`;
  } else if (cond.ConditionType === 8) {
    const name = cond._shade_name || `Shade:${cond.FirstOperandObjectID}`;
    return `${name} ${op} Open`;
  } else if (cond.ConditionType === 9) {
    const name = cond._tc_name || `Timeclock:${cond.FirstOperandObjectID}`;
    return `${name} ${op} Enabled`;
  } else if (cond.ConditionType === 10) {
    const seqName = cond._seq_name || `Seq:${cond.FirstOperandObjectID}`;
    const stepName = cond._step_name || `Step:${cond.SecondOperand}`;
    return `${seqName} ${op} ${stepName}`;
  } else if (cond.ConditionType === 14) {
    const name = cond._zone_name || `HVAC:${cond.FirstOperandObjectID}`;
    const fromC = ((cond.SecondOperand / 10 - 32) * 5 / 9).toFixed(0);
    const toC = ((cond.ThirdOperand / 10 - 32) * 5 / 9).toFixed(0);
    return `${name} temp from ${fromC}°C to ${toC}°C`;
  } else if (cond.ConditionType === 18) {
    const name = cond._dev_station_name || `Device:${cond.FirstOperandObjectID}`;
    return `${name} Lock State ${op} ${cond.SecondOperand === 2 ? 'Locked' : 'Unlocked'}`;
  }
  return `CT:${cond.ConditionType} OT:${cond.FirstOperandObjectType} ID:${cond.FirstOperandObjectID}`;
}

const _condPickerData = {};

function renderConditionsHtml(evals, presetNames, pm, actionId) {
  if (!evals || !evals.length) {
    return `<span class="prog-condition prog-cond-btn" onclick="event.stopPropagation();openCondPicker(event,null,${actionId})">Select a condition ▾</span>`;
  }
  const sorted = [...evals].sort((a, b) => (a.SortOrder ?? 0) - (b.SortOrder ?? 0));
  let html = '';
  sorted.forEach(e => {
    if (e.ObjectType === 236) {
      const opText = e.EvaluationOperator === 2 ? 'Or' : 'and';
      html += ` <span class="prog-connector" onclick="event.stopPropagation();toggleConnector(${e.EvaluationID},this)" title="クリックでand/Or切替">${opText}</span> `;
    } else {
      _condPickerData[e.EvaluationID] = e;
      const condText = buildSingleConditionText(e, presetNames, pm);
      const label = condText || 'Select a condition';
      html += `<span class="prog-condition prog-cond-btn" onclick="event.stopPropagation();openCondPicker(event,${e.EvaluationID},${actionId})">${label} ▾</span>`;
    }
  });
  return html;
}

function renderAddBtn(triggerId, pmId, triggerType, depth) {
  const pad = depth * 16;
  if (triggerId) {
    return `<button class="prog-add-btn" style="margin-left:${pad}px"
      onclick="showAddMenu(event,${triggerId},null)">+ 追加</button>`;
  } else if (pmId && triggerType) {
    // No trigger yet — need to create one first
    return `<button class="prog-add-btn" style="margin-left:${pad}px"
      onclick="showAddMenu(event,null,${pmId},${triggerType})">+ 追加</button>`;
  }
  return '';
}

function renderActionList(actions, presetNames, depth, pm, parentTriggerId) {
  if (!actions || !actions.length) return '';
  const pad = depth * 16;
  let html = '';

  actions.forEach(act => {
    const delBtn = act.ActionID
      ? `<button class="prog-del-btn" onclick="event.stopPropagation();deleteAction(${act.ActionID})" title="削除">✕</button>`
      : '';
    const ctxMenu = act.ActionID && parentTriggerId
      ? ` oncontextmenu="event.preventDefault();event.stopPropagation();showInsertMenu(event,${parentTriggerId},${act.ActionID})"`
      : '';
    const addInlineBtn = act.ActionID && parentTriggerId
      ? `<button class="prog-add-inline" onclick="event.stopPropagation();showAddMenu(event,${parentTriggerId},null,null,${act.ActionID})" title="この下に追加">＋</button>`
      : '';
    const dragAttrs = act.ActionID && parentTriggerId
      ? ` draggable="true" data-action-id="${act.ActionID}" data-trigger-id="${parentTriggerId}" ondragstart="actionDragStart(event,this)" ondragover="actionDragOver(event,this)" ondragleave="actionDragLeave(event,this)" ondrop="actionDrop(event,this)" ondragend="actionDragEnd(event,this)"`
      : '';

    if (act.ObjectType === 235) {
      // Delay
      const secs = act.DelayTime || 0;
      const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), s = secs%60;
      html += `<div class="prog-line" style="padding-left:${pad}px"${ctxMenu}${dragAttrs}>
        <span class="prog-keyword">Delay</span> <span style="color:var(--text-dim)">${h}h ${m}m ${s}s</span>${addInlineBtn}${delBtn}</div>`;

    } else if (act.ObjectType === 233) {
      // Conditional If/Then/Else/End If
      const subTrigs = act.sub_triggers || [];
      const thenBranch = subTrigs.filter(st => st.TriggerType === 5);
      const elseBranch = subTrigs.filter(st => st.TriggerType === 6);
      const evals = act.evaluations || [];
      const condDisplay = renderConditionsHtml(evals, presetNames, pm, act.ActionID);
      const thenDrop = `<span class="prog-keyword prog-then-drop" onclick="event.stopPropagation();showAddConditionMenu(event,${act.ActionID})" title="条件を追加">Then ▾</span>`;
      html += `<div class="prog-line" style="padding-left:${pad}px"${ctxMenu}${dragAttrs}>
        <span class="prog-keyword">If</span> ${condDisplay} ${thenDrop}${addInlineBtn}${delBtn}</div>`;

      // Then branch
      thenBranch.forEach(st => {
        html += renderActionList(st.actions, presetNames, depth + 1, pm, st.TriggerID);
        if (!st.actions || !st.actions.length)
          html += renderAddBtn(st.TriggerID, null, null, depth + 1);
      });

      // Else branch
      if (elseBranch.length) {
        html += `<div class="prog-line" style="padding-left:${pad}px"><span class="prog-keyword">Else</span></div>`;
        elseBranch.forEach(st => {
          html += renderActionList(st.actions, presetNames, depth + 1, pm, st.TriggerID);
          if (!st.actions || !st.actions.length)
            html += renderAddBtn(st.TriggerID, null, null, depth + 1);
        });
      } else {
        html += `<div style="padding-left:${pad}px;padding-top:2px">
          <button class="prog-add-btn" onclick="addElseBranch(${act.ActionID})">+ Else を追加</button>
        </div>`;
      }
      html += `<div class="prog-line" style="padding-left:${pad}px"><span class="prog-keyword">End If</span></div>`;

    } else {
      // Run / Stop action
      const label = presetLabel(act.PresetId, presetNames);
      const execType = act.ExecutionType === 1 ? 'Run' : 'Stop';
      if (execType === 'Run' && act.ActionID) {
        const pmId = pm ? pm.ProgrammingModelID : null;
        html += `<div class="prog-line prog-line-run" style="padding-left:${pad}px"
          onclick="editRunAction(${act.ActionID}, ${act.PresetId ?? 'null'}, ${pmId ?? 'null'})"${ctxMenu}${dragAttrs}>
          <span style="color:var(--text-dim)">Run </span><span class="prog-action">${label}</span><span class="prog-edit-hint">✎</span>${addInlineBtn}${delBtn}
        </div>`;
      } else {
        html += `<div class="prog-line" style="padding-left:${pad}px"${ctxMenu}${dragAttrs}>
          <span style="color:var(--text-dim)">${execType} </span><span class="prog-action">${label}</span>${addInlineBtn}${delBtn}</div>`;
      }
    }
  });

  return html;
}

const _expandedButtons = new Set();

function toggleProgDetail(uid) {
  const el = document.getElementById(uid);
  const chev = document.getElementById(uid + '-chev');
  if (!el) return;
  const isOpen = el.classList.toggle('open');
  if (chev) chev.classList.toggle('open', isOpen);
  if (isOpen) _expandedButtons.add(uid); else _expandedButtons.delete(uid);
}

async function inspectCondition(actionId) {
  const res = await fetch(`/api/conditional-detail/${actionId}`);
  const d = await res.json();
  const act = d.action || {};
  const subTrigs = d.sub_triggers || [];

  // Show only non-null, non-zero columns for readability
  const skipCols = new Set(['ActionID','ObjectType','ParentID','ParentType','SortOrder']);
  function fmtRow(row) {
    return Object.entries(row)
      .filter(([k, v]) => v !== null && v !== undefined && v !== 0 && v !== '')
      .map(([k, v]) => `  ${k.padEnd(32)}: ${v}`)
      .join('\n');
  }

  let out = `=== Conditional Action #${actionId} ===\n`;
  out += `ObjectType: ${act.ObjectType}  ParentID: ${act.ParentID}\n\n`;
  out += `【Action 有効カラム】\n${fmtRow(act) || '  (なし)'}\n\n`;

  if (subTrigs.length) {
    const typeLabel = {5: 'Then (If)', 6: 'Else'};
    subTrigs.forEach((st, i) => {
      const lbl = typeLabel[st.TriggerType] || `TriggerType:${st.TriggerType}`;
      out += `【Sub-Trigger ${i+1}: ${lbl}】\n${fmtRow(st) || '  (なし)'}\n\n`;
    });
  } else {
    out += '(Sub-Triggerなし)\n';
  }

  // Show all raw column names so we can identify condition columns
  out += `\n【tblAction 全カラム】\n${(d.action_columns || []).join(', ')}\n`;
  showTextModal(`Conditional Action #${actionId}`, out);
}

// ── Programs editing ──────────────────────────
let _sharedScenesCache = null;  // shared scenes (same for all buttons)
let _localPresetsCache = {};    // pm_id → local presets
let _scenePickerCallback = null;

async function loadScenes(pmId) {
  // Fetch shared scenes if not cached
  if (!_sharedScenesCache) {
    const res = await fetch('/api/scenes');
    const d = await res.json();
    _sharedScenesCache = d.shared_scenes || [];
  }
  // Fetch local presets for this PM if needed
  let localPresets = [];
  if (pmId) {
    if (!_localPresetsCache[pmId]) {
      const res2 = await fetch(`/api/scenes?pm_id=${pmId}`);
      const d2 = await res2.json();
      _localPresetsCache[pmId] = d2.local_presets || [];
    }
    localPresets = _localPresetsCache[pmId];
  }
  return { shared: _sharedScenesCache, local: localPresets };
}

function markDirty() {
  isDirty = true;
  document.getElementById('save-btn').disabled = !isPl;
  const db = document.getElementById('dirty-badge');
  if (!db) {
    const bar = document.getElementById('place-bar');
    const span = document.createElement('span');
    span.id = 'dirty-badge';
    span.style.cssText = 'display:inline-block;background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;';
    span.textContent = '● 未保存';
    bar.appendChild(span);
  }
}

async function reloadPrograms() {
  if (!currentAreaId) return;
  markDirty();
  const res = await fetch(`/api/area/${currentAreaId}/programs`);
  const prog = res.ok ? await res.json() : {};
  const panel = document.getElementById('tab-programs');
  if (!panel) return;
  panel.innerHTML = renderProgramsTab(prog);
  _expandedButtons.forEach(uid => {
    const el = document.getElementById(uid);
    if (el) {
      el.classList.add('open');
      const chev = document.getElementById(uid + '-chev');
      if (chev) chev.classList.add('open');
    }

  showToast('更新しました');
}

// Store current pm_id for filtering
let _currentPickerPmId = null;

function showScenePicker(title, currentPresetId, pmId, callback) {
  _scenePickerCallback = callback;
  _currentPickerPmId = pmId || null;
  const overlay = document.createElement('div');
  overlay.className = 'scene-picker-overlay';
  overlay.id = 'scene-picker-overlay';
  overlay.innerHTML = `
    <div class="scene-picker-modal" onclick="event.stopPropagation()">
      <div class="scene-picker-header">
        <span>${title}</span>
        <button onclick="document.getElementById('scene-picker-overlay').remove()">✕</button>
      </div>
      <input class="scene-picker-search" type="text" placeholder="🔍 検索..." oninput="filterScenesList(this.value)" autofocus>
      <div class="scene-picker-list" id="scene-picker-list"><div style="padding:16px;color:var(--text-dim);font-size:12px">読み込み中...</div></div>
      <div class="scene-picker-footer">
        <button class="btn btn-outline" style="font-size:11px;padding:4px 10px" onclick="selectScene(null, 'なし')">Clear (なし)</button>
        <button class="btn" style="font-size:11px;padding:4px 10px;background:var(--surface2);color:var(--text-dim)" onclick="document.getElementById('scene-picker-overlay').remove()">キャンセル</button>
      </div>
    </div>`;
  overlay.addEventListener('click', () => overlay.remove());
  document.body.appendChild(overlay);
  loadScenes(_currentPickerPmId).then(data => renderScenePickerList(data, currentPresetId));
}

function renderScenePickerList(data, currentPresetId, filter) {
  const list = document.getElementById('scene-picker-list');
  if (!list) return;
  const q = (filter || '').toLowerCase();
  const { shared = [], local = [] } = data;

  const matchItem = (name, group) => !q || `${name} ${group}`.toLowerCase().includes(q);

  let html = '';

  // Button-local presets first (if any)
  if (local.length) {
    const vis = local.filter(p => matchItem(p.Name || '', 'ボタンアクション'));
    if (vis.length) {
      html += `<div class="scene-picker-group">ボタンアクション</div>`;
      vis.forEach(p => {
        const name = p.Name || `Preset ${p.PresetID}`;
        const isCur = p.PresetID === currentPresetId;
        html += `<div class="scene-picker-item ${isCur ? 'is-current' : ''}"
          onclick="selectScene(${p.PresetID}, '${name.replace(/'/g, "\\'")}')">
          ${isCur ? '● ' : ''}${name}</div>`;
      });
    }
  }

  // Shared scenes grouped by area
  const groups = {};
  shared.forEach(s => {
    const key = s.AreaName || '(その他)';
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });
  Object.entries(groups).forEach(([area, items]) => {
    const vis = items.filter(s => matchItem(s.Name || '', area));
    if (!vis.length) return;
    html += `<div class="scene-picker-group">共有シーン — ${area}</div>`;
    vis.forEach(s => {
      const name = s.Name || `Preset ${s.PresetID}`;
      const isCur = s.PresetID === currentPresetId;
      html += `<div class="scene-picker-item ${isCur ? 'is-current' : ''}"
        onclick="selectScene(${s.PresetID}, '${name.replace(/'/g, "\\'")}')">
        ${isCur ? '● ' : ''}${name}</div>`;
    });
  });

  list.innerHTML = html || '<div style="padding:16px;color:var(--text-dim);font-size:12px">見つかりません</div>';
}

function filterScenesList(value) {
  loadScenes(_currentPickerPmId).then(data => renderScenePickerList(data, null, value));
}

function selectScene(sceneId, sceneName) {
  document.getElementById('scene-picker-overlay')?.remove();
  if (_scenePickerCallback) { _scenePickerCallback(sceneId, sceneName); _scenePickerCallback = null; }
}

function editRunAction(actionId, currentPresetId, pmId) {
  showScenePicker('Run シーンを変更', currentPresetId, pmId, async (sceneId) => {
    const res = await fetch(`/api/action/${actionId}/preset`, {
      method: 'PUT', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({preset_id: sceneId}),
    });
    const d = await res.json();
    if (d.error) { showToast('エラー: ' + d.error); return; }
    if (pmId) delete _localPresetsCache[pmId]; // invalidate local cache
    await reloadPrograms();
  });
}

function editPmPreset(pmId, pmKey, currentPresetId) {
  const lmap = {PressPresetID:'Press', ReleasePresetID:'Release', HoldPresetId:'Hold',
    DoubleTapPresetID:'Double Tap', PresetID:'Scene', OnPresetID:'On/Open', OffPresetID:'Off/Close'};
  showScenePicker(`${lmap[pmKey] || pmKey} シーンを変更`, currentPresetId, pmId, async (sceneId) => {
    const body = {[pmKey]: sceneId};
    if (pmKey === 'PressPresetID') body.PresetID = sceneId;
    const res = await fetch(`/api/pm/${pmId}`, {

    });
    const d = await res.json();

    await reloadPrograms();

}

// ── Condition editing ──────────────────────────
let _variablesCache = null;
let _ledsCache = null;
// _condDataCache and _condPickerMenus/timer are declared near openCondPicker

async function loadVariables() {
  if (!_variablesCache) {
    const r = await fetch('/api/variables');
    _variablesCache = (await r.json()).variables || [];
  }
  return _variablesCache;
}

async function loadLeds() {
  if (!_ledsCache) {
    const r = await fetch('/api/leds');
    _ledsCache = (await r.json()).leds || [];
  }
  return _ledsCache;
}

let _condDataCache = null;
async function loadCondData() {
  if (!_condDataCache) {
    const r = await fetch('/api/cond-data');
    _condDataCache = await r.json();
  }
  return _condDataCache;
}

// ── Condition picker (hierarchical 2-level menu) ──────────────
let _condPickerMenus = [];  // [primary, submenu] DOM elements
let _condSubTimer = null;

function _closeCondPickerMenus() {
  if (_condSubTimer) { clearTimeout(_condSubTimer); _condSubTimer = null; }
  _condPickerMenus.forEach(m => m?.remove());
  _condPickerMenus = [];
}

function _clearCondSubTimer() {
  if (_condSubTimer) { clearTimeout(_condSubTimer); _condSubTimer = null; }
}

function _scheduleCondSubClose() {
  _clearCondSubTimer();
  _condSubTimer = setTimeout(() => {
    _condPickerMenus[1]?.remove();
    _condPickerMenus[1] = null;
    _condSubTimer = null;
  }, 150);
}

// areaLabel: "ParentArea ▶ Area" or just "Area" if no parent
function _areaLabel(areaName, parentAreaName) {
  return parentAreaName ? `${parentAreaName} ▶ ${areaName}` : (areaName || '');
}

// Build category items with unknown ConditionType — show but can't save
function _unknownItem(label, typeData) {
  return { label, condType: -1, typeData, typeFields: {}, unknownType: true };
}

async function openCondPicker(event, evalId, actionId) {
  event.stopPropagation();
  _closeCondPickerMenus();
  document.querySelectorAll('.add-action-menu').forEach(m => m.remove());

  const currentCond = evalId ? (_condPickerData[evalId] || null) : null;

  // Load all data upfront (all cached after first call)
  const [vars, leds, cd] = await Promise.all([loadVariables(), loadLeds(), loadCondData()]);

  const sysProps = Object.entries(SYSTEM_PROP_NAMES).map(([id, name]) => ({
    label: name, condType: 23,
    typeData: { propId: parseInt(id) },
    typeFields: { ConditionType: 23, FirstOperandObjectType: 400, FirstOperandObjectID: 34 },
  }));

  // LED items grouped by Area ▶ Device
  const ledItems = leds.map(l => {
    const area = _areaLabel(l.AreaName, l.ParentAreaName);
    const label = area ? `${area} ▶ ${l.StationName || l.DeviceName} — LED ${l.LedNumber}`
                       : `${l.StationName || l.DeviceName} — LED ${l.LedNumber}`;
    return {
      label, condType: 5,
      typeData: { ledId: l.LedID },
      typeFields: { ConditionType: 5, FirstOperandObjectType: 107, FirstOperandRefProperty: 23 },
    };
  });

  const categories = [
    {
      label: 'Variables',
      items: vars.map(v => ({
        label: v.Name, condType: 0,
        typeData: { varId: v.VariableID },
        typeFields: { ConditionType: 0, FirstOperandObjectType: 169, FirstOperandRefProperty: 42 },
      })),
    },
    {
      label: 'Time Period',
      items: [
        { label: 'Time of Day', condType: 1, typeData: {},
          typeFields: { ConditionType: 1, ObjectTypeOverride: 241, EvaluationOperator: 9,
                        FirstOperandObjectType: 1, FirstOperandObjectID: 2, FirstOperandRefProperty: 68 } },
      ],
    },
    {
      label: 'Occupancy',
      items: (cd.occupancy || []).map(r => ({
        label: r.OGName || _areaLabel(r.AreaName, r.ParentAreaName),
        condType: 2,
        typeData: { occupancyGroupId: r.OccupancyGroupID },
        typeFields: { ConditionType: 2, FirstOperandObjectType: 38, FirstOperandObjectID: r.OccupancyGroupID },
      })),
    },
    {
      label: 'Contact Closure Inputs',
      items: (cd.cci || []).map(r => ({
        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.EnclosureName} ▶ ${r.InputName}`,
        condType: 3,
        typeData: { zoneId: r.SensorConnectionID },
        typeFields: { ConditionType: 3, FirstOperandObjectType: 66, FirstOperandObjectID: r.SensorConnectionID },
      })),
    },
    {
      label: 'Contact Closure Outputs',
      items: (cd.cco || []).map(r => ({
        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.ZoneName}`,
        condType: 4,
        typeData: { zoneId: r.ZoneID },
        typeFields: { ConditionType: 4, FirstOperandObjectType: 15, FirstOperandObjectID: r.ZoneID },
      })),
    },
    { label: 'LED State', items: ledItems },
    {
      label: 'Lighting - Areas',
      items: (cd.areas || []).map(r => ({
        label: _areaLabel(r.AreaName, r.ParentAreaName),
        condType: 6,
        typeData: { areaId: r.AreaID },
        typeFields: { ConditionType: 6, FirstOperandObjectType: 2, FirstOperandObjectID: r.AreaID },
      })),
    },
    {
      label: 'Lighting - Zones',
      items: (cd.zones || []).map(r => ({
        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.ZoneName}`,
        condType: 7,
        typeData: { zoneId: r.ZoneID },
        typeFields: { ConditionType: 7, FirstOperandObjectType: 15, FirstOperandObjectID: r.ZoneID },
      })),
    },
    {
      label: 'Timeclocks',
      items: (cd.timeclocks || []).map(r => ({
        label: r.ModeName ? `${r.TimeclockName} / ${r.ModeName}` : r.TimeclockName,
        condType: 9,
        typeData: { timeclockId: r.TimeClockID, modeId: r.TimeClockModeID },
        typeFields: { ConditionType: 9, FirstOperandObjectType: 19, FirstOperandObjectID: r.TimeClockID, SecondOperand: r.TimeClockModeID || 0 },
      })),
    },
    {
      label: 'Sequences',
      items: (cd.sequences || []).map(r => ({
        label: r.SequenceName,
        condType: 10,
        typeData: { sequenceId: r.SequenceID },
        typeFields: { ConditionType: 10, FirstOperandObjectType: 90, FirstOperandObjectID: r.SequenceID },
      })),
    },
    {
      label: 'HVAC Zones',
      items: (cd.hvac || []).map(r => ({
        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.ZoneName}`,
        condType: 14,
        typeData: { zoneId: r.ZoneID },
        typeFields: { ConditionType: 14, FirstOperandObjectType: 211, FirstOperandObjectID: r.ZoneID },
      })),
    },
    {
      label: 'Devices',
      items: (cd.devices || []).map(r => ({
        label: `${_areaLabel(r.AreaName, r.ParentAreaName)} ▶ ${r.DeviceName}`,
        condType: 18,
        typeData: { deviceId: r.ControlStationDeviceID },
        typeFields: { ConditionType: 18, FirstOperandObjectType: 5, FirstOperandObjectID: r.ControlStationDeviceID },
      })),
    },
    { label: 'Room Properties', items: sysProps },
  ];

  // Build the primary menu
  const primary = document.createElement('div');
  primary.className = 'cond-picker-menu';
  primary.addEventListener('mouseenter', _clearCondSubTimer);
  _condPickerMenus[0] = primary;

  categories.forEach(cat => {
    const hasItems = cat.items.length > 0;
    const el = document.createElement('div');
    el.className = 'cpi';
    el.innerHTML = `<span>${cat.label}</span><span class="cpi-arrow">▶</span>`;

    el.addEventListener('mouseenter', () => {
      _clearCondSubTimer();
      _condPickerMenus[1]?.remove();
      _condPickerMenus[1] = null;

      const sub = document.createElement('div');
      sub.className = 'cond-picker-menu cond-sub-menu';
      sub.addEventListener('mouseenter', _clearCondSubTimer);
      sub.addEventListener('mouseleave', _scheduleCondSubClose);
      _condPickerMenus[1] = sub;

      if (!hasItems) {
        const empty = document.createElement('div');
        empty.className = 'cpi cpi-disabled';
        empty.innerHTML = '<span style="font-style:italic">データなし</span>';
        sub.appendChild(empty);
      }

      cat.items.forEach(item => {
        const sEl = document.createElement('div');
        sEl.className = 'cpi' + (item.unknownType ? ' cpi-unknown' : '');
        const isSelected = !item.unknownType && currentCond &&
          currentCond.ConditionType === item.condType &&
          ((item.typeData.varId && currentCond.FirstOperandObjectID == item.typeData.varId) ||
           (item.typeData.ledId && currentCond.FirstOperandObjectID == item.typeData.ledId) ||
           (item.typeData.propId && currentCond.FirstOperandRefProperty == item.typeData.propId) ||
           (item.condType === 1 && currentCond.ConditionType === 1) ||
           (item.typeData.zoneId && currentCond.FirstOperandObjectID == item.typeData.zoneId) ||
           (item.typeData.areaId && currentCond.FirstOperandObjectID == item.typeData.areaId) ||
           (item.typeData.occupancyGroupId && currentCond.FirstOperandObjectID == item.typeData.occupancyGroupId) ||
           (item.typeData.timeclockId && currentCond.FirstOperandObjectID == item.typeData.timeclockId) ||
           (item.typeData.sequenceId && currentCond.FirstOperandObjectID == item.typeData.sequenceId) ||
           (item.typeData.deviceId && currentCond.FirstOperandObjectID == item.typeData.deviceId));
        sEl.innerHTML = `<span style="${isSelected ? 'color:var(--accent)' : ''}">${item.label}</span>`;
        sEl.addEventListener('click', e => {
          e.stopPropagation();
          _closeCondPickerMenus();
          if (item.unknownType) {
            showToast('このConditionTypeはまだ未対応です（DB上のConditionTypeが不明）');
            return;
          }
          openCondValueEditor(evalId, actionId, item.condType, item.typeData, item.typeFields, currentCond, vars, leds);
        });
        sub.appendChild(sEl);
      });

      // Position right of primary, clamped to viewport
      const prRect = primary.getBoundingClientRect();
      const elRect = el.getBoundingClientRect();
      const vh = window.innerHeight;
      const subH = Math.min(cat.items.length * 27 + 6, 320);
      const top = Math.min(elRect.top, vh - subH - 8);
      sub.style.cssText = `top:${top}px;left:${prRect.right + 2}px`;
      document.body.appendChild(sub);
    });

    el.addEventListener('mouseleave', _scheduleCondSubClose);
    primary.appendChild(el);
  });

  // Position primary menu, clamped to viewport
  const rect = event.currentTarget?.getBoundingClientRect?.() || { bottom: event.clientY, left: event.clientX };
  const vh = window.innerHeight;
  const ph = categories.length * 27 + 6;
  const top = Math.min(rect.bottom + 2, vh - ph - 8);
  primary.style.cssText = `top:${top}px;left:${rect.left}px`;
  document.body.appendChild(primary);

  setTimeout(() => document.addEventListener('click', _closeCondPickerMenus, { once: true }), 0);
}

async function openCondValueEditor(evalId, actionId, condType, typeData, typeFields, currentCond, vars, leds) {
  // Build a condition object for the pickers (use existing if condType matches, else build default)
  let cond;
  if (currentCond && currentCond.ConditionType === condType) {
    cond = currentCond;
  } else {
    cond = {
      EvaluationID: evalId,
      ConditionType: condType,
      EvaluationOperator: condType === 1 ? 9 : 3,
      FirstOperandObjectID: typeData.varId || typeData.ledId || typeData.zoneId || typeData.areaId ||
                            typeData.occupancyGroupId || typeData.timeclockId || typeData.sequenceId ||
                            typeData.deviceId || typeFields.FirstOperandObjectID || null,
      FirstOperandRefProperty: typeData.propId || typeFields.FirstOperandRefProperty || null,
      SecondOperand: condType === 5 ? 1 : (typeFields.SecondOperand ?? 0),
      ThirdOperand: null,
    };
  }

  let title, bodyHtml;
  if (condType === 0) {
    const adjustedCond = { ...cond, FirstOperandObjectID: typeData.varId ?? cond.FirstOperandObjectID };
    title = 'Variable 条件';
    bodyHtml = buildVariablePicker(vars, adjustedCond);
  } else if (condType === 5) {
    const adjustedCond = { ...cond, FirstOperandObjectID: typeData.ledId ?? cond.FirstOperandObjectID };
    title = 'LED State 条件';
    bodyHtml = buildLedPicker(leds, adjustedCond);
  } else if (condType === 23) {
    const adjustedCond = { ...cond, FirstOperandRefProperty: typeData.propId ?? cond.FirstOperandRefProperty };
    title = 'Room Properties 条件';
    bodyHtml = buildSysPropPicker(adjustedCond);
  } else if (condType === 1) {
    title = 'Time of Day 条件';
    bodyHtml = buildTimePicker(cond);
  } else if (condType === 2) {
    title = 'Occupancy Group 条件';
    bodyHtml = buildOccupancyGroupPicker(cond);
  } else if (condType === 3) {
    title = 'Contact Closure Output 条件';
    bodyHtml = buildBinaryStatePicker(cond, 'Open', 'Closed', 0, 1);
  } else if (condType === 6) {
    title = 'Area Occupancy 条件';
    bodyHtml = buildIsNotPicker(cond, 'Occupied');
  } else if (condType === 7) {
    title = 'Zone Level 条件';
    bodyHtml = buildLevelRangePicker(cond);
  } else if (condType === 8) {
    title = 'Shade Group 条件';
    bodyHtml = buildIsNotPicker(cond, 'Open');
  } else if (condType === 9) {
    title = 'Timeclock 条件';
    bodyHtml = buildIsNotPicker(cond, 'Enabled');
  } else if (condType === 10) {
    const cd = await loadCondData();
    title = 'Sequence 条件';
    bodyHtml = buildSequenceStepPicker(cond, cd, typeData.sequenceId ?? cond.FirstOperandObjectID);
  } else if (condType === 14) {
    title = 'HVAC Zone 条件';
    bodyHtml = buildHvacTempPicker(cond);
  } else if (condType === 18) {
    title = 'Device Lock State 条件';
    bodyHtml = buildLockStatePicker(cond);
  } else {
    showToast(`ConditionType ${condType} は未対応`);
    return;
  }

  _showConditionModal(title, bodyHtml, async (data) => {
    // Strip internal-only key before sending
    const { ObjectTypeOverride, ...rest } = typeFields;
    const payload = { ...rest, ...data };
    if (ObjectTypeOverride) payload._objectType = ObjectTypeOverride;
    await _saveOrCreateCondition(evalId, actionId, payload);
  });
}

async function _saveOrCreateCondition(evalId, actionId, data) {
  // _objectType is an internal hint for the correct tblEvaluation ObjectType
  const { _objectType, ...payload } = data;
  if (_objectType) payload.ObjectType = _objectType;
  let res;
  if (evalId != null) {
    res = await fetch(`/api/evaluation/${evalId}`, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } else {
    res = await fetch(`/api/action/${actionId}/create-evaluation`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  }
  const d = await res.json();
  if (d.error) { showToast('エラー: ' + d.error); return; }
  await reloadPrograms();
}

async function editCondition(condJson) {
  let cond;
  try { cond = typeof condJson === 'string' ? JSON.parse(condJson) : condJson; } catch { cond = null; }
  if (!cond || !cond.EvaluationID) { showToast('この条件は編集できません'); return; }

  const ct = cond.ConditionType;

  if (ct === 0) {
    const vars = await loadVariables();
    _showConditionModal('Variable 条件を変更', buildVariablePicker(vars, cond), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 5) {
    const leds = await loadLeds();
    _showConditionModal('LED 条件を変更', buildLedPicker(leds, cond), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 23) {
    _showConditionModal('System Property 条件を変更', buildSysPropPicker(cond), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 1) {
    _showConditionModal('Time of Day 条件を変更', buildTimePicker(cond), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 2) {
    _showConditionModal('Occupancy Group 条件を変更', buildOccupancyGroupPicker(cond), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 3) {
    _showConditionModal('Contact Closure Output 条件を変更', buildBinaryStatePicker(cond, 'Open', 'Closed', 0, 1), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 6) {
    _showConditionModal('Area Occupancy 条件を変更', buildIsNotPicker(cond, 'Occupied'), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 7) {
    _showConditionModal('Zone Level 条件を変更', buildLevelRangePicker(cond), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 8) {
    _showConditionModal('Shade Group 条件を変更', buildIsNotPicker(cond, 'Open'), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 9) {
    _showConditionModal('Timeclock 条件を変更', buildIsNotPicker(cond, 'Enabled'), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 10) {
    const cd = await loadCondData();
    _showConditionModal('Sequence 条件を変更', buildSequenceStepPicker(cond, cd, cond.FirstOperandObjectID), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 14) {
    _showConditionModal('HVAC Zone 条件を変更', buildHvacTempPicker(cond), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else if (ct === 18) {
    _showConditionModal('Device Lock State 条件を変更', buildLockStatePicker(cond), async (data) => {
      await _saveCondition(cond.EvaluationID, data);
    });
  } else {
    showToast(`ConditionType ${ct} の編集は未対応です`);
  }
}

function buildVariablePicker(vars, cond) {
  const opSel = `<select id="cond-op" style="margin-bottom:10px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="3" ${cond.EvaluationOperator===3?'selected':''}>is (Equal)</option>
    <option value="4" ${cond.EvaluationOperator===4?'selected':''}>is not (NotEqual)</option>
  </select>`;
  let varSel = `<select id="cond-var" style="margin-bottom:8px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px" onchange="updateVarStates(this.value)">`;
  vars.forEach(v => {
    varSel += `<option value="${v.VariableID}" ${v.VariableID==cond.FirstOperandObjectID?'selected':''}>${v.Name}</option>`;
  });
  varSel += '</select>';

  // State select — populated by current variable
  const curVar = vars.find(v => v.VariableID == cond.FirstOperandObjectID) || vars[0];
  let stateSel = `<select id="cond-state" style="width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">`;
  (curVar ? curVar.states : []).forEach(s => {
    stateSel += `<option value="${s.VariableStateID}" ${s.VariableStateID==cond.SecondOperand?'selected':''}>${s.Name}</option>`;
  });
  stateSel += '</select>';

  // Store vars for dynamic update
  window._condVarsData = vars;

  return `<div>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">演算子</div>${opSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">Variable</div>${varSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">State</div>${stateSel}
  </div>`;
}

function updateVarStates(varId) {
  const vars = window._condVarsData || [];
  const v = vars.find(x => x.VariableID == varId);
  const sel = document.getElementById('cond-state');
  if (!sel || !v) return;
  sel.innerHTML = v.states.map(s => `<option value="${s.VariableStateID}">${s.Name}</option>`).join('');
}

function buildLedPicker(leds, cond) {
  const opSel = `<select id="cond-op" style="margin-bottom:10px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="3" ${cond.EvaluationOperator===3?'selected':''}>is (Equal)</option>
    <option value="4" ${cond.EvaluationOperator===4?'selected':''}>is not (NotEqual)</option>
  </select>`;
  let ledSel = `<select id="cond-led" style="margin-bottom:8px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">`;
  leds.forEach(l => {
    const label = `LED ${l.LedNumber} — ${l.StationName || l.DeviceName}`;
    ledSel += `<option value="${l.LedID}" ${l.LedID==cond.FirstOperandObjectID?'selected':''}>${label}</option>`;
  });
  ledSel += '</select>';
  const stateSel = `<select id="cond-led-state" style="width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="1" ${cond.SecondOperand===1?'selected':''}>On (Active)</option>
    <option value="0" ${cond.SecondOperand===0?'selected':''}>Off (Inactive)</option>
  </select>`;
  return `<div>
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">演算子</div>${opSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">LED</div>${ledSel}
    <div style="margin-bottom:6px;font-size:11px;color:var(--text-dim)">状態</div>${stateSel}
  </div>`;
}

function buildSysPropPicker(cond) {
  const props = Object.entries(SYSTEM_PROP_NAMES);
  const opSel = `<select id="cond-op" style="margin-bottom:10px;width:100%;padding:4px;background:var(--surface2);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:4px">
    <option value="3" ${cond.EvaluationOperator===3?'selected':''}>is (Equal)</option>
    <option value="4" ${cond.EvaluationOperator===4?'selected':''}>is not (NotEqual)</option>
  </select>`;
