<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lutron Designer Viewer</title>
<style>
  :root {
    --bg: #1a1a1e; --surface: #242428; --surface2: #2e2e34;
    --border: #3a3a42; --accent: #4a90d9; --accent2: #2d6bb3;
    --text: #e0e0e8; --text-dim: #888896;
    --green: #5cb85c; --orange: #f0a030; --red: #d9534f; --teal: #5bc0de;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; height: 100vh; display: flex; flex-direction: column; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 10px; }
  header .logo { color: var(--accent); font-weight: 700; font-size: 16px; }
  header h1 { font-size: 14px; font-weight: 600; }
  header .spacer { flex: 1; }
  .btn-group { display: flex; gap: 6px; }

  #place-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 6px 14px; display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--text-dim); min-height: 32px; flex-wrap: wrap; }
  #place-bar .info-item { display: flex; gap: 4px; }
  #place-bar .info-value { color: var(--text); font-weight: 500; }
  #dirty-badge { display: none; background: var(--orange); color: #000; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px; }

  .main { flex: 1; display: flex; overflow: hidden; }

  #sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  #sidebar-header { padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  #area-tree { flex: 1; overflow-y: auto; padding: 4px 0; }

  .tree-node { display: flex; align-items: center; gap: 6px; padding: 5px 10px; cursor: pointer; user-select: none; border-left: 3px solid transparent; }
  .tree-node:hover { background: var(--surface2); }
  .tree-node.selected { background: rgba(74,144,217,0.15); border-left-color: var(--accent); }
  .tree-node .node-icon { font-size: 13px; flex-shrink: 0; }
  .tree-node .node-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tree-node .node-leaf { color: #4db6ac; font-size: 9px; }

  #detail { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; }
  .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text-dim); }
  .welcome .icon { font-size: 40px; opacity: 0.25; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .card-header { background: var(--surface2); padding: 7px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-dim); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-header .count { background: var(--accent2); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 700; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { background: rgba(0,0,0,0.2); text-align: left; padding: 5px 10px; color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  td { padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.03); }

  /* Editable cells */
  .editable { cursor: text; position: relative; }
  .editable:hover { background: rgba(74,144,217,0.08) !important; outline: 1px solid var(--accent2); border-radius: 2px; }
  .editable:focus { outline: 2px solid var(--accent); border-radius: 2px; background: rgba(74,144,217,0.12) !important; }
  .edit-hint { font-size: 9px; color: var(--text-dim); margin-left: 4px; opacity: 0; transition: opacity 0.15s; }
  tr:hover .edit-hint { opacity: 1; }

  .badge { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .badge-dim { background: rgba(74,144,217,0.2); color: #7ab4e8; }
  .badge-cco { background: rgba(240,160,48,0.2); color: #e8b060; }
  .badge-shade { background: rgba(91,192,222,0.2); color: #7dd0e8; }
  .badge-hvac { background: rgba(92,184,92,0.2); color: #7ed47e; }
  .badge-other { background: rgba(150,150,170,0.2); color: #aaaacc; }
  .layer-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; cursor: pointer; }
  .layer-ambient { background: rgba(255,220,80,0.2); color: #f0d060; }
  .layer-task    { background: rgba(200,140,255,0.2); color: #c89ce0; }
  .layer-accent  { background: rgba(255,120,80,0.2);  color: #f08060; }
  .layer-other   { background: rgba(130,130,150,0.2); color: #a0a0c0; }

  .keypad-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px; }
  .keypad-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; min-width: 160px; flex: 1; }
  .keypad-name { padding: 7px 10px; font-size: 11px; font-weight: 600; color: var(--accent); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
  .btn-row { display: flex; align-items: center; gap: 8px; padding: 3px 10px; font-size: 11px; }
  .btn-num { width: 20px; height: 20px; border-radius: 3px; background: rgba(74,144,217,0.3); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .btn-prog { color: var(--text-dim); font-size: 10px; margin-left: auto; }

  .scene-grid { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; }
  .scene-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .scene-num { font-size: 10px; font-weight: 700; color: var(--text-dim); }
  .scene-off { color: var(--red); } .scene-on { color: var(--teal); }

  .btn { padding: 6px 14px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-success { background: var(--green); color: #fff; }
  .btn-danger  { background: var(--red); color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading { color: var(--text-dim); font-size: 12px; padding: 16px; text-align: center; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Toast */
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  #toast.show { opacity: 1; }

  /* Layer select dropdown */
  select.layer-select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; font-size: 11px; cursor: pointer; }

  /* Add Zone modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:200; }
  .modal-overlay.show { display:flex; align-items:center; justify-content:center; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px; width:420px; max-width:95vw; display:flex; flex-direction:column; gap:12px; }
  .modal-box h3 { font-size:14px; font-weight:700; color:var(--text); }
  .modal-box label { font-size:11px; color:var(--text-dim); margin-bottom:2px; display:block; }
  .modal-box input, .modal-box select { width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:6px 8px; font-size:12px; }
  .modal-box input:focus, .modal-box select:focus { outline:2px solid var(--accent); }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }

  /* Template switcher */
  #template-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 4px 14px; display: none; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
  #template-bar label { white-space: nowrap; }
  #template-select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; font-size: 11px; cursor: pointer; flex: 1; max-width: 320px; }
  #template-loading { color: var(--text-dim); font-size: 11px; display: none; }
</style>
</head>
<body>

<header>
  <span class="logo">LD</span>
  <h1>Lutron Designer Viewer</h1>
  <div class="spacer"></div>
  <div class="btn-group">
    <button class="btn btn-primary" onclick="openFile('pl')">📄 .plを開く</button>
    <button class="btn btn-outline" onclick="openFile('folder')">📁 フォルダを開く</button>
    <button class="btn btn-success" id="save-btn" onclick="saveFile()" disabled>💾 保存</button>
  </div>
</header>

<div id="place-bar">
  <span style="color:var(--text-dim)">ファイルまたはフォルダを選択してください</span>
</div>

<div id="template-bar">
  <label for="template-select">テンプレート:</label>
  <select id="template-select" onchange="switchTemplate(this.value)"></select>
  <span id="template-loading">切替中...</span>
</div>

<div class="main">
  <div id="sidebar">
    <div id="sidebar-header">エリア</div>
    <div id="area-tree"><div class="loading">─</div></div>
  </div>
  <div id="detail">
    <div class="welcome">
      <div class="icon">🏨</div>
      <p>左のエリアを選択すると詳細を表示します</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Text output modal (copyable) -->
<div class="modal-overlay" id="text-modal-overlay" onclick="if(event.target===this)closeTextModal()">
  <div class="modal-box" style="width:700px;max-width:95vw">
    <h3 id="text-modal-title">結果</h3>
    <textarea id="text-modal-body" readonly style="width:100%;height:400px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:8px;font-size:11px;font-family:monospace;resize:vertical"></textarea>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="copyTextModal()">📋 コピー</button>
      <button class="btn btn-primary" onclick="closeTextModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- Add Zone modal -->
<div class="modal-overlay" id="add-zone-overlay" onclick="if(event.target===this)closeAddZone()">
  <div class="modal-box">
    <h3>Zone を追加</h3>
    <div>
      <label>Zone Name</label>
      <input type="text" id="az-name" placeholder="例: Bed DL">
    </div>
    <div>
      <label>Load Type</label>
      <select id="az-load-type" size="1"></select>
    </div>
    <div>
      <label>Zone Layer</label>
      <select id="az-layer">
        <option value="0">Ambient</option>
        <option value="1">Task</option>
        <option value="2">Accent</option>
        <option value="4">Internal</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeAddZone()">キャンセル</button>
      <button class="btn btn-primary" id="az-submit-btn" onclick="submitAddZone()">追加</button>
    </div>
    <input type="hidden" id="az-overlay-area" value="">
  </div>
</div>

<script>
let isPl = false;
let isDirty = false;
let currentAreaId = null;
let allTemplates = [];   // [{id, name}] from SQLite
let fsTemplates = [];    // [filename] from filesystem
let loadTypesCache = []; // [{LoadTypeID, Description, ControlType}]

// ControlType labels for grouping
const CT_GROUPS = {
  1: 'Dimmed', 2: 'Switched', 5: 'Shade', 6: 'Fan',
  7: 'CCO Maintained', 8: 'CCO Pulsed', 9: 'HVAC', 10: 'Venetian Blind'
};

// ── Open file/folder ─────────────────────────
async function openFile(mode) {
  const res = await fetch('/api/open', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({mode})
  });
  if (!res.ok) { const e = await res.json(); toast(e.error || 'エラー', 'red'); return; }
  const data = await res.json();
  isPl = data.is_pl;
  document.getElementById('save-btn').disabled = !isPl;
  fsTemplates = data.templates || [];
  await loadOverview();
  updateTemplateBar(data.active_template);
  await loadTree();
  if (currentAreaId) loadDetail(currentAreaId, '');
  toast(`${data.name} を開きました`);
}

// ── Template switcher ─────────────────────────
function updateTemplateBar(activeId) {
  const bar = document.getElementById('template-bar');
  const sel = document.getElementById('template-select');
  if (fsTemplates.length <= 1) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';
  sel.innerHTML = fsTemplates.map(tid => {
    const tidLower = tid.toLowerCase();
    const meta = allTemplates.find(t =>
      (t.projectDatabaseArtifactId || '').toLowerCase() === tidLower
    );
    const label = meta ? meta.name : tid.slice(0, 16) + '…';
    return `<option value="${tid}" ${tid === activeId ? 'selected' : ''}>${label}</option>`;
  }).join('');
}

async function switchTemplate(templateId) {
  const loading = document.getElementById('template-loading');
  const sel = document.getElementById('template-select');
  loading.style.display = 'inline';
  sel.disabled = true;
  currentAreaId = null;
  document.getElementById('detail').innerHTML = '<div class="loading">テンプレート切替中...</div>';
  try {
    const res = await fetch('/api/switch-template', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({template_id: templateId})
    });
    const d = await res.json();
    if (!res.ok) { toast(d.error || '切替失敗', 'red'); return; }
    await loadTree();
    toast('テンプレートを切り替えました');
  } finally {
    loading.style.display = 'none';
    sel.disabled = false;
  }
}

// ── Overview bar ─────────────────────────────
async function loadOverview() {
  const res = await fetch('/api/overview');
  if (!res.ok) return;
  const d = await res.json();
  const p = d.place, a = d.address;
  isDirty = d.dirty;
  allTemplates = d.templates || [];
  if (d.fs_templates) { fsTemplates = d.fs_templates; updateTemplateBar(d.active_template); }
  const bar = document.getElementById('place-bar');
  bar.innerHTML = `
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">Place:</span><span class="info-value">${p.name||'─'}</span></div>
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">TimeZone:</span><span class="info-value">${p.timeZone||'─'}</span></div>
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">Location:</span><span class="info-value">${a.city||'─'}, ${a.country||'─'}</span></div>
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">Templates:</span><span class="info-value">${d.templates.length}</span></div>
    <div class="info-item"><span class="info-label" style="color:var(--text-dim)">Rooms:</span><span class="info-value">${d.systems.length}</span></div>
    ${d.dirty ? '<span id="dirty-badge" style="display:inline-block">● 未保存</span>' : ''}
  `;
  document.getElementById('save-btn').disabled = !isPl || !isDirty;
}

// ── Area tree ────────────────────────────────
async function loadTree() {
  const res = await fetch('/api/areas');
  if (!res.ok) { document.getElementById('area-tree').innerHTML = '<div class="loading">テンプレートなし</div>'; return; }
  const areas = await res.json();
  if (!areas.length) { document.getElementById('area-tree').innerHTML = '<div class="loading">エリアなし</div>'; return; }
  renderTree(areas);
}

function renderTree(areas) {
  const childMap = {};
  areas.forEach(a => { if (!childMap[a.ParentID]) childMap[a.ParentID]=[]; childMap[a.ParentID].push(a); });
  const roots = areas.filter(a => a.HierarchyLevel === 2);
  const container = document.getElementById('area-tree');
  container.innerHTML = '';
  roots.forEach(r => renderNode(r, childMap, container, 0));
}

function renderNode(node, childMap, container, depth) {
  const children = childMap[node.AreaID] || [];
  const isLeaf = node.IsLeaf === 1 || children.length === 0;
  const el = document.createElement('div');
  el.className = 'tree-node';
  el.dataset.id = node.AreaID;
  el.style.paddingLeft = (10 + depth * 14) + 'px';
  el.innerHTML = `<span class="node-icon">${isLeaf ? '🏠' : '📂'}</span><span class="node-name">${node.Name}</span>${isLeaf ? '<span class="node-leaf">●</span>' : ''}`;
  el.addEventListener('click', () => {
    document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('selected'));
    el.classList.add('selected');
    currentAreaId = node.AreaID;
    loadDetail(node.AreaID, node.Name);
  });
  container.appendChild(el);
  children.forEach(c => renderNode(c, childMap, container, depth + 1));
}

// ── Detail panel ─────────────────────────────
async function loadDetail(areaId, areaName) {
  const detail = document.getElementById('detail');
  detail.innerHTML = '<div class="loading">読み込み中...</div>';
  const res = await fetch(`/api/area/${areaId}`);
  if (!res.ok) { detail.innerHTML = '<div class="loading">エラー</div>'; return; }
  const d = await res.json();
  // Get area name from tree if not given
  if (!areaName) {
    const el = document.querySelector(`.tree-node[data-id="${areaId}"] .node-name`);
    areaName = el ? el.textContent : String(areaId);
  }
  detail.innerHTML = `
    <div style="font-size:15px;font-weight:600;padding:2px 0 4px">${areaName}</div>
    ${renderZonesCard(d.zones, areaId)}
    ${renderScenesCard(d.scenes)}
    ${renderKeypadsCard(d.stations, d.buttons)}
  `;
}

// ── Zones card ───────────────────────────────
const CT = {1:{l:'Dimmer',c:'badge-dim'},7:{l:'CCO Maintained',c:'badge-cco'},8:{l:'CCO Pulsed',c:'badge-cco'},12:{l:'Shade',c:'badge-shade'},26:{l:'HVAC',c:'badge-hvac'}};
const LAYERS = [{v:0,l:'Ambient',c:'layer-ambient'},{v:1,l:'Task',c:'layer-task'},{v:2,l:'Accent',c:'layer-accent'}];

function layerBadge(val) {
  const l = LAYERS.find(x => x.v === val);
  return l ? `<span class="layer-badge ${l.c}">${l.l}</span>` : '';
}

function renderZonesCard(zones, areaId) {
  if (!zones.length) return '';
  const rows = zones.map(z => {
    const ct = CT[z.ControlType] || {l:`Type ${z.ControlType}`,c:'badge-other'};
    const layerSel = `<select class="layer-select" onchange="patchZone(${z.ZoneID}, 'ZoneLayer', this.value, ${areaId})">
      ${LAYERS.map(l => `<option value="${l.v}" ${l.v===z.ZoneLayer?'selected':''}>${l.l}</option>`).join('')}
      <option value="4" ${z.ZoneLayer===4?'selected':''}>Internal</option>
    </select>`;
    const loadTypeLabel = z.LoadTypeDesc || `ID:${z.LoadType ?? '─'}`;
    const delBtn = isPl
      ? `<button class="btn btn-danger" style="padding:1px 7px;font-size:11px" onclick="deleteZone(${z.ZoneID}, '${z.Name.replace(/'/g,"\\'")}', ${areaId})">✕</button>`
      : '';
    return `<tr>
      <td style="color:var(--text-dim);text-align:center;width:50px">${z.LoadNumber}</td>
      <td class="editable" contenteditable="true"
          data-zone="${z.ZoneID}" data-field="Name" data-area="${areaId}"
          onblur="onEditBlur(this)"
          style="font-weight:500">${z.Name}<span class="edit-hint">✎</span></td>
      <td>${layerSel}</td>
      <td><span class="badge ${ct.c}">${ct.l}</span></td>
      <td style="font-size:11px;color:var(--text-dim)">${loadTypeLabel}</td>
      <td class="editable" contenteditable="true"
          data-zone="${z.ZoneID}" data-field="ZoneDescription" data-area="${areaId}"
          onblur="onEditBlur(this)"
          style="color:var(--text-dim)">${z.ZoneDescription||''}<span class="edit-hint">✎</span></td>
      <td style="width:40px;text-align:center">${delBtn}</td>
    </tr>`;
  }).join('');
  const addBtn = isPl
    ? `<button class="btn btn-outline" style="padding:2px 10px;font-size:11px;margin-left:8px" onclick="openAddZone(${areaId})">＋ Zone追加</button>`
    : '';
  const debugBtn = `<button class="btn btn-outline" style="padding:2px 8px;font-size:10px;margin-left:4px;opacity:0.5" onclick="showAreaDebug(${areaId})">🔍 DB比較</button>`;
  return `<div class="card">
    <div class="card-header">Loads / Zones <span class="count">${zones.length}</span>${addBtn}${debugBtn}
      <span style="margin-left:auto;font-size:10px;color:var(--text-dim);font-weight:400;text-transform:none">名前・説明はクリックして編集</span>
    </div>
    <table><tr><th>Load#</th><th>Zone Name</th><th>Layer</th><th>Control Type</th><th>Load Type</th><th>Description</th><th></th></tr>${rows}</table>
    <div id="debug-panel-${areaId}" style="display:none;padding:10px;font-size:10px;font-family:monospace;white-space:pre-wrap;color:var(--text-dim);border-top:1px solid var(--border);max-height:400px;overflow-y:auto"></div>
  </div>`;
}

async function onEditBlur(cell) {
  const zoneId = parseInt(cell.dataset.zone);
  const field = cell.dataset.field;
  const areaId = parseInt(cell.dataset.area);
  // Remove the hint span from value
  const spans = cell.querySelectorAll('.edit-hint');
  let val = cell.textContent;
  spans.forEach(s => { val = val.replace(s.textContent, ''); });
  val = val.trim();
  await patchZone(zoneId, field, val, areaId, false);
}

async function patchZone(zoneId, field, value, areaId, reload=true) {
  const body = {};
  body[field] = field === 'ZoneLayer' ? parseInt(value) : value;
  const res = await fetch(`/api/zone/${zoneId}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  if (!res.ok) { toast('保存失敗', 'red'); return; }
  isDirty = true;
  document.getElementById('save-btn').disabled = !isPl;
  // Refresh dirty badge
  const db = document.getElementById('dirty-badge');
  if (db) db.style.display = 'inline-block';
  else {
    const bar = document.getElementById('place-bar');
    const span = document.createElement('span');
    span.id = 'dirty-badge';
    span.style.cssText = 'display:inline-block;background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;';
    span.textContent = '● 未保存';
    bar.appendChild(span);
  }
  toast('更新しました');
  if (reload) await loadDetail(areaId, '');
}

// ── Scenes card ──────────────────────────────
function renderScenesCard(scenes) {
  if (!scenes.length) return '';
  const chips = scenes.map(s => `<div class="scene-chip">
    <span class="scene-num ${s.Number===0?'scene-off':'scene-on'}">${s.Number===0?'Off':s.Number}</span>
    <span>${s.Name}</span></div>`).join('');
  return `<div class="card"><div class="card-header">Scenes <span class="count">${scenes.length}</span></div><div class="scene-grid">${chips}</div></div>`;
}

// ── Keypads card ─────────────────────────────
const PROG = {'SAPM':'Scene','ATPM':'Toggle','SSRLPM':'Raise/Lower','MRLPM':'Master R/L','AdvanceConditionalProgrammingModel':'Conditional'};
function renderKeypadsCard(stations, buttons) {
  if (!stations.length) return '';
  const stMap = {};
  stations.forEach(s => { if (!stMap[s.ControlStationID]) stMap[s.ControlStationID]={name:s.Name,devId:s.ControlStationDeviceID,modelId:s.ModelInfoID}; });
  const btns = {};
  buttons.forEach(b => { if (!btns[b.ParentDeviceID]) btns[b.ParentDeviceID]=[]; btns[b.ParentDeviceID].push(b); });
  const cards = Object.entries(stMap).map(([id,cs]) => {
    const bl = (btns[cs.devId]||[]).map(b => `<div class="btn-row">
      <div class="btn-num">${b.ButtonNumber+1}</div><span>${b.ButtonName}</span>
      <span class="btn-prog">${PROG[b.ProgModel]||b.ProgModel||'─'}</span></div>`).join('');
    return `<div class="keypad-card"><div class="keypad-name">⌨ ${cs.name}<span style="color:var(--text-dim);font-size:10px;margin-left:auto">Model:${cs.modelId||'─'}</span></div><div class="keypad-body">${bl||'<div style="padding:6px 10px;color:var(--text-dim);font-size:11px">ボタンなし</div>'}</div></div>`;
  }).join('');
  return `<div class="card"><div class="card-header">Control Stations <span class="count">${Object.keys(stMap).length}</span></div><div class="keypad-grid">${cards}</div></div>`;
}

// ── Add Zone ─────────────────────────────────
async function openAddZone(areaId) {
  // Load types (cached)
  if (!loadTypesCache.length) {
    const res = await fetch('/api/load-types');
    loadTypesCache = await res.json();
  }
  // Build grouped select
  const sel = document.getElementById('az-load-type');
  const groups = {};
  loadTypesCache.forEach(lt => {
    const g = CT_GROUPS[lt.ControlType] || 'Other';
    if (!groups[g]) groups[g] = [];
    groups[g].push(lt);
  });
  sel.innerHTML = Object.entries(groups).map(([gname, items]) =>
    `<optgroup label="${gname}">${items.map(lt =>
      `<option value="${lt.LoadTypeID}">${lt.Description}</option>`
    ).join('')}</optgroup>`
  ).join('');
  // Default to first Dimmed type
  const firstDimmed = loadTypesCache.find(lt => lt.ControlType === 1);
  if (firstDimmed) sel.value = firstDimmed.LoadTypeID;

  document.getElementById('az-name').value = '';
  document.getElementById('az-overlay-area').value = areaId;
  document.getElementById('add-zone-overlay').classList.add('show');
  document.getElementById('az-name').focus();
}

function closeAddZone() {
  document.getElementById('add-zone-overlay').classList.remove('show');
}

async function submitAddZone() {
  const name = document.getElementById('az-name').value.trim();
  if (!name) { document.getElementById('az-name').focus(); return; }
  const areaId = parseInt(document.getElementById('az-overlay-area').value);
  const loadType = parseInt(document.getElementById('az-load-type').value);
  const zoneLayer = parseInt(document.getElementById('az-layer').value);

  const btn = document.getElementById('az-submit-btn');
  btn.disabled = true; btn.textContent = '追加中...';
  try {
    const res = await fetch('/api/zone', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({area_id: areaId, name, load_type: loadType, zone_layer: zoneLayer})
    });
    const d = await res.json();
    if (!res.ok) { toast(d.error || '追加失敗', 'red'); return; }
    closeAddZone();
    isDirty = true;
    document.getElementById('save-btn').disabled = !isPl;
    const db = document.getElementById('dirty-badge');
    if (!db) {
      const bar = document.getElementById('place-bar');
      const span = document.createElement('span');
      span.id = 'dirty-badge';
      span.style.cssText = 'display:inline-block;background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;';
      span.textContent = '● 未保存';
      bar.appendChild(span);
    }
    toast(`Zone "${name}" を追加しました`);
    await loadDetail(areaId, '');
  } finally {
    btn.disabled = false; btn.textContent = '追加';
  }
}

// ── Area debug/compare ────────────────────────
async function showAreaDebug(areaId) {
  const panel = document.getElementById(`debug-panel-${areaId}`);
  if (panel.style.display !== 'none') { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  panel.innerHTML = '<span style="color:var(--text-dim)">読み込み中...</span>';
  const res = await fetch(`/api/area/${areaId}/debug`);
  const d = await res.json();
  let html = '';
  (d.zones || []).forEach(zd => {
    const z = zd.zone;
    const sl_i = zd.switchleg_by_id_plus1;  // correct LD format: SwitchLegID = ZoneID+1
    const sl_p = zd.switchleg_by_parentid;  // wrong format: ParentID = ZoneID
    // Detect bad SwitchLeg: ParentID should equal areaId, not zoneId
    const slOk = sl_i.length > 0 && sl_i[0].ParentID === z.ParentID;
    const hasBadSl = sl_p.length > 0 && sl_p[0].ParentID === z.ZoneID;
    const statusIcon = slOk ? '✓' : (hasBadSl ? '⚠ SwitchLeg破損' : '✗ SwitchLegなし');
    const statusColor = slOk ? 'var(--green)' : 'var(--orange)';
    html += `<div style="margin-bottom:6px">`;
    html += `<span style="color:${statusColor}">${statusIcon}</span> `;
    html += `<b>${z.Name}</b> (ZoneID:${z.ZoneID})<br>`;
    if (sl_i.length) {
      const sl = sl_i[0];
      html += `  SwitchLeg ID=${sl.SwitchLegID}, ParentID=${sl.ParentID} ${sl.ParentID===z.ParentID?'(正常)':'(異常: AreaID='+z.ParentID+'にすべき)'}, LoadType=${sl.LoadType}<br>`;
    } else {
      html += `  SwitchLeg(ZoneID+1): なし<br>`;
    }
    if (hasBadSl && isPl) {
      html += `  <button class="btn btn-danger" style="margin-top:3px;padding:1px 8px;font-size:10px" onclick="fixSwitchLeg(${z.ZoneID}, ${areaId})">🔧 SwitchLeg ParentIDを修正</button><br>`;
    }
    html += `</div>`;
  });
  // Extra diagnostic buttons
  const zones = d.zones || [];
  let extraBtns = `<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">
    <button class="btn btn-outline" style="padding:2px 8px;font-size:10px" onclick="inspectSchema()">📋 テーブル一覧</button>
    <button class="btn btn-outline" style="padding:2px 8px;font-size:10px" onclick="checkDbIntegrity()">🔍 DB整合性確認</button>`;
  if (zones.length >= 2) {
    const id1 = zones[0].zone.ZoneID, id2 = zones[zones.length-1].zone.ZoneID;
    extraBtns += `<button class="btn btn-outline" style="padding:2px 8px;font-size:10px" onclick="fullCompareZones(${id1},${id2})">🔬 全カラム比較</button>`;
    extraBtns += `<button class="btn btn-outline" style="padding:2px 8px;font-size:10px" onclick="crossTableCompare(${id1},${id2})">🗂 関連テーブル比較</button>`;
    extraBtns += `<button class="btn btn-outline" style="padding:2px 8px;font-size:10px" onclick="checkProblemTables(${id1},${id2})">🔎 問題テーブル確認</button>`;
  }
  extraBtns += `</div>`;
  panel.innerHTML = (html || '(データなし)') + extraBtns;
}

function showTextModal(title, text) {
  document.getElementById('text-modal-title').textContent = title;
  document.getElementById('text-modal-body').value = text;
  document.getElementById('text-modal-overlay').classList.add('show');
}
function closeTextModal() {
  document.getElementById('text-modal-overlay').classList.remove('show');
}
function copyTextModal() {
  const ta = document.getElementById('text-modal-body');
  ta.select();
  document.execCommand('copy');
  toast('コピーしました');
}

async function checkDbIntegrity() {
  const res = await fetch('/api/db-integrity');
  const d = await res.json();
  let out = '=== tblGuidManager カラム ===\n';
  out += (d.guid_manager_columns || []).join(', ') + '\n';
  out += '\n=== tblGuidManager サンプル(3件) ===\n';
  (d.guid_manager_sample || []).forEach(r => {
    if (r.__error__) { out += '  エラー: ' + r.__error__ + '\n'; return; }
    out += '  ' + JSON.stringify(r) + '\n';
  });
  out += '\n=== tblNextObjectID ===\n';
  (d.next_object_id || []).forEach(r => {
    if (r.__error__) { out += '  エラー: ' + r.__error__ + '\n'; return; }
    out += '  ' + JSON.stringify(r) + '\n';
  });
  out += '\n=== tblZone/tblSwitchLegのトリガー ===\n';
  (d.triggers_on_zone_switchleg || []).forEach(r => {
    out += `  ${r.name} on ${r.table_name}\n`;
  });
  if ((d.triggers_on_zone_switchleg||[]).length === 0) out += '  なし\n';
  out += '\n=== tblZone/SwitchLeg の外部キー制約 ===\n';
  (d.fk_constraints || []).forEach(r => {
    out += `  ${r.constraint_name}: ${r.parent_table}.${r.parent_col} → ${r.ref_table}.${r.ref_col}\n`;
  });
  if ((d.fk_constraints||[]).length === 0) out += '  なし\n';
  showTextModal('DB整合性確認', out);
}

async function inspectSchema() {
  const res = await fetch('/api/schema-inspect');
  const d = await res.json();
  let out = '=== ZoneIDを参照しているテーブル/カラム ===\n';
  (d.zone_related_columns || []).forEach(c => {
    out += `  ${c.TABLE_NAME}.${c.COLUMN_NAME} (${c.DATA_TYPE})\n`;
  });
  out += `\n=== 全テーブル(${(d.all_tables||[]).length}件) ===\n`;
  out += (d.all_tables || []).join('\n');
  showTextModal('テーブル一覧', out);
}

async function fullCompareZones(existingId, newId) {
  const res = await fetch(`/api/zone-full-compare/${existingId}/${newId}`);
  const d = await res.json();
  const z1 = d.existing_zone || {};
  const z2 = d.new_zone || {};
  const sl1 = d.existing_switchleg || {};
  const sl2 = d.new_switchleg || {};
  const allKeys = [...new Set([...Object.keys(z1), ...Object.keys(z2)])];
  let out = `=== tblZone比較 (既存:${existingId} vs 新:${newId}) ===\n`;
  allKeys.forEach(k => {
    const v1 = z1[k], v2 = z2[k];
    const diff = String(v1) !== String(v2) ? ' ← 差異' : '';
    out += `  ${k}: ${v1} | ${v2}${diff}\n`;
  });
  const slKeys = [...new Set([...Object.keys(sl1), ...Object.keys(sl2)])];
  out += `\n=== tblSwitchLeg比較 ===\n`;
  slKeys.forEach(k => {
    const v1 = sl1[k], v2 = sl2[k];
    const diff = String(v1) !== String(v2) ? ' ← 差異' : '';
    out += `  ${k}: ${v1} | ${v2}${diff}\n`;
  });
  showTextModal('全カラム比較', out);
}

async function crossTableCompare(existingId, newId) {
  const [r1, r2] = await Promise.all([
    fetch(`/api/zone-cross-table/${existingId}`).then(r => r.json()),
    fetch(`/api/zone-cross-table/${newId}`).then(r => r.json()),
  ]);
  const tableKeys = Object.keys(r1);
  let out = `=== 関連テーブル比較 (既存:${existingId} vs 新:${newId}) ===\n\n`;
  tableKeys.forEach(tbl => {
    const rows1 = r1[tbl] || [];
    const rows2 = r2[tbl] || [];
    const cnt1 = rows1.length, cnt2 = rows2.length;
    const mark = cnt1 !== cnt2 ? ' ← 件数差異!' : '';
    out += `[${tbl}] 既存:${cnt1}件 / 新:${cnt2}件${mark}\n`;
    if (cnt1 > 0) {
      rows1.forEach(r => { out += `  既存: ${JSON.stringify(r)}\n`; });
    }
    if (cnt2 > 0) {
      rows2.forEach(r => { out += `  新規: ${JSON.stringify(r)}\n`; });
    }
  });
  showTextModal('関連テーブル比較', out);
}

async function checkProblemTables(existingId, newId) {
  const tables = ['tblDaylightable','tblFixtureGroup','tblObjectToProcessorMap'];
  let out = `=== 問題テーブル詳細確認 ===\n`;
  out += `既存ZoneID: ${existingId}  新ZoneID: ${newId}\n\n`;
  for (const tbl of tables) {
    const r = await fetch(`/api/table-schema/${tbl}`).then(x => x.json());
    out += `━━━ [${tbl}] ━━━\n`;
    if ((r.columns||[]).length === 0) { out += '  ⚠ テーブルが存在しないか取得不可\n\n'; continue; }
    out += `  カラム: ${(r.columns||[]).map(c=>c.COLUMN_NAME).join(', ')}\n`;
    out += `  全サンプル(TOP3):\n`;
    if ((r.sample||[]).length === 0) { out += '    (0件 - テーブルは空)\n'; }
    else if (r.sample[0].__error__) { out += `    エラー: ${r.sample[0].__error__}\n`; }
    else { r.sample.forEach(s => { out += `    ${JSON.stringify(s)}\n`; }); }
    out += '\n';
  }
  // Also check all tables for any entries referencing existingId or newId
  out += `\n=== 全テーブル検索: ZoneID/SwitchLegID参照 ===\n`;
  const schemaR = await fetch('/api/schema-inspect').then(x => x.json());
  const zoneCols = schemaR.zone_related_columns || [];
  // Group by table
  const byTable = {};
  zoneCols.forEach(c => { if (!byTable[c.TABLE_NAME]) byTable[c.TABLE_NAME] = []; byTable[c.TABLE_NAME].push(c.COLUMN_NAME); });
  for (const [tbl, cols] of Object.entries(byTable)) {
    if (['tblZone','tblSwitchLeg','tblZonable'].includes(tbl)) continue; // already checked
    for (const col of cols) {
      const ids = [existingId, existingId+1, existingId+2, existingId+3, newId, newId+1, newId+2, newId+3];
      const r2 = await fetch(`/api/table-search`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({table: tbl, column: col, ids})
      }).then(x => x.json());
      if (r2.rows && r2.rows.length > 0) {
        out += `  [${tbl}].${col}:\n`;
        r2.rows.forEach(row => { out += `    ${JSON.stringify(row)}\n`; });
      }
    }
  }
  showTextModal('問題テーブル確認', out);
}

async function fixSwitchLeg(zoneId, areaId) {
  const res = await fetch(`/api/zone/${zoneId}/fix-switchleg`, { method: 'POST' });
  const d = await res.json();
  if (!res.ok) { toast(d.error || '修正失敗', 'red'); return; }
  isDirty = true;
  document.getElementById('save-btn').disabled = !isPl;
  toast('SwitchLeg ParentIDを修正しました');
  await showAreaDebug(areaId);  // refresh debug panel
  // Force refresh
  const panel = document.getElementById(`debug-panel-${areaId}`);
  panel.style.display = 'none';
  await showAreaDebug(areaId);
}

// ── Delete Zone ───────────────────────────────
async function deleteZone(zoneId, zoneName, areaId) {
  if (!confirm(`Zone "${zoneName}" を削除しますか？`)) return;
  const res = await fetch(`/api/zone/${zoneId}`, { method: 'DELETE' });
  const d = await res.json();
  if (!res.ok) { toast(d.error || '削除失敗', 'red'); return; }
  isDirty = true;
  document.getElementById('save-btn').disabled = !isPl;
  const db = document.getElementById('dirty-badge');
  if (!db) {
    const bar = document.getElementById('place-bar');
    const span = document.createElement('span');
    span.id = 'dirty-badge';
    span.style.cssText = 'display:inline-block;background:var(--orange);color:#000;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;';
    span.textContent = '● 未保存';
    bar.appendChild(span);
  }
  toast(`Zone "${zoneName}" を削除しました`);
  await loadDetail(areaId, '');
}

// ── Save ─────────────────────────────────────
async function saveFile() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '保存中...';
  const res = await fetch('/api/save', {method:'POST'});
  const d = await res.json();
  btn.textContent = '💾 保存';
  if (!res.ok) { toast(d.error||'保存失敗', 'red'); btn.disabled = false; return; }
  isDirty = false;
  const db = document.getElementById('dirty-badge');
  if (db) db.remove();
  toast('保存しました ✓');
}

// ── Toast ────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='red' ? '#c0392b' : '#2d6bb3';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
